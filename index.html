<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flame — Deep Dark</title>
    <style>
        :root {
            --bg: #000000;
            --side: #0a0a0a;
            --card: #111111;
            --accent: #007aff;
            --text: #ffffff;
            --text-dim: #888888;
            --border: #1a1a1a;
            --online: #34c759;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Auth */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .auth-card { background: var(--card); padding: 40px; border-radius: 24px; width: 100%; max-width: 360px; text-align: center; }
        .auth-card input { width: 100%; padding: 14px; margin-bottom: 12px; background: #1a1a1a; border: none; border-radius: 12px; color: #fff; outline: none; }
        .auth-card button { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 12px; color: #fff; font-weight: 600; cursor: pointer; }

        /* App Layout */
        #app { display: none; height: 100vh; flex-direction: row; }

        /* Sidebar */
        .sidebar { width: 320px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .side-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        
        .list-container { flex: 1; overflow-y: auto; }
        .list-label { padding: 16px 24px 8px; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        .item { display: flex; align-items: center; gap: 12px; padding: 12px 24px; cursor: pointer; position: relative; }
        .item:hover { background: var(--card); }
        .item.active { background: #007aff15; border-right: 3px solid var(--accent); }
        
        .avatar { width: 40px; height: 40px; border-radius: 12px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; font-weight: 600; color: var(--accent); flex-shrink: 0; position: relative; }
        .online-status { width: 10px; height: 10px; background: var(--online); border: 2px solid var(--side); border-radius: 50%; position: absolute; bottom: -2px; right: -2px; display: none; }
        .is-online .online-status { display: block; }

        /* My Profile Bottom Bar */
        .my-profile-bar { padding: 16px 24px; border-top: 1px solid var(--border); background: var(--side); display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.2s; }
        .my-profile-bar:hover { background: var(--card); }

        /* Chat Area */
        .chat-main { flex: 1; display: flex; flex-direction: column; background: var(--bg); overflow: hidden; }
        .chat-header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        
        .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 70%; padding: 10px 16px; border-radius: 16px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .msg.in { background: var(--card); align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg.out { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 4px; }

        .input-area { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 12px; }
        .input-area input { flex: 1; background: var(--card); border: none; padding: 12px 18px; border-radius: 12px; color: #fff; outline: none; }

        /* Modals */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 32px; border-radius: 24px; width: 100%; max-width: 400px; }
        .modal-content h3 { margin-bottom: 20px; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 12px; margin-bottom: 12px; background: #1a1a1a; border: 1px solid var(--border); border-radius: 10px; color: #fff; outline: none; resize: none; }
        .btn-row { display: flex; gap: 10px; margin-top: 10px; }
        .btn { flex: 1; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; }
        .btn-main { background: var(--accent); color: #fff; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h2 style="margin-bottom:20px">Flame</h2>
        <div id="reg-fields" style="display:none"><input type="text" id="auth-name" placeholder="Имя"></div>
        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button onclick="handleAuth()">Войти</button>
        <p style="margin-top:15px; font-size:13px; color:var(--text-dim); cursor:pointer;" onclick="toggleAuth()">Регистрация</p>
    </div>
</div>

<div id="app">
    <div class="sidebar">
        <div class="side-header">
            <span style="font-weight:700; letter-spacing:1px">FLAME</span>
            <button id="admin-btn" style="display:none; background:none; border:none; cursor:pointer;" onclick="showAdmin(true)">⚙️</button>
        </div>
        <div class="list-container">
            <div class="list-label">Ваши чаты</div>
            <div id="chats-list"></div>
            <div class="list-label">Все пользователи</div>
            <div id="users-list"></div>
        </div>
        <div class="my-profile-bar" onclick="showProfile()">
            <div class="avatar" id="my-av-bottom">?</div>
            <div style="flex:1; overflow:hidden">
                <div id="my-name-bottom" style="font-weight:600; font-size:14px">Загрузка...</div>
                <div style="font-size:12px; color:var(--online)">в сети</div>
            </div>
        </div>
    </div>
    <div class="chat-main">
        <div id="chat-active" style="display:none; flex-direction:column; height:100%;">
            <div class="chat-header">
                <div id="active-av" class="avatar"></div>
                <div>
                    <div id="active-name" style="font-weight:600"></div>
                    <div id="active-desc" style="font-size:12px; color:var(--text-dim)"></div>
                </div>
            </div>
            <div class="messages" id="messages-box"></div>
            <div class="input-area">
                <input type="text" id="msg-input" placeholder="Написать..." onkeydown="if(event.key==='Enter') sendMsg()">
                <button onclick="sendMsg()" style="background:var(--accent); border:none; color:#fff; width:45px; border-radius:12px; cursor:pointer">➤</button>
            </div>
        </div>
        <div id="chat-none" style="flex:1; display:flex; align-items:center; justify-content:center; color:var(--text-dim)">Выберите чат</div>
    </div>
</div>

<div class="modal" id="profile-modal">
    <div class="modal-content">
        <h3>Мой профиль</h3>
        <label style="font-size:12px; color:var(--text-dim)">Имя пользователя</label>
        <input type="text" id="edit-name">
        <label style="font-size:12px; color:var(--text-dim)">О себе</label>
        <textarea id="edit-bio" rows="3" placeholder="Расскажите о себе..."></textarea>
        <div id="my-role-display" style="font-size:12px; margin-bottom:20px; color:var(--accent)"></div>
        <div class="btn-row">
            <button class="btn" onclick="closeModal('profile-modal')">Отмена</button>
            <button class="btn btn-main" onclick="saveProfile()">Сохранить</button>
        </div>
        <button class="btn" onclick="firebase.auth().signOut()" style="width:100%; margin-top:10px; color:var(--red)">Выйти из аккаунта</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB6s4lfDc_eHL1ojTS3w_NV8WkjPHfwFcE",
        authDomain: "umessege-e77fd.firebaseapp.com",
        databaseURL: "https://umessege-e77fd-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "umessege-e77fd",
        storageBucket: "umessege-e77fd.firebasestorage.app",
        messagingSenderId: "20493632508",
        appId: "1:20493632508:web:6c2b2e1281fcb32f392879"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    let me = null, meData = null, activeChatId = null, isReg = false;

    // --- Auth Logic ---
    function toggleAuth() { isReg = !isReg; document.getElementById('reg-fields').style.display = isReg ? 'block' : 'none'; }
    async function handleAuth() {
        const email = document.getElementById('auth-email').value, pass = document.getElementById('auth-pass').value;
        try {
            if(isReg) {
                const res = await auth.createUserWithEmailAndPassword(email, pass);
                const name = document.getElementById('auth-name').value;
                await db.ref('users/'+res.user.uid).set({uid:res.user.uid, name, email, role:'user', bio: '', online: true});
            } else { await auth.signInWithEmailAndPassword(email, pass); }
        } catch(e) { alert(e.message); }
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            me = user;
            db.ref('users/'+user.uid).on('value', s => {
                meData = s.val();
                if(meData?.banned) { alert('Вы забанены'); auth.signOut(); return; }
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                document.getElementById('my-name-bottom').innerText = meData.name;
                document.getElementById('my-av-bottom').innerText = meData.name[0];
                if(meData?.role === 'admin') document.getElementById('admin-btn').style.display = 'block';
                // Ставим статус онлайн
                db.ref('users/'+user.uid).update({online: true});
                loadData();
            });
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
        }
    });

    // --- Profile Logic ---
    function showProfile() {
        document.getElementById('edit-name').value = meData.name;
        document.getElementById('edit-bio').value = meData.bio || '';
        document.getElementById('my-role-display').innerText = 'Ваша роль: ' + meData.role;
        document.getElementById('profile-modal').style.display = 'flex';
    }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    async function saveProfile() {
        const newName = document.getElementById('edit-name').value;
        const newBio = document.getElementById('edit-bio').value;
        await db.ref('users/'+me.uid).update({ name: newName, bio: newBio });
        closeModal('profile-modal');
    }

    // --- Chat Logic ---
    function loadData() {
        db.ref('users').on('value', s => {
            const users = s.val();
            const list = document.getElementById('users-list');
            list.innerHTML = '';
            Object.values(users).forEach(u => {
                if(u.uid === me.uid) return;
                list.innerHTML += `
                <div class="item ${u.online?'is-online':''}" onclick="startChat('${u.uid}','${u.name}')">
                    <div class="avatar">${u.name[0]}<div class="online-status"></div></div>
                    <div>
                        <div style="font-size:14px; font-weight:500">${u.name} ${u.verified?'✔️':''}</div>
                        <div style="font-size:11px; color:var(--text-dim)">${u.bio || 'Нет описания'}</div>
                    </div>
                </div>`;
            });
        });

        db.ref('chats').on('value', s => {
            const chats = s.val();
            const list = document.getElementById('chats-list');
            list.innerHTML = '';
            if(!chats) return;
            Object.entries(chats).forEach(([id, data]) => {
                if(!id.includes(me.uid)) return;
                const otherUid = id.replace(me.uid,'').replace('_','');
                db.ref('users/'+otherUid).once('value', us => {
                    const u = us.val();
                    list.innerHTML += `
                    <div class="item ${activeChatId===id?'active':''} ${u.online?'is-online':''}" onclick="openChat('${id}','${u.name}')">
                        <div class="avatar">${u.name[0]}<div class="online-status"></div></div>
                        <div style="overflow:hidden">
                            <div style="font-size:14px">${u.name}</div>
                            <div style="font-size:12px; color:var(--text-dim); text-overflow:ellipsis; white-space:nowrap; overflow:hidden">${data.lastMsg || ''}</div>
                        </div>
                    </div>`;
                });
            });
        });
    }

    function startChat(uid, name) {
        const id = [me.uid, uid].sort().join('_');
        db.ref('chats/'+id).update({exists:true});
        openChat(id, name);
    }

    function openChat(id, name) {
        activeChatId = id;
        document.getElementById('chat-none').style.display = 'none';
        document.getElementById('chat-active').style.display = 'flex';
        document.getElementById('active-name').innerText = name;
        document.getElementById('active-av').innerText = name[0];
        
        db.ref('messages/'+id).on('value', s => {
            const box = document.getElementById('messages-box');
            box.innerHTML = '';
            const msgs = s.val();
            if(msgs) {
                Object.values(msgs).forEach(m => {
                    box.innerHTML += `<div class="msg ${m.from===me.uid?'out':'in'}">${m.text}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            }
        });
    }

    function sendMsg() {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim() || !activeChatId) return;
        const msg = { from: me.uid, text: inp.value, ts: Date.now() };
        db.ref('messages/'+activeChatId).push(msg);
        db.ref('chats/'+activeChatId).update({lastMsg: inp.value, lastTs: Date.now()});
        inp.value = '';
    }
</script>
</body>
</html>
