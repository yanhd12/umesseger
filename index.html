<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flame — Minimal Dark</title>
    <style>
        :root {
            --bg: #000000;
            --side: #0a0a0a;
            --card: #111111;
            --accent: #007aff;
            --text: #ffffff;
            --text-dim: #888888;
            --border: #1a1a1a;
            --red: #ff3b30;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Auth */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .auth-card { background: var(--card); padding: 40px; border-radius: 24px; width: 100%; max-width: 360px; text-align: center; }
        .auth-card input { width: 100%; padding: 14px; margin-bottom: 12px; background: #1a1a1a; border: none; border-radius: 12px; color: #fff; outline: none; }
        .auth-card button { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 12px; color: #fff; font-weight: 600; cursor: pointer; }

        /* Layout */
        #app { display: none; height: 100vh; flex-direction: row; }

        /* Sidebar */
        .sidebar { width: 320px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        .side-header { padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .list-container { flex: 1; overflow-y: auto; }
        .list-label { padding: 16px 24px 8px; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        .item { display: flex; align-items: center; gap: 12px; padding: 12px 24px; cursor: pointer; }
        .item:hover { background: var(--card); }
        .item.active { background: #007aff15; border-right: 3px solid var(--accent); }
        
        .avatar { width: 40px; height: 40px; border-radius: 12px; background: var(--card); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; color: var(--accent); flex-shrink: 0; }

        /* Chat Area (FIXED) */
        .chat-main { flex: 1; display: flex; flex-direction: column; background: var(--bg); height: 100vh; overflow: hidden; }
        .chat-header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        
        /* Это исправление бага с уходящими вниз сообщениями */
        .messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 24px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
            scroll-behavior: smooth;
        }
        
        .msg { max-width: 75%; padding: 10px 16px; border-radius: 16px; font-size: 15px; word-wrap: break-word; }
        .msg.in { background: var(--card); align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg.out { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 4px; }

        .input-area { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 12px; }
        .input-area input { flex: 1; background: var(--card); border: none; padding: 12px 18px; border-radius: 12px; color: #fff; outline: none; }

        /* Admin */
        #admin-panel { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; padding: 40px; overflow-y: auto; }
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .admin-table th, .admin-table td { text-align: left; padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
        .btn-sm { padding: 6px 10px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; background: var(--card); color: #fff; margin-right: 4px; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h2 style="margin-bottom: 20px;">Flame</h2>
        <div id="reg-fields" style="display:none"><input type="text" id="auth-name" placeholder="Имя"></div>
        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button onclick="handleAuth()">Войти</button>
        <p style="margin-top:15px; font-size:13px; color:var(--text-dim); cursor:pointer;" onclick="toggleAuth()">Регистрация</p>
    </div>
</div>

<div id="app">
    <div class="sidebar">
        <div class="side-header">
            <span style="font-weight:700;">FLAME</span>
            <button id="admin-btn" style="display:none; background:none; border:none; cursor:pointer;" onclick="toggleAdmin(true)">⚙️</button>
        </div>
        <div class="list-container">
            <div class="list-label">Диалоги</div>
            <div id="chats-list"></div>
            <div class="list-label">Все пользователи</div>
            <div id="users-list"></div>
        </div>
    </div>
    <div class="chat-main">
        <div id="chat-active" style="display:none; flex-direction:column; height:100%;">
            <div class="chat-header">
                <div id="active-av" class="avatar"></div>
                <div id="active-name" style="font-weight:600;"></div>
            </div>
            <div class="messages" id="messages-box"></div>
            <div class="input-area">
                <input type="text" id="msg-input" placeholder="Написать..." onkeydown="if(event.key==='Enter') sendMsg()">
                <button onclick="sendMsg()" style="background:var(--accent); border:none; color:#fff; padding:0 15px; border-radius:12px; cursor:pointer;">➤</button>
            </div>
        </div>
        <div id="chat-none" style="flex:1; display:flex; align-items:center; justify-content:center; color:var(--text-dim);">Выберите чат</div>
    </div>
</div>

<div id="admin-panel">
    <div style="display:flex; justify-content:space-between;">
        <h2>Управление</h2>
        <button onclick="toggleAdmin(false)">Закрыть</button>
    </div>
    <table class="admin-table">
        <thead><tr><th>Имя</th><th>Email</th><th>Действия</th></tr></thead>
        <tbody id="admin-users"></tbody>
    </table>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB6s4lfDc_eHL1ojTS3w_NV8WkjPHfwFcE",
        authDomain: "umessege-e77fd.firebaseapp.com",
        databaseURL: "https://umessege-e77fd-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "umessege-e77fd",
        storageBucket: "umessege-e77fd.firebasestorage.app",
        messagingSenderId: "20493632508",
        appId: "1:20493632508:web:6c2b2e1281fcb32f392879"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    let me = null, meData = null, activeChatId = null, isReg = false;

    function toggleAuth() {
        isReg = !isReg;
        document.getElementById('reg-fields').style.display = isReg ? 'block' : 'none';
    }

    async function handleAuth() {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        try {
            if(isReg) {
                const res = await auth.createUserWithEmailAndPassword(email, pass);
                const name = document.getElementById('auth-name').value;
                await db.ref('users/'+res.user.uid).set({uid:res.user.uid, name, email, role:'user'});
            } else {
                await auth.signInWithEmailAndPassword(email, pass);
            }
        } catch(e) { alert(e.message); }
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            me = user;
            db.ref('users/'+user.uid).on('value', s => {
                meData = s.val();
                if(meData?.banned) { alert('Забанен'); auth.signOut(); return; }
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                if(meData?.role === 'admin') document.getElementById('admin-btn').style.display = 'block';
                loadData();
            });
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
        }
    });

    function loadData() {
        db.ref('users').on('value', s => {
            const users = s.val();
            const list = document.getElementById('users-list');
            const adm = document.getElementById('admin-users');
            list.innerHTML = ''; adm.innerHTML = '';
            Object.values(users).forEach(u => {
                if(u.uid === me.uid) return;
                list.innerHTML += `<div class="item" onclick="startChat('${u.uid}','${u.name}')">
                    <div class="avatar">${u.name[0]}</div>
                    <div>${u.name} ${u.verified?'✔️':''}</div>
                </div>`;
                adm.innerHTML += `<tr><td>${u.name}</td><td>${u.email}</td><td>
                    <button class="btn-sm" onclick="aAct('${u.uid}','verify')">Вериф</button>
                    <button class="btn-sm" onclick="aAct('${u.uid}','ban')">Бан</button>
                </td></tr>`;
            });
        });

        db.ref('chats').on('value', s => {
            const chats = s.val();
            const list = document.getElementById('chats-list');
            list.innerHTML = '';
            if(!chats) return;
            Object.entries(chats).forEach(([id, data]) => {
                if(!id.includes(me.uid)) return;
                const other = id.replace(me.uid,'').replace('_','');
                db.ref('users/'+other).once('value', us => {
                    const u = us.val();
                    list.innerHTML += `<div class="item ${activeChatId===id?'active':''}" onclick="openChat('${id}','${u.name}')">
                        <div class="avatar">${u.name[0]}</div>
                        <div style="overflow:hidden">
                            <div style="font-size:14px;">${u.name}</div>
                            <div style="font-size:12px; color:var(--text-dim); text-overflow:ellipsis; white-space:nowrap; overflow:hidden;">${data.lastMsg || ''}</div>
                        </div>
                    </div>`;
                });
            });
        });
    }

    function startChat(uid, name) {
        const id = [me.uid, uid].sort().join('_');
        db.ref('chats/'+id).update({exists:true});
        openChat(id, name);
    }

    function openChat(id, name) {
        activeChatId = id;
        document.getElementById('chat-none').style.display = 'none';
        document.getElementById('chat-active').style.display = 'flex';
        document.getElementById('active-name').innerText = name;
        document.getElementById('active-av').innerText = name[0];
        
        db.ref('messages/'+id).off();
        db.ref('messages/'+id).on('value', s => {
            const box = document.getElementById('messages-box');
            box.innerHTML = '';
            const msgs = s.val();
            if(msgs) {
                Object.values(msgs).forEach(m => {
                    box.innerHTML += `<div class="msg ${m.from===me.uid?'out':'in'}">${m.text}</div>`;
                });
                box.scrollTop = box.scrollHeight; // Авто-скролл вниз
            }
        });
    }

    function sendMsg() {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim() || !activeChatId) return;
        const m = { from: me.uid, text: inp.value, ts: Date.now() };
        db.ref('messages/'+activeChatId).push(m);
        db.ref('chats/'+activeChatId).update({lastMsg: inp.value, lastTs: Date.now()});
        inp.value = '';
    }

    function toggleAdmin(s) { document.getElementById('admin-panel').style.display = s?'block':'none'; }
    window.aAct = (uid, type) => {
        if(type==='verify') db.ref('users/'+uid).update({verified:true});
        if(type==='ban') db.ref('users/'+uid).update({banned:true});
    }
</script>
</body>
</html>
