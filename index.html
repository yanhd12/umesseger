<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tab-title">Untitled</title>
    <style>
        :root {
            --bg: #000; --side: #0a0a0a; --card: #121212; --accent: #007aff;
            --text: #fff; --text-dim: #8e8e93; --border: #1c1c1e;
            --online: #32d74b; --gold: #ffcc00; --blue: #0095f6; --danger: #ff3b30;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 320px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
        .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; cursor: pointer; position: relative; }
        .chat-item:hover { background: #1a1a1a; }
        .chat-item.active { background: #1a1a1a; border-left: 3px solid var(--accent); }

        .avatar { width: 45px; height: 45px; border-radius: 50%; background: #222; background-size: cover; background-position: center; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: bold; position: relative; }
        .online-dot { width: 11px; height: 11px; background: var(--online); border: 2px solid var(--side); border-radius: 50%; position: absolute; bottom: 1px; right: 1px; display: none; }
        .is-online .online-dot { display: block; }

        /* Context Menu */
        #context-menu { display: none; position: fixed; background: #1c1c1e; border: 1px solid var(--border); border-radius: 8px; z-index: 1000; width: 150px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .menu-item { padding: 10px 15px; cursor: pointer; font-size: 13px; color: var(--danger); }
        .menu-item:hover { background: #2c2c2e; }

        /* Main Chat */
        .main-chat { flex: 1; display: flex; flex-direction: column; position: relative; }
        .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 70%; padding: 10px 16px; border-radius: 18px; font-size: 15px; word-wrap: break-word; }
        .msg.mine { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.theirs { background: var(--card); align-self: flex-start; border-bottom-left-radius: 4px; }

        /* Modals */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 5000; align-items: center; justify-content: center; }
        .modal-box { background: var(--card); padding: 30px; border-radius: 25px; width: 380px; border: 1px solid var(--border); text-align: center; max-height: 80vh; overflow-y: auto; }
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; margin-top: 10px; }
        input, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); border-radius: 10px; color: #fff; margin-bottom: 10px; outline: none; }

        .badge { display: inline-block; width: 14px; height: 14px; border-radius: 50%; font-size: 8px; margin-left: 5px; text-align: center; line-height: 14px; font-weight: bold; }
        .badge-gold { background: var(--gold); color: #000; }
        .badge-blue { background: var(--blue); color: #fff; }

        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="context-menu">
    <div class="menu-item" onclick="deleteCurrentChat()">Удалить чат</div>
</div>

<div id="auth-screen">
    <div class="modal-box">
        <h2>Untitled</h2><br>
        <div id="reg-fields" style="display:none">
            <input type="text" id="auth-name" placeholder="Имя">
            <input type="text" id="auth-un" placeholder="Юзернейм">
        </div>
        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button class="btn" style="background:var(--accent); color:#fff" onclick="handleAuth()">Продолжить</button>
        <p onclick="toggleAuth()" style="color:var(--text-dim); font-size:12px; margin-top:15px; cursor:pointer">Сменить режим</p>
    </div>
</div>

<div class="sidebar">
    <div style="padding:20px"><input type="text" id="search-inp" placeholder="Поиск в Untitled..." oninput="searchUsers(this.value)"></div>
    <div id="search-results"></div>
    <div style="padding:0 20px 10px; font-size:11px; color:var(--text-dim)">ВАШИ ЧАТЫ</div>
    <div class="chat-list" id="user-chats" style="flex:1"></div>
    <div style="padding:15px; border-top:1px solid var(--border); display:flex; align-items:center; gap:12px; cursor:pointer" onclick="showProfile('me')">
        <div class="avatar" id="my-av-small"></div>
        <div>
            <div id="my-name-small" style="font-weight:600; font-size:14px"></div>
            <div id="my-un-small" style="color:var(--accent); font-size:12px"></div>
        </div>
    </div>
</div>

<div class="main-chat">
    <div id="active-chat-ui" style="display:none; flex-direction:column; height:100%">
        <div style="padding:15px 25px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; cursor:pointer" onclick="showProfile('other', currentPeerId)">
            <div id="active-av" class="avatar"></div>
            <div>
                <div style="font-weight:600"><span id="active-name"></span><span id="active-badge"></span></div>
                <div id="active-un" style="color:var(--accent); font-size:12px"></div>
            </div>
        </div>
        <div class="messages-container" id="messages-box"></div>
        <div style="padding:20px; display:flex; gap:10px">
            <input type="text" id="msg-input" placeholder="Сообщение..." style="margin:0" onkeydown="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" style="background:var(--accent); border:none; width:45px; border-radius:10px; color:#fff">➤</button>
        </div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-box">
        <div class="avatar" id="modal-av" style="width:80px; height:80px; margin:0 auto 15px"></div>
        <h3 id="view-name"></h3>
        <p id="view-un" style="color:var(--accent); margin-bottom:10px"></p>
        <p id="view-bio" style="color:var(--text-dim); margin-bottom:15px; font-size:14px"></p>

        <div id="me-edit" style="display:none">
            <input type="text" id="edit-name" placeholder="Имя">
            <input type="text" id="edit-un" placeholder="Юзернейм">
            <textarea id="edit-bio" placeholder="О себе..." style="height:80px"></textarea>
            <button class="btn" style="background:var(--accent); color:#fff" onclick="saveProfile()">Сохранить</button>
            <button class="btn" style="background:#222; color:#fff" onclick="document.getElementById('file-inp').click()">Сменить фото</button>
            <input type="file" id="file-inp" hidden onchange="uploadPhoto(this)">
            <button id="admin-btn" class="btn" style="background:var(--gold); color:#000; display:none" onclick="openAdmin()">Админ-панель</button>
        </div>

        <button id="start-chat-btn" class="btn" style="background:var(--accent); color:#fff; display:none">Написать</button>
        <button class="btn" style="background:none; color:var(--text-dim)" onclick="closeModal()">Закрыть</button>
    </div>
</div>

<div id="admin-modal" class="modal">
    <div class="modal-box" style="width:450px">
        <h3>Управление</h3><br>
        <div id="admin-list" style="text-align:left"></div>
        <button class="btn" onclick="this.parentElement.parentElement.style.display='none'">Закрыть</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const IMGBB_KEY = "db82b9743e8c49d89b26bf5392e1578f";
    const firebaseConfig = {
        apiKey: "AIzaSyB6s4lfDc_eHL1ojTS3w_NV8WkjPHfwFcE",
        authDomain: "umessege-e77fd.firebaseapp.com",
        databaseURL: "https://umessege-e77fd-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "umessege-e77fd"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    let me = null, meData = null, activeChatId = null, currentPeerId = null, isReg = false, chatToDelete = null;

    const getBadge = u => u.role==='admin' ? '<span class="badge badge-gold">✓</span>' : (u.verified ? '<span class="badge badge-blue">✓</span>' : '');

    function drawAv(el, photo, name) {
        if (!el) return;
        el.style.backgroundImage = photo ? `url(${photo})` : 'none';
        el.innerText = photo ? '' : (name ? name[0].toUpperCase() : '?');
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            me = user;
            db.ref('users/'+user.uid).on('value', s => {
                meData = s.val(); if(!meData) return;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('my-name-small').innerHTML = meData.name + getBadge(meData);
                document.getElementById('my-un-small').innerText = '@' + meData.username;
                drawAv(document.getElementById('my-av-small'), meData.photo, meData.name);
                if(meData.role === 'admin') document.getElementById('admin-btn').style.display='block';
            });
            loadChats();
        }
    });

    function loadChats() {
        db.ref('chats').on('value', async s => {
            const cont = document.getElementById('user-chats'); cont.innerHTML = '';
            const data = s.val() || {};
            for (let id in data) {
                if (id.includes(me.uid)) {
                    const oId = id.replace(me.uid,'').replace('_','');
                    const u = (await db.ref('users/'+oId).once('value')).val();
                    if(!u) continue;
                    const div = document.createElement('div');
                    div.className = `chat-item ${activeChatId===id?'active':''}`;
                    div.oncontextmenu = (e) => showContextMenu(e, id);
                    div.onclick = () => openChat(id, u);
                    div.innerHTML = `<div class="avatar" id="l-${u.uid}"></div>
                        <div style="overflow:hidden">
                            <div style="font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis">${u.name}${getBadge(u)}</div>
                            <div style="color:var(--accent); font-size:12px">@${u.username}</div>
                        </div>`;
                    cont.appendChild(div);
                    drawAv(document.getElementById('l-'+u.uid), u.photo, u.name);
                }
            }
        });
    }

    function showContextMenu(e, id) {
        e.preventDefault();
        chatToDelete = id;
        const menu = document.getElementById('context-menu');
        menu.style.display = 'block';
        menu.style.left = e.pageX + 'px';
        menu.style.top = e.pageY + 'px';
    }

    document.addEventListener('click', () => document.getElementById('context-menu').style.display='none');

    function deleteCurrentChat() {
        if(chatToDelete) {
            db.ref('chats/'+chatToDelete).remove();
            db.ref('messages/'+chatToDelete).remove();
            if(activeChatId === chatToDelete) {
                document.getElementById('active-chat-ui').style.display = 'none';
                activeChatId = null;
            }
        }
    }

    function searchUsers(v) {
        const res = document.getElementById('search-results');
        if(!v.trim()) { res.innerHTML = ''; return; }
        db.ref('users').orderByChild('username').startAt(v.toLowerCase()).endAt(v.toLowerCase()+'\uf8ff').once('value', s => {
            res.innerHTML = '<div style="padding:10px 20px; font-size:11px; color:var(--text-dim)">РЕЗУЛЬТАТЫ ПОИСКА</div>';
            Object.values(s.val()||{}).forEach(u => {
                if(u.uid === me.uid) return;
                const div = document.createElement('div');
                div.className = 'chat-item';
                div.innerHTML = `<div class="avatar" id="s-${u.uid}"></div><div><b>${u.name}${getBadge(u)}</b><br><small style="color:var(--accent)">@${u.username}</small></div>`;
                div.onclick = () => showProfile('other', u.uid);
                res.appendChild(div);
                drawAv(document.getElementById('s-'+u.uid), u.photo, u.name);
            });
        });
    }

    function openChat(id, u) {
        activeChatId = id; currentPeerId = u.uid;
        document.getElementById('active-chat-ui').style.display = 'flex';
        document.getElementById('active-name').innerText = u.name;
        document.getElementById('active-un').innerText = '@'+u.username;
        document.getElementById('active-badge').innerHTML = getBadge(u);
        drawAv(document.getElementById('active-av'), u.photo, u.name);
        db.ref('messages/'+id).off();
        db.ref('messages/'+id).on('value', s => {
            const box = document.getElementById('messages-box'); box.innerHTML = '';
            Object.values(s.val()||{}).forEach(m => {
                const d = document.createElement('div');
                d.className = `msg ${m.from===me.uid?'mine':'theirs'}`;
                d.innerText = m.text; box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function showProfile(type, uid) {
        const tId = uid || me.uid;
        db.ref('users/'+tId).once('value', s => {
            const u = s.val();
            document.getElementById('view-name').innerHTML = u.name + getBadge(u);
            document.getElementById('view-un').innerText = '@'+u.username;
            document.getElementById('view-bio').innerText = u.bio || 'Нет описания';
            drawAv(document.getElementById('modal-av'), u.photo, u.name);
            
            document.getElementById('me-edit').style.display = type==='me'?'block':'none';
            document.getElementById('start-chat-btn').style.display = type==='me'?'none':'block';
            document.getElementById('view-bio').style.display = type==='me'?'none':'block';

            if(type==='me'){
                document.getElementById('edit-name').value = u.name;
                document.getElementById('edit-un').value = u.username;
                document.getElementById('edit-bio').value = u.bio || '';
            } else {
                document.getElementById('start-chat-btn').onclick = () => {
                    const id = [me.uid, u.uid].sort().join('_');
                    db.ref('chats/'+id).update({exists:true}); openChat(id, u); closeModal();
                };
            }
            document.getElementById('modal').style.display = 'flex';
        });
    }

    async function saveProfile() {
        const nName = document.getElementById('edit-name').value;
        const nUn = document.getElementById('edit-un').value.toLowerCase().trim();
        const nBio = document.getElementById('edit-bio').value;
        await db.ref('users/'+me.uid).update({ name: nName, username: nUn, bio: nBio });
        closeModal();
    }

    async function uploadPhoto(inp) {
        const fd = new FormData(); fd.append('image', inp.files[0]);
        const r = await fetch('https://api.imgbb.com/1/upload?key='+IMGBB_KEY, {method:'POST', body:fd});
        const d = await r.json(); await db.ref('users/'+me.uid).update({photo: d.data.url});
    }

    function openAdmin() {
        document.getElementById('admin-modal').style.display='flex';
        db.ref('users').once('value', s => {
            const cont = document.getElementById('admin-list'); cont.innerHTML = '';
            Object.values(s.val()).forEach(u => {
                const d = document.createElement('div');
                d.style = "padding:10px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center";
                d.innerHTML = `<span>${u.name} (@${u.username})</span>
                    <div>
                        <button onclick="db.ref('users/${u.uid}').update({verified:${!u.verified}}); openAdmin()">Галочка</button>
                    </div>`;
                cont.appendChild(d);
            });
        });
    }

    function sendMsg() {
        const v = document.getElementById('msg-input').value; if(!v.trim()) return;
        db.ref('messages/'+activeChatId).push({ from: me.uid, text: v });
        document.getElementById('msg-input').value = '';
    }

    function toggleAuth() { isReg=!isReg; document.getElementById('reg-fields').style.display=isReg?'block':'none'; }
    function closeModal() { document.getElementById('modal').style.display='none'; }
    
    async function handleAuth() {
        const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
        if(isReg) {
            const un = document.getElementById('auth-un').value.toLowerCase().trim();
            const res = await auth.createUserWithEmailAndPassword(e,p);
            await db.ref('users/'+res.user.uid).set({ uid: res.user.uid, name: document.getElementById('auth-name').value, username: un, email: e, role: 'user', verified: false });
            await db.ref('usernames/'+un).set(res.user.uid);
        } else await auth.signInWithEmailAndPassword(e,p);
    }
</script>
</body>
</html>
