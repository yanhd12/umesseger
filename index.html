<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tab-title">Untitled Messenger</title>
    <style>
        :root {
            --bg: #000; --side: #0a0a0a; --card: #1c1c1e; --accent: #007aff;
            --text: #fff; --text-dim: #8e8e93; --border: #2c2c2e;
            --online: #32d74b; --offline: #48484a; --gold: #ffcc00; --blue: #0095f6; --danger: #ff3b30;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 320px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
        .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; cursor: pointer; position: relative; transition: 0.2s; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .chat-item:hover { background: #1a1a1a; }
        .chat-item.active { background: #1a1a1a; border-left: 3px solid var(--accent); }

        .avatar-wrapper { position: relative; flex-shrink: 0; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: #222; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; border: 1px solid var(--border); overflow: hidden; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--side); position: absolute; bottom: 0; right: 0; background: var(--offline); }
        .status-dot.online { background: var(--online); }

        /* Dropdowns */
        .dropdown-menu { display: none; position: fixed; background: #2c2c2e; border: 1px solid var(--border); border-radius: 12px; z-index: 10000; width: 200px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .menu-item { padding: 12px 16px; cursor: pointer; font-size: 14px; color: var(--text); }
        .menu-item:hover { background: #3a3a3c; }

        /* Modals */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); z-index: 5000; align-items: center; justify-content: center; }
        .modal-box { background: var(--card); padding: 30px; border-radius: 28px; width: 100%; max-width: 380px; text-align: center; border: 1px solid var(--border); }
        
        #fs-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; align-items: center; justify-content: center; }
        #fs-photo { max-width: 90%; max-height: 90%; border-radius: 10px; }

        /* Messages */
        .main-chat { flex: 1; display: flex; flex-direction: column; background: #000; }
        .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 6px; }
        .msg { max-width: 70%; padding: 10px 14px; border-radius: 18px; font-size: 15px; position: relative; line-height: 1.4; }
        .msg.mine { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 4px; padding-right: 38px; color: white; }
        .msg.theirs { background: var(--card); align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg-status { position: absolute; bottom: 4px; right: 8px; font-size: 10px; opacity: 0.7; }

        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; margin-top: 10px; background: var(--accent); color: #fff; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        input, textarea { width: 100%; padding: 14px; background: #121212; border: 1px solid var(--border); border-radius: 12px; color: #fff; margin-bottom: 12px; outline: none; }

        .badge { display: inline-block; width: 15px; height: 15px; border-radius: 50%; font-size: 9px; margin-left: 5px; text-align: center; line-height: 15px; vertical-align: middle; font-weight: bold; }
        .badge-gold { background: var(--gold); color: #000; }
        .badge-blue { background: var(--blue); color: #fff; }

        .dots-btn { cursor: pointer; font-size: 20px; color: var(--text-dim); padding: 5px; transition: 0.2s; }
        
        #search-results { max-height: 200px; overflow-y: auto; background: #050505; }
    </style>
</head>
<body>

<div id="chat-context-menu" class="dropdown-menu">
    <div class="menu-item" onclick="deleteChat('only_me')">Удалить у себя</div>
    <div class="menu-item" style="color:var(--danger)" onclick="deleteChat('everyone')">Удалить у всех</div>
</div>

<div id="settings-menu" class="dropdown-menu">
    <div class="menu-item" onclick="openEditProfile()">Редактировать профиль</div>
    <div id="admin-menu-item" class="menu-item" style="display:none; color:var(--gold)" onclick="openAdmin()">Админ-панель</div>
    <div class="menu-item" style="color:var(--danger); border-top:1px solid var(--border)" onclick="auth.signOut(); location.reload();">Выйти</div>
</div>

<div id="fs-overlay" onclick="this.style.display='none'"><img id="fs-photo" src=""></div>

<div id="auth-screen" class="modal" style="display: flex;">
    <div class="modal-box">
        <h2 style="margin-bottom:20px">Untitled</h2>
        <div id="reg-fields" style="display:none">
            <input type="text" id="auth-name" placeholder="Имя">
            <input type="text" id="auth-un" placeholder="Юзернейм">
        </div>
        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button class="btn" onclick="handleAuth()">Продолжить</button>
        <p onclick="toggleAuth()" id="auth-toggle-text" style="color:var(--text-dim); font-size:13px; margin-top:15px; cursor:pointer">Зарегистрироваться</p>
    </div>
</div>

<div class="sidebar">
    <div style="padding:20px">
        <input type="text" placeholder="Поиск по юзернейму..." oninput="searchUsers(this.value)">
        <div id="search-results"></div>
    </div>
    <div style="padding:0 20px 10px; font-size:11px; color:var(--text-dim); letter-spacing: 1px;">ЧАТЫ</div>
    <div class="chat-list" id="user-chats" style="flex:1; overflow-y: auto;"></div>
    
    <div style="padding:15px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between">
        <div style="display:flex; align-items:center; gap:12px; cursor:pointer" onclick="showProfile('me')">
            <div class="avatar-wrapper">
                <div class="avatar" id="my-av-small"></div>
                <div class="status-dot online"></div>
            </div>
            <div style="overflow:hidden">
                <div id="my-name-small" style="font-weight:600; font-size:14px; white-space:nowrap; text-overflow:ellipsis"></div>
                <div id="my-un-small" style="color:var(--text-dim); font-size:12px"></div>
            </div>
        </div>
        <div class="dots-btn" onclick="toggleSettingsMenu(event)">⋮</div>
    </div>
</div>

<div class="main-chat">
    <div id="active-chat-ui" style="display:none; flex-direction:column; height:100%">
        <div style="padding:15px 25px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; cursor:pointer" onclick="showProfile('other', currentPeerId)">
            <div class="avatar-wrapper">
                <div id="active-av" class="avatar"></div>
                <div id="active-status" class="status-dot"></div>
            </div>
            <div>
                <div style="font-weight:600"><span id="active-name"></span><span id="active-badge"></span></div>
                <div id="active-un" style="color:var(--accent); font-size:12px"></div>
            </div>
        </div>
        <div class="messages-container" id="messages-box"></div>
        <div style="padding:20px; display:flex; gap:10px">
            <input type="text" id="msg-input" placeholder="Сообщение..." style="margin:0" onkeydown="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" style="background:var(--accent); border:none; width:50px; border-radius:12px; color:#fff; cursor:pointer; font-size: 18px;">➤</button>
        </div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-box">
        <div class="avatar" id="modal-av" style="width:90px; height:90px; margin:0 auto 15px; font-size:24px" onclick="viewPhotoFull(this)"></div>
        <h3 id="view-name"></h3>
        <p id="view-un" style="color:var(--accent); margin-bottom:10px"></p>
        <p id="view-bio" style="color:var(--text-dim); margin-bottom:20px; font-size:14px"></p>

        <div id="edit-form" style="display:none">
            <input type="text" id="edit-name" placeholder="Имя">
            <textarea id="edit-bio" placeholder="О себе..."></textarea>
            <button class="btn" onclick="saveProfile()">Сохранить</button>
            <button class="btn" style="background:#3a3a3c" onclick="document.getElementById('file-inp').click()">Сменить фото</button>
            <input type="file" id="file-inp" hidden onchange="uploadPhoto(this)" accept="image/*">
        </div>

        <button id="start-chat-btn" class="btn" style="display:none">Написать</button>
        <button class="btn" style="background:none; color:var(--text-dim)" onclick="closeModal()">Закрыть</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const IMGBB_KEY = "db82b9743e8c49d89b26bf5392e1578f";
    const firebaseConfig = {
        apiKey: "AIzaSyB6s4lfDc_eHL1ojTS3w_NV8WkjPHfwFcE",
        authDomain: "umessege-e77fd.firebaseapp.com",
        databaseURL: "https://umessege-e77fd-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "umessege-e77fd"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    let me = null, meData = null, activeChatId = null, currentPeerId = null, isReg = false, chatContextTarget = null;

    const getBadge = u => u && u.role==='admin' ? '<span class="badge badge-gold">✓</span>' : (u && u.verified ? '<span class="badge badge-blue">✓</span>' : '');

    function drawAv(el, photo, name) {
        if (!el) return;
        el.style.backgroundImage = photo ? `url(${photo})` : 'none';
        el.innerText = photo ? '' : (name ? name[0].toUpperCase() : '?');
        el.dataset.photo = photo || '';
    }

    function viewPhotoFull(el) {
        const url = el.dataset.photo;
        if(url) {
            document.getElementById('fs-photo').src = url;
            document.getElementById('fs-overlay').style.display = 'flex';
        }
    }

    function setOnlineStatus(isOnline) {
        if (!me) return;
        db.ref('users/' + me.uid + '/online').set(isOnline);
        if (!isOnline) db.ref('users/' + me.uid + '/lastSeen').set(Date.now());
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            me = user;
            setOnlineStatus(true);
            db.ref('users/'+user.uid).on('value', s => {
                meData = s.val();
                if(!meData) return;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('my-name-small').innerHTML = meData.name + getBadge(meData);
                document.getElementById('my-un-small').innerText = '@' + meData.username;
                drawAv(document.getElementById('my-av-small'), meData.photo, meData.name);
                document.getElementById('admin-menu-item').style.display = meData.role === 'admin' ? 'block' : 'none';
            });
            loadChats();
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
        }
    });

    window.onbeforeunload = () => setOnlineStatus(false);

    function toggleSettingsMenu(e) {
        e.stopPropagation();
        const menu = document.getElementById('settings-menu');
        menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        menu.style.left = (e.pageX - 180) + 'px';
        menu.style.top = (e.pageY - 130) + 'px';
    }

    async function searchUsers(val) {
        const resDiv = document.getElementById('search-results');
        if (val.length < 2) { resDiv.innerHTML = ''; return; }
        
        const snapshot = await db.ref('users').orderByChild('username').startAt(val).endAt(val + '\uf8ff').once('value');
        resDiv.innerHTML = '';
        snapshot.forEach(child => {
            const u = child.val();
            if (u.uid === me.uid) return;
            const div = document.createElement('div');
            div.className = 'chat-item';
            div.innerHTML = `<b>${u.name}</b> <small>@${u.username}</small>`;
            div.onclick = () => startNewChat(u);
            resDiv.appendChild(div);
        });
    }

    function startNewChat(u) {
        const chatId = me.uid < u.uid ? `${me.uid}_${u.uid}` : `${u.uid}_${me.uid}`;
        db.ref('chats/' + chatId).update({ exists: true });
        document.getElementById('search-results').innerHTML = '';
        openChat(chatId, u);
    }

    function openChat(id, u) {
        activeChatId = id; currentPeerId = u.uid;
        document.getElementById('active-chat-ui').style.display = 'flex';
        document.getElementById('active-name').innerText = u.name;
        document.getElementById('active-un').innerText = '@' + u.username;
        document.getElementById('active-badge').innerHTML = getBadge(u);
        drawAv(document.getElementById('active-av'), u.photo, u.name);
        document.title = "Чат с " + u.name;

        db.ref('users/' + u.uid + '/online').on('value', s => {
            const dot = document.getElementById('active-status');
            s.val() ? dot.classList.add('online') : dot.classList.remove('online');
        });

        db.ref('messages/'+id).off();
        db.ref('messages/'+id).on('value', s => {
            const box = document.getElementById('messages-box'); box.innerHTML = '';
            const msgs = s.val() || {};
            Object.keys(msgs).forEach(mId => {
                const m = msgs[mId];
                if (m.from !== me.uid && !m.read) db.ref('messages/'+id+'/'+mId+'/read').set(true);
                const d = document.createElement('div');
                d.className = `msg ${m.from===me.uid?'mine':'theirs'}`;
                d.innerText = m.text;
                if (m.from === me.uid) {
                    const status = document.createElement('span');
                    status.className = 'msg-status';
                    status.innerText = m.read ? '✓✓' : '✓';
                    d.appendChild(status);
                }
                box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg() {
        const v = document.getElementById('msg-input').value; if(!v.trim() || !activeChatId) return;
        db.ref('messages/'+activeChatId).push({ from: me.uid, text: v, read: false, time: Date.now() });
        document.getElementById('msg-input').value = '';
    }

    function deleteChat(mode) {
        if(!chatContextTarget) return;
        if(mode === 'everyone') {
            db.ref('chats/'+chatContextTarget).remove();
            db.ref('messages/'+chatContextTarget).remove();
        }
        document.getElementById('active-chat-ui').style.display = 'none';
        document.title = "Untitled Messenger";
    }

    function loadChats() {
        db.ref('chats').on('value', async s => {
            const cont = document.getElementById('user-chats'); cont.innerHTML = '';
            const data = s.val() || {};
            for (let id in data) {
                if (id.includes(me.uid)) {
                    const oId = id.replace(me.uid,'').replace('_','');
                    const uSnap = await db.ref('users/'+oId).once('value');
                    const u = uSnap.val();
                    if(!u) continue;
                    const div = document.createElement('div');
                    div.className = `chat-item ${activeChatId===id?'active':''}`;
                    div.onclick = () => openChat(id, u);
                    div.innerHTML = `<div class="avatar-wrapper"><div class="avatar" id="l-${u.uid}"></div><div class="status-dot ${u.online?'online':''}"></div></div>
                        <div style="overflow:hidden"><b>${u.name}</b><br><small>@${u.username}</small></div>`;
                    cont.appendChild(div);
                    drawAv(document.getElementById('l-'+u.uid), u.photo, u.name);
                }
            }
        });
    }

    document.addEventListener('click', () => {
        document.getElementById('settings-menu').style.display = 'none';
        document.getElementById('chat-context-menu').style.display = 'none';
    });

    function openEditProfile() {
        showProfile('me');
        document.getElementById('edit-form').style.display = 'block';
        document.getElementById('view-bio').style.display = 'none';
        document.getElementById('edit-name').value = meData.name;
        document.getElementById('edit-bio').value = meData.bio || '';
    }

    function showProfile(mode, uid) {
        const tId = uid || me.uid;
        db.ref('users/'+tId).once('value', s => {
            const u = s.val();
            document.getElementById('view-name').innerHTML = u.name + getBadge(u);
            document.getElementById('view-un').innerText = '@'+u.username;
            document.getElementById('view-bio').innerText = u.bio || 'Нет описания';
            document.getElementById('view-bio').style.display = 'block';
            drawAv(document.getElementById('modal-av'), u.photo, u.name);
            document.getElementById('edit-form').style.display = 'none';
            document.getElementById('modal').style.display = 'flex';
        });
    }

    function saveProfile() {
        const name = document.getElementById('edit-name').value;
        const bio = document.getElementById('edit-bio').value;
        if(!name.trim()) return;
        db.ref('users/'+me.uid).update({ name, bio }).then(() => closeModal());
    }

    async function uploadPhoto(input) {
        const file = input.files[0];
        if(!file) return;
        const formData = new FormData();
        formData.append("image", file);
        try {
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: formData });
            const data = await res.json();
            const url = data.data.url;
            await db.ref('users/'+me.uid+'/photo').set(url);
            drawAv(document.getElementById('modal-av'), url, meData.name);
        } catch(e) { alert("Ошибка загрузки"); }
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    async function handleAuth() {
        const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
        try {
            if(isReg) {
                const name = document.getElementById('auth-name').value;
                const un = document.getElementById('auth-un').value.toLowerCase().trim();
                if(!name || !un) { alert("Заполните все поля"); return; }
                const res = await auth.createUserWithEmailAndPassword(e,p);
                await db.ref('users/'+res.user.uid).set({ uid: res.user.uid, name, username: un, email: e, role: 'user', verified: false, online: true });
            } else await auth.signInWithEmailAndPassword(e,p);
        } catch(e) { alert(e.message); }
    }

    function toggleAuth() { 
        isReg = !isReg; 
        document.getElementById('reg-fields').style.display = isReg ? 'block' : 'none'; 
        document.getElementById('auth-toggle-text').innerText = isReg ? "Уже есть аккаунт? Войти" : "Зарегистрироваться";
    }
</script>
</body>
</html>
