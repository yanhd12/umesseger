<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tab-title">Untitled</title>
    <style>
        :root {
            --bg: #000000;
            --side: #0a0a0a;
            --card: #121212;
            --accent: #007aff;
            --text: #ffffff;
            --text-dim: #8e8e93;
            --border: #1c1c1e;
            --online: #32d74b;
            --admin-gold: #ffcc00;
            --verify-blue: #0095f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; }

        /* Скроллбар */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        /* Auth */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .auth-card { background: var(--card); padding: 40px; border-radius: 28px; width: 340px; text-align: center; border: 1px solid var(--border); }
        .auth-card input { width: 100%; padding: 14px; margin-bottom: 10px; background: #000; border: 1px solid var(--border); border-radius: 12px; color: #fff; outline: none; }
        .auth-card button { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 12px; color: #fff; font-weight: 600; cursor: pointer; }

        /* Sidebar */
        .sidebar { width: 350px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100vh; flex-shrink: 0; }
        .search-area { padding: 20px; border-bottom: 1px solid var(--border); }
        .search-area input { width: 100%; padding: 12px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: #fff; outline: none; }
        
        .chat-list { flex: 1; overflow-y: auto; }
        .list-label { padding: 15px 20px 5px; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }

        .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; cursor: pointer; transition: 0.2s; border-left: 3px solid transparent; }
        .chat-item:hover { background: #1a1a1a; }
        .chat-item.active { background: #1a1a1a; border-left-color: var(--accent); }

        /* Аватарки и статусы */
        .avatar { width: 48px; height: 48px; border-radius: 50%; background: #222; position: relative; background-size: cover; background-position: center; flex-shrink: 0; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--accent); }
        .online-dot { width: 12px; height: 12px; background: var(--online); border: 2px solid var(--side); border-radius: 50%; position: absolute; bottom: 2px; right: 2px; display: none; }
        .is-online .online-dot { display: block; }

        .badge { display: inline-flex; align-items: center; justify-content: center; width: 15px; height: 15px; border-radius: 50%; font-size: 9px; margin-left: 5px; vertical-align: middle; }
        .badge-blue { background: var(--verify-blue); color: white; }
        .badge-gold { background: var(--admin-gold); color: black; font-weight: bold; }

        .u-status { font-size: 12px; margin-top: 2px; }
        .u-status.on { color: var(--online); }
        .u-status.off { color: var(--text-dim); }

        /* Main Chat Area */
        .main-chat { flex: 1; display: flex; flex-direction: column; background: var(--bg); position: relative; }
        .chat-header { padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px; cursor: pointer; }
        
        .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 70%; padding: 10px 16px; border-radius: 18px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .message.mine { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 4px; }
        .message.theirs { background: var(--card); align-self: flex-start; border-bottom-left-radius: 4px; }

        .input-bar { padding: 20px; display: flex; gap: 12px; border-top: 1px solid var(--border); background: var(--bg); }
        .input-bar input { flex: 1; background: var(--card); border: 1px solid var(--border); padding: 14px; border-radius: 14px; color: #fff; outline: none; }
        .input-bar button { background: var(--accent); border: none; width: 48px; border-radius: 14px; color: #fff; cursor: pointer; font-size: 18px; transition: 0.2s; }
        .input-bar button:hover { transform: scale(1.05); }

        /* Profile Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); z-index: 5000; align-items: center; justify-content: center; }
        .modal-box { background: var(--card); padding: 30px; border-radius: 32px; width: 380px; border: 1px solid var(--border); text-align: center; }
        .modal-box textarea { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 12px; margin-top: 10px; resize: none; }
        
        .btn-action { width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .btn-blue { background: var(--accent); color: white; }
        .btn-gold { background: var(--admin-gold); color: black; }
        .btn-danger { background: none; color: #ff3b30; }

        #empty-chat { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-dim); flex-direction: column; gap: 10px; }
    </style>
</head>
<body>

<audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>

<div id="auth-screen">
    <div class="auth-card">
        <h1>Untitled</h1><br>
        <div id="reg-fields" style="display:none">
            <input type="text" id="auth-name" placeholder="Имя">
            <input type="text" id="auth-username" placeholder="Юзернейм">
        </div>
        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button onclick="handleAuth()">Войти</button>
        <div style="margin-top:15px; font-size:13px; color:var(--text-dim); cursor:pointer" onclick="toggleAuth()">Нет аккаунта? Создать</div>
    </div>
</div>

<div class="sidebar">
    <div class="search-area"><input type="text" id="search-inp" placeholder="Поиск в Untitled..." oninput="searchUsers(this.value)"></div>
    <div class="chat-list" id="chats-list">
        <div id="search-results"></div>
        <div class="list-label">Ваши сообщения</div>
        <div id="user-chats"></div>
    </div>
    <div style="padding:15px 20px; border-top:1px solid var(--border); display:flex; align-items:center; gap:12px; cursor:pointer" onclick="showProfile('me')">
        <div class="avatar" id="my-av-small"></div>
        <div style="overflow:hidden">
            <div id="my-name-small" style="font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></div>
            <div id="my-un-small" style="color:var(--accent); font-size:12px;"></div>
        </div>
    </div>
</div>

<div class="main-chat">
    <div id="active-chat-ui" style="display:none; flex-direction:column; height:100%;">
        <div class="chat-header" onclick="showProfile('other', currentPeerId)">
            <div id="active-av" class="avatar"></div>
            <div>
                <div style="font-weight:600; display:flex; align-items:center;">
                    <span id="active-name"></span><span id="active-badge"></span>
                </div>
                <div id="active-status" style="font-size:12px"></div>
            </div>
        </div>
        <div class="messages-container" id="messages-box"></div>
        <div class="input-bar">
            <input type="text" id="msg-input" placeholder="Написать сообщение..." onkeydown="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()">➤</button>
        </div>
    </div>
    <div id="empty-chat">
        <h2>Untitled</h2>
        <p>Выберите чат, чтобы начать общение</p>
    </div>
</div>

<div class="modal" id="modal">
    <div class="modal-box">
        <div class="avatar" id="modal-av" style="width:100px; height:100px; margin: 0 auto 15px; cursor:pointer" onclick="document.getElementById('file-input').click()"></div>
        <input type="file" id="file-input" hidden accept="image/*" onchange="uploadPhoto(this)">
        
        <div id="edit-mode">
            <input type="text" id="edit-name" style="width:100%; padding:10px; background:#000; border:1px solid var(--border); border-radius:10px; color:#fff; outline:none" placeholder="Имя">
            <textarea id="edit-bio" rows="3" placeholder="О себе..."></textarea>
            <button class="btn-action btn-blue" onclick="saveProfile()">Сохранить</button>
            <button id="admin-btn" class="btn-action btn-gold" style="display:none" onclick="alert('Открываю панель...')">Админ-панель</button>
        </div>

        <div id="view-mode" style="display:none">
            <h2 id="view-name"></h2>
            <p id="view-bio" style="color:var(--text-dim); margin-top:5px"></p>
            <button class="btn-action btn-blue" id="chat-start-btn">Написать</button>
        </div>

        <button class="btn-action btn-danger" onclick="closeModal()">Закрыть</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const IMGBB_KEY = "db82b9743e8c49d89b26bf5392e1578f";
    const firebaseConfig = {
        apiKey: "AIzaSyB6s4lfDc_eHL1ojTS3w_NV8WkjPHfwFcE",
        authDomain: "umessege-e77fd.firebaseapp.com",
        databaseURL: "https://umessege-e77fd-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "umessege-e77fd",
        storageBucket: "umessege-e77fd.firebasestorage.app",
        messagingSenderId: "20493632508",
        appId: "1:20493632508:web:6c2b2e1281fcb32f392879"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    let me = null, meData = null, activeChatId = null, currentPeerId = null, isReg = false;

    // Галки
    const getBadge = (u) => {
        if (u.role === 'admin') return `<span class="badge badge-gold">✓</span>`;
        if (u.verified) return `<span class="badge badge-blue">✓</span>`;
        return '';
    };

    function drawAv(el, photo, name) {
        if (!el) return;
        if (photo) { el.style.backgroundImage = `url('${photo}')`; el.innerText = ''; }
        else { el.style.backgroundImage = 'none'; el.innerText = name ? name[0].toUpperCase() : '?'; }
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            me = user;
            db.ref('users/'+user.uid).on('value', s => {
                meData = s.val(); if (!meData) return;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('my-name-small').innerHTML = meData.name + getBadge(meData);
                document.getElementById('my-un-small').innerText = '@' + meData.username;
                drawAv(document.getElementById('my-av-small'), meData.photo, meData.name);
                if (meData.role === 'admin') document.getElementById('admin-btn').style.display = 'block';
                
                db.ref('users/'+user.uid).update({online: true});
                db.ref('users/'+user.uid).onDisconnect().update({online: false});
            });
            loadChats();
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
        }
    });

    function loadChats() {
        db.ref('chats').on('value', async s => {
            const container = document.getElementById('user-chats');
            container.innerHTML = '';
            const data = s.val() || {};
            for (let id in data) {
                if (id.includes(me.uid) && !data[id][me.uid+'_hidden']) {
                    const otherId = id.replace(me.uid, '').replace('_', '');
                    const uSnap = await db.ref('users/'+otherId).once('value');
                    const u = uSnap.val();
                    if (!u) continue;

                    const div = document.createElement('div');
                    div.className = `chat-item ${activeChatId === id ? 'active' : ''} ${u.online ? 'is-online' : ''}`;
                    div.onclick = () => openChat(id, u);
                    div.innerHTML = `
                        <div class="avatar" id="av-${u.uid}"><div class="online-dot"></div></div>
                        <div style="overflow:hidden">
                            <div style="font-weight:600">${u.name}${getBadge(u)}</div>
                            <div class="u-status ${u.online ? 'on' : 'off'}">${u.online ? 'в сети' : 'был(а) недавно'}</div>
                        </div>
                    `;
                    container.appendChild(div);
                    drawAv(document.getElementById('av-'+u.uid), u.photo, u.name);
                }
            }
        });
    }

    function openChat(id, user) {
        activeChatId = id; currentPeerId = user.uid;
        document.getElementById('tab-title').innerText = user.name + " | Untitled";
        document.getElementById('empty-chat').style.display = 'none';
        document.getElementById('active-chat-ui').style.display = 'flex';
        document.getElementById('active-name').innerText = user.name;
        document.getElementById('active-badge').innerHTML = getBadge(user);
        document.getElementById('active-status').innerText = user.online ? 'в сети' : 'был(а) недавно';
        document.getElementById('active-status').className = 'u-status ' + (user.online ? 'on' : 'off');
        drawAv(document.getElementById('active-av'), user.photo, user.name);

        db.ref('messages/'+id).off();
        db.ref('messages/'+id).on('value', s => {
            const box = document.getElementById('messages-box');
            const msgs = s.val() || {};
            const keys = Object.keys(msgs);
            if (keys.length > 0 && msgs[keys[keys.length-1]].from !== me.uid) {
                document.getElementById('notif-sound').play().catch(()=>{});
            }
            box.innerHTML = '';
            Object.values(msgs).forEach(m => {
                const mDiv = document.createElement('div');
                mDiv.className = `message ${m.from === me.uid ? 'mine' : 'theirs'}`;
                mDiv.innerText = m.text;
                box.appendChild(mDiv);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg() {
        const inp = document.getElementById('msg-input');
        if (!inp.value.trim() || !activeChatId) return;
        const otherId = activeChatId.replace(me.uid, '').replace('_', '');
        db.ref('messages/'+activeChatId).push({ from: me.uid, text: inp.value, ts: Date.now() });
        db.ref('chats/'+activeChatId).update({ lastMsg: inp.value, [me.uid+'_hidden']: false, [otherId+'_hidden']: false });
        inp.value = '';
    }

    async function handleAuth() {
        const email = document.getElementById('auth-email').value, pass = document.getElementById('auth-pass').value;
        try {
            if (isReg) {
                const un = document.getElementById('auth-username').value.toLowerCase().trim();
                const res = await auth.createUserWithEmailAndPassword(email, pass);
                await db.ref('users/'+res.user.uid).set({ uid: res.user.uid, name: document.getElementById('auth-name').value, username: un, email, role: 'user', online: true, verified: false, photo: '' });
                await db.ref('usernames/'+un).set(res.user.uid);
            } else { await auth.signInWithEmailAndPassword(email, pass); }
        } catch(e) { alert(e.message); }
    }

    function showProfile(type, uid) {
        const targetId = uid || me.uid;
        db.ref('users/'+targetId).once('value', s => {
            const u = s.val();
            drawAv(document.getElementById('modal-av'), u.photo, u.name);
            if (type === 'me') {
                document.getElementById('edit-mode').style.display = 'block';
                document.getElementById('view-mode').style.display = 'none';
                document.getElementById('edit-name').value = u.name;
                document.getElementById('edit-bio').value = u.bio || '';
            } else {
                document.getElementById('edit-mode').style.display = 'none';
                document.getElementById('view-mode').style.display = 'block';
                document.getElementById('view-name').innerHTML = u.name + getBadge(u);
                document.getElementById('view-bio').innerText = u.bio || 'Нет описания';
                document.getElementById('chat-start-btn').onclick = () => {
                    const id = [me.uid, u.uid].sort().join('_');
                    openChat(id, u); closeModal();
                };
            }
            document.getElementById('modal').style.display = 'flex';
        });
    }

    async function uploadPhoto(input) {
        if (!input.files[0]) return;
        const fd = new FormData(); fd.append('image', input.files[0]);
        const r = await fetch('https://api.imgbb.com/1/upload?key='+IMGBB_KEY, {method:'POST', body:fd});
        const d = await r.json();
        await db.ref('users/'+me.uid).update({photo: d.data.url});
        drawAv(document.getElementById('modal-av'), d.data.url, meData.name);
    }

    async function saveProfile() {
        await db.ref('users/'+me.uid).update({ name: document.getElementById('edit-name').value, bio: document.getElementById('edit-bio').value });
        closeModal();
    }

    function searchUsers(v) {
        const res = document.getElementById('search-results');
        if (!v.trim()) { res.innerHTML = ''; return; }
        db.ref('users').orderByChild('username').startAt(v.toLowerCase()).endAt(v.toLowerCase()+'\uf8ff').once('value', s => {
            res.innerHTML = '<div class="list-label">Результаты поиска</div>';
            Object.values(s.val() || {}).forEach(u => {
                if (u.uid === me.uid) return;
                const div = document.createElement('div');
                div.className = 'chat-item';
                div.innerHTML = `<div class="avatar" id="s-${u.uid}"></div><div><b>${u.name}${getBadge(u)}</b><br><small>@${u.username}</small></div>`;
                div.onclick = () => showProfile('other', u.uid);
                res.appendChild(div);
                drawAv(document.getElementById('s-'+u.uid), u.photo, u.name);
            });
        });
    }

    function toggleAuth() { isReg = !isReg; document.getElementById('reg-fields').style.display = isReg?'block':'none'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
</script>
</body>
</html>
