<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tab-title">Untitled Messenger</title>
    <style>
        :root {
            --bg: #000; --side: #0a0a0a; --card: #1c1c1e; --accent: #007aff;
            --text: #fff; --text-dim: #8e8e93; --border: #2c2c2e;
            --online: #32d74b; --offline: #48484a; --gold: #ffcc00; --blue: #0095f6; --danger: #ff3b30;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* Sidebar & Layout */
        .sidebar { width: 320px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
        .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.02); transition: 0.2s; }
        .chat-item:hover { background: #1a1a1a; }
        .chat-item.active { background: #1a1a1a; border-left: 3px solid var(--accent); }

        .avatar-wrapper { position: relative; flex-shrink: 0; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: #222; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid var(--border); overflow: hidden; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--side); position: absolute; bottom: 0; right: 0; background: var(--offline); }
        .status-dot.online { background: var(--online); }

        /* Messages */
        .main-chat { flex: 1; display: flex; flex-direction: column; background: #000; }
        .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 70%; padding: 10px 15px; border-radius: 18px; font-size: 15px; position: relative; line-height: 1.4; }
        .msg.mine { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 4px; padding-right: 40px; }
        .msg.theirs { background: var(--card); align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg-status { position: absolute; bottom: 4px; right: 10px; font-size: 10px; opacity: 0.6; }

        /* UI Elements */
        .dropdown-menu { display: none; position: fixed; background: #2c2c2e; border: 1px solid var(--border); border-radius: 12px; z-index: 10000; width: 200px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .menu-item { padding: 12px 16px; cursor: pointer; font-size: 14px; }
        .menu-item:hover { background: #3a3a3c; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 5000; align-items: center; justify-content: center; }
        .modal-box { background: var(--card); padding: 25px; border-radius: 24px; width: 90%; max-width: 400px; text-align: center; border: 1px solid var(--border); }
        
        input, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); border-radius: 10px; color: #fff; margin-bottom: 10px; outline: none; }
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; background: var(--accent); color: #fff; margin-top: 5px; }
        
        .badge { display: inline-block; width: 16px; height: 16px; border-radius: 50%; font-size: 10px; margin-left: 5px; text-align: center; line-height: 16px; font-weight: bold; }
        .badge-gold { background: var(--gold); color: #000; }
        .badge-blue { background: var(--blue); color: #fff; }
        
        #search-results { background: #050505; max-height: 150px; overflow-y: auto; }
    </style>
</head>
<body>

<div id="settings-menu" class="dropdown-menu">
    <div class="menu-item" onclick="openEditProfile()">Редактировать профиль</div>
    <div id="admin-btn" class="menu-item" style="display:none; color:var(--gold)" onclick="openAdmin()">Админ-панель</div>
    <div class="menu-item" style="color:var(--danger)" onclick="auth.signOut().then(()=>location.reload())">Выйти</div>
</div>

<div id="modal" class="modal">
    <div class="modal-box">
        <div class="avatar" id="modal-av" style="width:80px; height:80px; margin:0 auto 15px; font-size:24px"></div>
        <h3 id="view-name"></h3>
        <p id="view-un" style="color:var(--accent); margin-bottom:15px"></p>
        
        <div id="edit-form" style="display:none">
            <input type="text" id="edit-name" placeholder="Имя">
            <input type="text" id="edit-username" placeholder="Юзернейм">
            <textarea id="edit-bio" placeholder="О себе..."></textarea>
            <button class="btn" onclick="saveProfile()">Сохранить изменения</button>
            <button class="btn" style="background:#333" onclick="document.getElementById('file-inp').click()">Сменить фото</button>
            <input type="file" id="file-inp" hidden onchange="uploadPhoto(this)">
        </div>
        <button class="btn" style="background:none; color:var(--text-dim)" onclick="closeModal()">Закрыть</button>
    </div>
</div>

<div id="admin-modal" class="modal">
    <div class="modal-box" style="max-width:500px">
        <h3>Управление пользователями</h3>
        <div id="admin-list" style="margin:20px 0; text-align:left; max-height:300px; overflow-y:auto"></div>
        <button class="btn" onclick="this.parentElement.parentElement.style.display='none'">Закрыть</button>
    </div>
</div>

<div id="auth-screen" class="modal" style="display:flex">
    <div class="modal-box">
        <h2 style="margin-bottom:20px">Untitled</h2>
        <div id="reg-fields" style="display:none">
            <input type="text" id="auth-name" placeholder="Имя">
            <input type="text" id="auth-un" placeholder="Юзернейм">
        </div>
        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button class="btn" onclick="handleAuth()">Продолжить</button>
        <p onclick="toggleAuth()" id="auth-toggle-text" style="color:var(--text-dim); font-size:13px; margin-top:15px; cursor:pointer">Зарегистрироваться</p>
    </div>
</div>

<div class="sidebar">
    <div style="padding:20px">
        <input type="text" placeholder="Поиск @юзернейм..." oninput="searchUsers(this.value)">
        <div id="search-results"></div>
    </div>
    <div class="chat-list" id="user-chats" style="flex:1"></div>
    <div style="padding:15px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between">
        <div style="display:flex; align-items:center; gap:12px; cursor:pointer" onclick="showProfile('me')">
            <div class="avatar" id="my-av-small"></div>
            <div>
                <div id="my-name-small" style="font-weight:600; font-size:14px"></div>
                <div id="my-un-small" style="color:var(--text-dim); font-size:12px"></div>
            </div>
        </div>
        <div style="cursor:pointer; font-size:20px" onclick="toggleSettingsMenu(event)">⋮</div>
    </div>
</div>

<div class="main-chat">
    <div id="active-chat-ui" style="display:none; flex-direction:column; height:100%">
        <div style="padding:15px 25px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px">
            <div id="active-av" class="avatar"></div>
            <div>
                <div style="font-weight:600"><span id="active-name"></span><span id="active-badge"></span></div>
                <div id="active-un" style="color:var(--accent); font-size:12px"></div>
            </div>
        </div>
        <div class="messages-container" id="messages-box"></div>
        <div style="padding:20px; display:flex; gap:10px">
            <input type="text" id="msg-input" placeholder="Сообщение..." style="margin:0" onkeydown="if(event.key==='Enter') sendMsg()">
            <button class="btn" onclick="sendMsg()" style="width:60px; margin:0">➤</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const IMGBB_KEY = "db82b9743e8c49d89b26bf5392e1578f";
    const firebaseConfig = {
        apiKey: "AIzaSyB6s4lfDc_eHL1ojTS3w_NV8WkjPHfwFcE",
        authDomain: "umessege-e77fd.firebaseapp.com",
        databaseURL: "https://umessege-e77fd-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "umessege-e77fd"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    let me = null, meData = null, activeChatId = null, currentPeerId = null, isReg = false;

    // Вспомогательные функции
    const getBadge = u => u.role==='admin' ? '<span class="badge badge-gold">✓</span>' : (u.verified ? '<span class="badge badge-blue">✓</span>' : '');
    
    function drawAv(el, photo, name) {
        if (!el) return;
        el.style.backgroundImage = photo ? `url(${photo})` : 'none';
        el.innerText = photo ? '' : (name ? name[0].toUpperCase() : '?');
    }

    // Авторизация
    auth.onAuthStateChanged(user => {
        if (user) {
            me = user;
            db.ref('users/'+user.uid).on('value', s => {
                meData = s.val();
                if(!meData) return;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('my-name-small').innerHTML = meData.name + getBadge(meData);
                document.getElementById('my-un-small').innerText = '@' + meData.username;
                drawAv(document.getElementById('my-av-small'), meData.photo, meData.name);
                document.getElementById('admin-btn').style.display = meData.role === 'admin' ? 'block' : 'none';
                db.ref('users/'+me.uid+'/online').set(true);
            });
            loadChats();
        }
    });

    async function handleAuth() {
        const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
        try {
            if(isReg) {
                const name = document.getElementById('auth-name').value, un = document.getElementById('auth-un').value.toLowerCase().trim();
                const check = await db.ref('users').orderByChild('username').equalTo(un).once('value');
                if(check.exists()) return alert("Юзернейм занят");
                const res = await auth.createUserWithEmailAndPassword(e,p);
                await db.ref('users/'+res.user.uid).set({ uid: res.user.uid, name, username: un, role: 'user', verified: false });
            } else await auth.signInWithEmailAndPassword(e,p);
        } catch(err) { alert(err.message); }
    }

    function toggleAuth() { isReg = !isReg; document.getElementById('reg-fields').style.display = isReg ? 'block' : 'none'; }

    // Поиск и Чаты
    async function searchUsers(val) {
        const resDiv = document.getElementById('search-results');
        if (val.length < 2) { resDiv.innerHTML = ''; return; }
        const snap = await db.ref('users').orderByChild('username').startAt(val).endAt(val + '\uf8ff').once('value');
        resDiv.innerHTML = '';
        snap.forEach(child => {
            const u = child.val(); if(u.uid === me.uid) return;
            const d = document.createElement('div');
            d.className = 'chat-item'; d.innerHTML = `<b>${u.name}</b> <small>@${u.username}</small>`;
            d.onclick = () => startChat(u);
            resDiv.appendChild(d);
        });
    }

    function startChat(u) {
        const id = me.uid < u.uid ? `${me.uid}_${u.uid}` : `${u.uid}_${me.uid}`;
        db.ref('chats/'+id).update({exists: true});
        document.getElementById('search-results').innerHTML = '';
        openChat(id, u);
    }

    function openChat(id, u) {
        activeChatId = id; currentPeerId = u.uid;
        document.getElementById('active-chat-ui').style.display = 'flex';
        document.getElementById('active-name').innerText = u.name;
        document.getElementById('active-un').innerText = '@'+u.username;
        document.getElementById('active-badge').innerHTML = getBadge(u);
        drawAv(document.getElementById('active-av'), u.photo, u.name);
        
        db.ref('messages/'+id).off();
        db.ref('messages/'+id).on('value', s => {
            const box = document.getElementById('messages-box'); box.innerHTML = '';
            const data = s.val() || {};
            Object.keys(data).forEach(mId => {
                const m = data[mId];
                if(m.from !== me.uid && !m.read) db.ref('messages/'+id+'/'+mId+'/read').set(true);
                const d = document.createElement('div');
                d.className = `msg ${m.from === me.uid ? 'mine' : 'theirs'}`;
                d.innerHTML = `${m.text} <span class="msg-status">${m.from===me.uid ? (m.read?'✓✓':'✓'):''}</span>`;
                box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg() {
        const v = document.getElementById('msg-input').value; if(!v.trim()) return;
        db.ref('messages/'+activeChatId).push({ from: me.uid, text: v, read: false, time: Date.now() });
        document.getElementById('msg-input').value = '';
    }

    function loadChats() {
        db.ref('chats').on('value', async s => {
            const cont = document.getElementById('user-chats'); cont.innerHTML = '';
            const data = s.val() || {};
            for(let id in data) {
                if(id.includes(me.uid)) {
                    const oId = id.replace(me.uid, '').replace('_', '');
                    const u = (await db.ref('users/'+oId).once('value')).val();
                    if(!u) continue;
                    const d = document.createElement('div');
                    d.className = `chat-item ${activeChatId===id?'active':''}`;
                    d.innerHTML = `<div class="avatar" id="av-${u.uid}"></div><div><b>${u.name}</b><br><small>@${u.username}</small></div>`;
                    d.onclick = () => openChat(id, u);
                    cont.appendChild(d);
                    drawAv(document.getElementById('av-'+u.uid), u.photo, u.name);
                }
            }
        });
    }

    // Профиль и Админка
    function openEditProfile() {
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('edit-form').style.display = 'block';
        document.getElementById('edit-name').value = meData.name;
        document.getElementById('edit-username').value = meData.username;
        document.getElementById('edit-bio').value = meData.bio || '';
        drawAv(document.getElementById('modal-av'), meData.photo, meData.name);
    }

    async function saveProfile() {
        const name = document.getElementById('edit-name').value, un = document.getElementById('edit-username').value.toLowerCase().trim();
        if(un !== meData.username) {
            const check = await db.ref('users').orderByChild('username').equalTo(un).once('value');
            if(check.exists()) return alert("Ник занят");
        }
        db.ref('users/'+me.uid).update({ name, username: un, bio: document.getElementById('edit-bio').value });
        closeModal();
    }

    async function uploadPhoto(input) {
        const file = input.files[0]; if(!file) return;
        const fd = new FormData(); fd.append("image", file);
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: fd });
        const json = await res.json();
        db.ref('users/'+me.uid+'/photo').set(json.data.url);
    }

    function openAdmin() {
        document.getElementById('admin-modal').style.display = 'flex';
        const list = document.getElementById('admin-list'); list.innerHTML = 'Загрузка...';
        db.ref('users').once('value', s => {
            list.innerHTML = '';
            s.forEach(child => {
                const u = child.val();
                const d = document.createElement('div');
                d.style = "display:flex; justify-content:space-between; margin-bottom:10px; padding:5px; border-bottom:1px solid #333";
                d.innerHTML = `<span>${u.name} (@${u.username})</span>
                    <div>
                        <button onclick="updateUser('${u.uid}', 'verified', ${!u.verified})">Galo4ka</button>
                        <button onclick="updateUser('${u.uid}', 'role', '${u.role==='admin'?'user':'admin'}')">Admin</button>
                    </div>`;
                list.appendChild(d);
            });
        });
    }

    function updateUser(uid, key, val) { db.ref('users/'+uid).update({[key]: val}).then(()=>openAdmin()); }
    function closeModal() { document.getElementById('modal').style.display='none'; document.getElementById('edit-form').style.display='none'; }
    function toggleSettingsMenu(e) { 
        const m = document.getElementById('settings-menu');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
        m.style.left = (e.pageX - 180) + 'px'; m.style.top = (e.pageY + 10) + 'px';
    }
    document.addEventListener('click', (e) => { if(!e.target.closest('.sidebar')) document.getElementById('settings-menu').style.display='none'; });
</script>
</body>
</html>
