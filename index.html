<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlameChat — Мессенджер</title>
<style>
  :root {
    --bg: #0e1621; --sidebar: #17212b; --panel: #1c2733; --bubble-in: #182533;
    --bubble-out: #2b5278; --accent: #5288c1; --accent2: #64b5f6; --text: #e8e8e8;
    --sub: #708499; --border: #ffffff12; --online: #4caf50; --read: #64b5f6;
    --unread: #708499; --red: #ef5350; --green: #4caf50; --yellow: #ffc107;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

  /* AUTH */
  #auth-screen { display: flex; align-items: center; justify-content: center; height: 100vh; }
  .auth-box { background: var(--sidebar); border-radius: 16px; padding: 40px 36px; width: 360px; box-shadow: 0 20px 60px #00000060; }
  .auth-logo { font-size: 42px; text-align: center; margin-bottom: 8px; }
  .auth-title { text-align: center; font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .auth-sub { text-align: center; color: var(--sub); font-size: 13px; margin-bottom: 28px; }
  .auth-tabs { display: flex; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 24px; }
  .auth-tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-size: 14px; background: transparent; border: none; color: var(--sub); transition: .2s; }
  .auth-tab.active { background: var(--accent); color: #fff; font-weight: 600; }
  .auth-form input { width: 100%; padding: 12px 14px; margin-bottom: 12px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; outline: none; }
  .auth-btn { width: 100%; padding: 13px; background: var(--accent); border: none; border-radius: 10px; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; }
  .auth-error { color: var(--red); font-size: 12px; margin-top: 8px; text-align: center; }

  /* APP */
  #app { display: none; height: 100vh; flex-direction: row; }
  .sidebar { width: 320px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-header { padding: 14px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
  .search-wrap { flex: 1; position: relative; }
  .search-wrap input { width: 100%; padding: 8px 12px 8px 34px; background: var(--panel); border: none; border-radius: 20px; color: var(--text); font-size: 13px; outline: none; }
  .chat-list { overflow-y: auto; flex: 1; }
  .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; }
  .chat-item:hover { background: var(--panel); }
  .chat-item.active { background: #5288c122; }
  .avatar { width: 46px; height: 46px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; flex-shrink: 0; position: relative; }
  .online-dot { position: absolute; bottom: 1px; right: 1px; width: 11px; height: 11px; border-radius: 50%; background: var(--online); border: 2px solid var(--sidebar); }
  .chat-info { flex: 1; min-width: 0; }
  .chat-name { font-size: 14px; font-weight: 600; }
  .chat-last { font-size: 12px; color: var(--sub); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .unread-badge { background: var(--accent); color: #fff; border-radius: 20px; font-size: 11px; padding: 1px 6px; }

  .chat-area { flex: 1; display: flex; flex-direction: column; background: #0e1621; }
  .chat-header { padding: 12px 18px; background: var(--sidebar); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .messages-wrap { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
  .msg-row { display: flex; flex-direction: column; max-width: 70%; }
  .msg-row.out { align-self: flex-end; }
  .msg-row.in { align-self: flex-start; }
  .bubble { padding: 8px 12px; border-radius: 12px; font-size: 14px; position: relative; }
  .msg-row.out .bubble { background: var(--bubble-out); }
  .msg-row.in .bubble { background: var(--bubble-in); }
  .bubble-footer { font-size: 10px; color: var(--sub); text-align: right; margin-top: 4px; }

  .input-bar { padding: 12px 16px; background: var(--sidebar); display: flex; gap: 10px; align-items: center; }
  .input-bar textarea { flex: 1; background: var(--panel); border: none; border-radius: 20px; padding: 10px 16px; color: var(--text); outline: none; resize: none; }

  /* ADMIN */
  #admin-screen { display: none; position: fixed; inset: 0; background: #0d1117; z-index: 1000; overflow-y: auto; }
  .admin-nav { background: #161b22; border-bottom: 1px solid #30363d; padding: 0 24px; display: flex; align-items: center; position: sticky; top: 0; }
  .admin-tab { padding: 16px; cursor: pointer; color: var(--sub); background: none; border: none; border-bottom: 2px solid transparent; }
  .admin-tab.active { color: var(--accent2); border-bottom-color: var(--accent2); }
  .admin-body { padding: 24px; }
  .admin-table { width: 100%; border-collapse: collapse; background: #161b22; border-radius: 8px; overflow: hidden; }
  .admin-table th, .admin-table td { padding: 12px; text-align: left; border-bottom: 1px solid #30363d; }
  .tbl-btn { padding: 4px 8px; border-radius: 4px; cursor: pointer; border: 1px solid #30363d; background: transparent; color: white; margin-right: 4px; }
  .tbl-btn.d { color: var(--red); }
  .tbl-btn.s { color: var(--green); }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 1001; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--panel); padding: 24px; border-radius: 12px; width: 320px; }
  .modal-btns { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">🔥</div>
    <div class="auth-title">FlameChat</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Войти</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Регистрация</button>
    </div>
    <div class="auth-form" id="login-form">
      <input type="email" id="login-email" placeholder="Email" />
      <input type="password" id="login-pass" placeholder="Пароль" />
      <button class="auth-btn" onclick="doLogin()">Войти</button>
    </div>
    <div class="auth-form" id="register-form" style="display:none">
      <input type="text" id="reg-name" placeholder="Имя" />
      <input type="email" id="reg-email" placeholder="Email" />
      <input type="password" id="reg-pass" placeholder="Пароль" />
      <button class="auth-btn" onclick="doRegister()">Создать аккаунт</button>
    </div>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<div id="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="search-wrap"><input type="text" placeholder="Поиск..." oninput="filterChats(this.value)"></div>
      <button style="background:var(--accent); border:none; color:white; width:30px; height:30px; border-radius:50%; cursor:pointer;" onclick="openModal('new-chat-modal')">+</button>
    </div>
    <div class="chat-list" id="chat-list"></div>
    <div style="padding: 10px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px;">
        <div id="my-av" class="avatar" style="width:35px; height:35px; font-size:14px; cursor:pointer;" onclick="openModal('profile-modal')"></div>
        <div id="my-name-el" style="flex:1; font-size:13px; font-weight:600; overflow:hidden;"></div>
        <button id="admin-btn" style="display:none; background:none; border:none; cursor:pointer; font-size:18px;" onclick="openAdmin()">⚙️</button>
    </div>
  </div>
  <div class="chat-area">
    <div id="no-chat" style="flex:1; display:flex; align-items:center; justify-content:center; color:var(--sub);">Выберите чат</div>
    <div id="active-chat" style="display:none; flex-direction:column; flex:1;">
      <div class="chat-header">
        <div id="ch-av" class="avatar" style="width:35px; height:35px;"></div>
        <span id="ch-name" style="font-weight:700;"></span>
      </div>
      <div class="messages-wrap" id="msgs"></div>
      <div class="input-bar">
        <textarea id="msg-input" placeholder="Сообщение..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
        <button onclick="sendMsg()" style="background:none; border:none; color:var(--accent); font-size:24px; cursor:pointer;">➤</button>
      </div>
    </div>
  </div>
</div>

<div id="admin-screen">
  <nav class="admin-nav">
    <div style="font-weight:800; color:var(--accent2); margin-right:20px;">ADMIN</div>
    <button class="admin-tab active" onclick="aTab(this,'ausers')">Пользователи</button>
    <button class="admin-tab" onclick="aTab(this,'amsgs')">Сообщения</button>
    <button onclick="closeAdmin()" style="margin-left:auto; background:none; border:none; color:white; cursor:pointer;">✕</button>
  </nav>
  <div class="admin-body">
    <div id="ausers" class="admin-sec">
      <table class="admin-table">
        <thead><tr><th>Имя</th><th>Email</th><th>Роль</th><th>Статус</th><th>Действия</th></tr></thead>
        <tbody id="ausers-body"></tbody>
      </table>
    </div>
    <div id="amsgs" class="admin-sec" style="display:none">
        <table class="admin-table">
            <thead><tr><th>От</th><th>Текст</th><th>Действия</th></tr></thead>
            <tbody id="amsgs-body"></tbody>
        </table>
    </div>
  </div>
</div>

<div class="modal-overlay" id="new-chat-modal">
  <div class="modal">
    <h3>Новый чат</h3>
    <input type="text" id="nc-name" placeholder="Имя пользователя" style="width:100%; padding:8px; margin-top:10px; background:var(--bg); border:1px solid var(--border); color:white;">
    <div class="modal-btns">
      <button onclick="closeModal('new-chat-modal')">Отмена</button>
      <button onclick="createChat()" style="color:var(--accent)">Начать</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="profile-modal">
    <div class="modal" style="text-align:center;">
      <h3 id="pm-name">Профиль</h3>
      <p id="pm-role" style="color:var(--sub); font-size:12px; margin-bottom:15px;"></p>
      <button onclick="doLogout()" style="width:100%; padding:10px; background:var(--red); border:none; color:white; border-radius:8px; cursor:pointer;">Выйти</button>
      <button onclick="closeModal('profile-modal')" style="margin-top:10px; background:none; border:none; color:var(--sub); cursor:pointer;">Закрыть</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, set, get, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB6s4lfDc_eHL1ojTS3w_NV8WkjPHfwFcE",
  authDomain: "umessege-e77fd.firebaseapp.com",
  databaseURL: "https://umessege-e77fd-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "umessege-e77fd",
  storageBucket: "umessege-e77fd.firebasestorage.app",
  messagingSenderId: "20493632508",
  appId: "1:20493632508:web:6c2b2e1281fcb32f392879"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let me = null, meData = null, activeCid = null, activeOtherUid = null;
let usersCache = {}, chatsCache = {}, msgsCache = {};

// Хелперы
const init2 = s => (s||'').slice(0,2).toUpperCase();
const clr = n => { const c=['#5288c1','#4caf50','#e91e63','#ff9800']; let h=0; for(let x of(n||'')) h=(h*31+x.charCodeAt(0))%c.length; return c[h]; };
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// Глобальные функции
window.switchTab = (tab) => {
    document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
};

window.doLogin = async () => {
    const e = document.getElementById('login-email').value, p = document.getElementById('login-pass').value;
    try { await signInWithEmailAndPassword(auth, e, p); } catch(err) { document.getElementById('auth-error').innerText = "Ошибка входа"; }
};

window.doRegister = async () => {
    const n = document.getElementById('reg-name').value, e = document.getElementById('reg-email').value, p = document.getElementById('reg-pass').value;
    if(!n || p.length < 6) return;
    try {
        const res = await createUserWithEmailAndPassword(auth, e, p);
        const isFirst = (await get(ref(db, 'users'))).size === 0;
        await set(ref(db, `users/${res.user.uid}`), { name: n, email: e, uid: res.user.uid, role: 'user', verified: false, createdAt: Date.now() });
        location.reload();
    } catch(err) { alert(err.message); }
};

window.doLogout = () => signOut(auth);
window.openModal = (id) => document.getElementById(id).classList.add('open');
window.closeModal = (id) => document.getElementById(id).classList.remove('open');

onAuthStateChanged(auth, async (user) => {
    if(user) {
        me = user;
        onValue(ref(db, `users/${user.uid}`), s => {
            meData = s.val();
            if(meData?.banned) { alert("Вы забанены"); signOut(auth); return; }
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('my-name-el').innerText = meData.name;
            document.getElementById('my-av').innerText = init2(meData.name);
            document.getElementById('my-av').style.background = clr(meData.name);
            document.getElementById('pm-name').innerText = meData.name;
            document.getElementById('pm-role').innerText = meData.role === 'admin' ? "Администратор" : "Пользователь";
            if(meData.role === 'admin') document.getElementById('admin-btn').style.display = 'block';
            initData();
        });
    } else {
        document.getElementById('auth-screen').style.display = 'flex';
        document.getElementById('app').style.display = 'none';
    }
});

function initData() {
    onValue(ref(db, 'users'), s => { usersCache = s.val() || {}; renderAdminUsers(); });
    onValue(ref(db, 'chats'), s => { chatsCache = s.val() || {}; renderList(); });
    onValue(ref(db, 'messages'), s => { msgsCache = s.val() || {}; renderAdminMsgs(); });
}

window.renderList = (filter = "") => {
    const list = document.getElementById('chat-list');
    let html = "";
    Object.entries(chatsCache).forEach(([cid, chat]) => {
        if(!cid.includes(me.uid)) return;
        const ouid = cid.split('_').find(u => u !== me.uid);
        const u = usersCache[ouid];
        if(!u || (filter && !u.name.toLowerCase().includes(filter.toLowerCase()))) return;
        html += `<div class="chat-item ${activeCid === cid ? 'active' : ''}" onclick="openChat('${cid}', '${ouid}')">
            <div class="avatar" style="background:${clr(u.name)}">${init2(u.name)}</div>
            <div class="chat-info">
                <div class="chat-name">${u.name} ${u.verified ? '✔️' : ''}</div>
                <div class="chat-last">${chat.lastMsg || 'Нет сообщений'}</div>
            </div>
        </div>`;
    });
    list.innerHTML = html;
};

window.openChat = (cid, ouid) => {
    activeCid = cid; activeOtherUid = ouid;
    const u = usersCache[ouid];
    document.getElementById('no-chat').style.display = 'none';
    document.getElementById('active-chat').style.display = 'flex';
    document.getElementById('ch-name').innerText = u.name;
    document.getElementById('ch-av').innerText = init2(u.name);
    document.getElementById('ch-av').style.background = clr(u.name);
    
    onValue(ref(db, `messages/${cid}`), s => {
        const msgs = s.val() || {};
        let h = "";
        Object.values(msgs).sort((a,b)=>a.ts-b.ts).forEach(m => {
            h += `<div class="msg-row ${m.from === me.uid ? 'out' : 'in'}">
                <div class="bubble">${esc(m.text)}</div>
            </div>`;
        });
        document.getElementById('msgs').innerHTML = h;
        document.getElementById('msgs').scrollTop = 99999;
    });
    renderList();
};

window.sendMsg = async () => {
    const inp = document.getElementById('msg-input'), txt = inp.value.trim();
    if(!txt || !activeCid) return;
    const ts = Date.now();
    await push(ref(db, `messages/${activeCid}`), { from: me.uid, text: txt, ts });
    await update(ref(db, `chats/${activeCid}`), { lastMsg: txt, lastTs: ts });
    inp.value = "";
};

window.createChat = async () => {
    const name = document.getElementById('nc-name').value.trim();
    const target = Object.values(usersCache).find(u => u.name === name);
    if(!target || target.uid === me.uid) return alert("Пользователь не найден");
    const cid = [me.uid, target.uid].sort().join('_');
    await update(ref(db, `chats/${cid}`), { users: [me.uid, target.uid], lastMsg: "Чат создан" });
    closeModal('new-chat-modal');
    openChat(cid, target.uid);
};

// ADMIN FUNCTIONS
window.openAdmin = () => { if(meData.role==='admin') document.getElementById('admin-screen').style.display='block'; };
window.closeAdmin = () => document.getElementById('admin-screen').style.display='none';
window.aTab = (btn, sec) => {
    document.querySelectorAll('.admin-tab').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.admin-sec').forEach(s=>s.style.display='none');
    btn.classList.add('active');
    document.getElementById(sec).style.display='block';
};

function renderAdminUsers() {
    const b = document.getElementById('ausers-body');
    b.innerHTML = Object.values(usersCache).map(u => `<tr>
        <td>${u.name}</td><td>${u.email}</td><td>${u.role}</td>
        <td>${u.banned ? 'БАН' : 'ОК'}</td>
        <td>
            <button class="tbl-btn s" onclick="aVerify('${u.uid}', ${!u.verified})">${u.verified?'Снять':'Вериф'}</button>
            <button class="tbl-btn" onclick="aBan('${u.uid}', ${!u.banned})">${u.banned?'Разбан':'Бан'}</button>
            <button class="tbl-btn d" onclick="aDeleteUser('${u.uid}')">Удалить</button>
        </td>
    </tr>`).join('');
}

function renderAdminMsgs() {
    let h = "";
    Object.entries(msgsCache).forEach(([cid, list]) => {
        Object.entries(list).forEach(([mid, m]) => {
            const from = usersCache[m.from]?.name || "???";
            h += `<tr><td>${from}</td><td>${esc(m.text)}</td><td><button class="tbl-btn d" onclick="aDelMsg('${cid}','${mid}')">X</button></td></tr>`;
        });
    });
    document.getElementById('amsgs-body').innerHTML = h;
}

window.aVerify = (uid, v) => update(ref(db, `users/${uid}`), { verified: v });
window.aBan = (uid, b) => update(ref(db, `users/${uid}`), { banned: b });
window.aDeleteUser = (uid) => { if(confirm("Удалить?")) remove(ref(db, `users/${uid}`)); };
window.aDelMsg = (cid, mid) => remove(ref(db, `messages/${cid}/${mid}`));
</script>
</body>
</html>
