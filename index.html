<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flame — Minimal Dark</title>
    <style>
        :root {
            --bg: #000000;
            --side: #0a0a0a;
            --card: #111111;
            --accent: #007aff;
            --text: #ffffff;
            --text-dim: #888888;
            --border: #1a1a1a;
            --red: #ff3b30;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Auth Screen */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .auth-card { background: var(--card); padding: 40px; border-radius: 24px; width: 100%; max-width: 400px; text-align: center; }
        .auth-card h2 { margin-bottom: 24px; font-weight: 500; }
        .auth-card input { width: 100%; padding: 14px; margin-bottom: 12px; background: #1a1a1a; border: none; border-radius: 12px; color: #fff; outline: none; }
        .auth-card button { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 12px; color: #fff; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .auth-card button:hover { opacity: 0.8; }
        .auth-toggle { margin-top: 16px; font-size: 14px; color: var(--text-dim); cursor: pointer; }

        /* Main App Layout */
        #app { display: none; height: 100vh; grid-template-columns: 320px 1fr; }

        /* Sidebar */
        .sidebar { background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .side-header { padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .side-title { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }
        
        .search-box { padding: 16px; }
        .search-box input { width: 100%; padding: 10px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: #fff; outline: none; font-size: 14px; }

        .list-container { flex: 1; overflow-y: auto; padding-bottom: 20px; }
        .list-label { padding: 10px 24px; font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        .item { display: flex; align-items: center; gap: 12px; padding: 12px 24px; cursor: pointer; transition: 0.1s; }
        .item:hover { background: var(--card); }
        .item.active { background: #007aff15; border-right: 3px solid var(--accent); }
        
        .avatar { width: 44px; height: 44px; border-radius: 14px; background: var(--card); display: flex; align-items: center; justify-content: center; font-weight: 600; flex-shrink: 0; background-size: cover; }
        .item-info { overflow: hidden; }
        .item-name { font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 4px; }
        .item-last { font-size: 13px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .v-badge { color: var(--accent); font-size: 12px; }

        /* Chat Area */
        .chat-main { background: var(--bg); display: flex; flex-direction: column; position: relative; }
        .chat-header { padding: 18px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        
        .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 70%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.4; }
        .msg.in { background: var(--card); align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg.out { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 4px; }

        .input-area { padding: 20px 24px; border-top: 1px solid var(--border); display: flex; gap: 12px; align-items: center; }
        .input-area input { flex: 1; background: var(--card); border: 1px solid var(--border); padding: 14px 20px; border-radius: 14px; color: #fff; outline: none; }
        .send-btn { background: var(--accent); border: none; color: #fff; width: 48px; height: 48px; border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Admin Screen */
        #admin-panel { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; padding: 40px; overflow-y: auto; }
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 24px; }
        .admin-table th { text-align: left; color: var(--text-dim); padding: 12px; font-size: 14px; border-bottom: 1px solid var(--border); }
        .admin-table td { padding: 16px 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
        .btn-sm { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; margin-right: 5px; }
        .btn-red { background: #2a1010; color: var(--red); }
        .btn-blue { background: #101a2a; color: var(--accent); }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h2 id="auth-title">Вход</h2>
        <div id="reg-fields" style="display:none">
            <input type="text" id="auth-name" placeholder="Ваше имя">
        </div>
        <input type="email" id="auth-email" placeholder="Электронная почта">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button id="auth-submit" onclick="handleAuth()">Продолжить</button>
        <div class="auth-toggle" onclick="toggleAuthMode()" id="auth-toggle-btn">Нет аккаунта? Регистрация</div>
    </div>
</div>

<div id="app">
    <div class="sidebar">
        <div class="side-header">
            <div class="side-title">Flame</div>
            <button id="admin-entry" style="display:none; background:none; border:none; color:var(--text-dim); cursor:pointer;" onclick="toggleAdmin(true)">⚙️</button>
        </div>
        <div class="search-box">
            <input type="text" placeholder="Поиск людей..." oninput="searchUsers(this.value)">
        </div>
        <div class="list-container">
            <div class="list-label">Ваши чаты</div>
            <div id="chats-list"></div>
            <div class="list-label" style="margin-top:20px;">Найти людей</div>
            <div id="global-users"></div>
        </div>
        <div style="padding:20px; border-top:1px solid var(--border); font-size:13px; color:var(--text-dim); display:flex; justify-content:space-between; align-items:center;">
            <span id="my-name-display">...</span>
            <span style="cursor:pointer" onclick="firebase.auth().signOut()">Выход</span>
        </div>
    </div>
    <div class="chat-main">
        <div id="chat-welcome" style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--text-dim);">
            <div style="font-size:40px; margin-bottom:10px;">🌑</div>
            <p>Выберите чат, чтобы начать общение</p>
        </div>
        <div id="chat-active" style="display:none; flex:1; flex-direction:column;">
            <div class="chat-header">
                <div id="active-av" class="avatar"></div>
                <div>
                    <div id="active-name" style="font-weight:600; font-size:15px;"></div>
                    <div id="active-status" style="font-size:12px; color:var(--text-dim);">online</div>
                </div>
            </div>
            <div class="messages" id="messages-box"></div>
            <div class="input-area">
                <input type="text" id="msg-input" placeholder="Сообщение..." onkeydown="if(event.key==='Enter') sendMsg()">
                <button class="send-btn" onclick="sendMsg()">➤</button>
            </div>
        </div>
    </div>
</div>

<div id="admin-panel">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>Админ-панель</h2>
        <button class="btn-sm" onclick="toggleAdmin(false)">Закрыть</button>
    </div>
    <table class="admin-table">
        <thead>
            <tr>
                <th>Пользователь</th>
                <th>Email</th>
                <th>Роль</th>
                <th>Статус</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody id="admin-users-list"></tbody>
    </table>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB6s4lfDc_eHL1ojTS3w_NV8WkjPHfwFcE",
        authDomain: "umessege-e77fd.firebaseapp.com",
        databaseURL: "https://umessege-e77fd-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "umessege-e77fd",
        storageBucket: "umessege-e77fd.firebasestorage.app",
        messagingSenderId: "20493632508",
        appId: "1:20493632508:web:6c2b2e1281fcb32f392879"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let me = null;
    let meData = null;
    let activeChatId = null;
    let authMode = 'login';

    // --- АУТЕНТИФИКАЦИЯ ---
    function toggleAuthMode() {
        authMode = authMode === 'login' ? 'reg' : 'login';
        document.getElementById('auth-title').innerText = authMode === 'login' ? 'Вход' : 'Регистрация';
        document.getElementById('reg-fields').style.display = authMode === 'login' ? 'none' : 'block';
        document.getElementById('auth-toggle-btn').innerText = authMode === 'login' ? 'Нет аккаунта? Регистрация' : 'Есть аккаунт? Войти';
    }

    async function handleAuth() {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        const name = document.getElementById('auth-name').value;

        try {
            if (authMode === 'reg') {
                const res = await auth.createUserWithEmailAndPassword(email, pass);
                await db.ref('users/' + res.user.uid).set({
                    uid: res.user.uid,
                    name: name,
                    email: email,
                    role: 'user',
                    verified: false,
                    banned: false
                });
            } else {
                await auth.signInWithEmailAndPassword(email, pass);
            }
        } catch (e) { alert(e.message); }
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            me = user;
            loadMeData();
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
        }
    });

    function loadMeData() {
        db.ref('users/' + me.uid).on('value', snap => {
            meData = snap.val();
            if (meData?.banned) {
                alert("Ваш аккаунт заблокирован");
                auth.signOut();
                return;
            }
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app').style.display = 'grid';
            document.getElementById('my-name-display').innerText = meData.name;
            if (meData.role === 'admin') document.getElementById('admin-entry').style.display = 'block';
            initApp();
        });
    }

    // --- ЛОГИКА ПРИЛОЖЕНИЯ ---
    function initApp() {
        // Загрузка глобальных пользователей для поиска
        db.ref('users').on('value', snap => {
            const users = snap.val();
            renderGlobalUsers(users);
            if (meData.role === 'admin') renderAdminUsers(users);
        });

        // Загрузка моих чатов
        db.ref('chats').on('value', snap => {
            renderMyChats(snap.val());
        });
    }

    function renderGlobalUsers(users) {
        const container = document.getElementById('global-users');
        container.innerHTML = '';
        Object.values(users).forEach(u => {
            if (u.uid === me.uid) return;
            const el = document.createElement('div');
            el.className = 'item';
            el.onclick = () => startChat(u.uid, u.name);
            el.innerHTML = `
                <div class="avatar" style="background-color:#222">${u.name[0]}</div>
                <div class="item-info">
                    <div class="item-name">${u.name} ${u.verified ? '<span class="v-badge">✔️</span>' : ''}</div>
                    <div class="item-last">Нажмите, чтобы написать</div>
                </div>
            `;
            container.appendChild(el);
        });
    }

    function renderMyChats(chats) {
        const container = document.getElementById('chats-list');
        container.innerHTML = '';
        if (!chats) return;

        Object.entries(chats).forEach(([id, data]) => {
            if (!id.includes(me.uid)) return;
            const otherUid = id.replace(me.uid, '').replace('_', '');
            
            db.ref('users/' + otherUid).once('value', s => {
                const u = s.val();
                if (!u) return;
                const el = document.createElement('div');
                el.className = `item ${activeChatId === id ? 'active' : ''}`;
                el.onclick = () => openChat(id, u.name, u.uid);
                el.innerHTML = `
                    <div class="avatar" style="background-color:#222">${u.name[0]}</div>
                    <div class="item-info">
                        <div class="item-name">${u.name}</div>
                        <div class="item-last">${data.lastMsg || 'Сообщений нет'}</div>
                    </div>
                `;
                container.appendChild(el);
            });
        });
    }

    function startChat(targetUid, targetName) {
        const id = [me.uid, targetUid].sort().join('_');
        db.ref('chats/' + id).update({
            exists: true,
            lastMsg: 'Чат начат'
        });
        openChat(id, targetName, targetUid);
    }

    function openChat(id, name, uid) {
        activeChatId = id;
        document.getElementById('chat-welcome').style.display = 'none';
        document.getElementById('chat-active').style.display = 'flex';
        document.getElementById('active-name').innerText = name;
        document.getElementById('active-av').innerText = name[0];
        
        // Слушаем сообщения
        db.ref('messages/' + id).off();
        db.ref('messages/' + id).on('value', snap => {
            const msgs = snap.val();
            const box = document.getElementById('messages-box');
            box.innerHTML = '';
            if (msgs) {
                Object.values(msgs).forEach(m => {
                    const d = document.createElement('div');
                    d.className = `msg ${m.from === me.uid ? 'out' : 'in'}`;
                    d.innerText = m.text;
                    box.appendChild(d);
                });
                box.scrollTop = box.scrollHeight;
            }
        });
    }

    function sendMsg() {
        const inp = document.getElementById('msg-input');
        const txt = inp.value.trim();
        if (!txt || !activeChatId) return;

        const mObj = { from: me.uid, text: txt, ts: Date.now() };
        db.ref('messages/' + activeChatId).push(mObj);
        db.ref('chats/' + activeChatId).update({ lastMsg: txt, lastTs: Date.now() });
        inp.value = '';
    }

    // --- АДМИНКА ---
    function toggleAdmin(show) {
        document.getElementById('admin-panel').style.display = show ? 'block' : 'none';
    }

    function renderAdminUsers(users) {
        const list = document.getElementById('admin-users-list');
        list.innerHTML = '';
        Object.values(users).forEach(u => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${u.name}</td>
                <td>${u.email}</td>
                <td>${u.role}</td>
                <td style="color:${u.banned ? 'red' : 'green'}">${u.banned ? 'Бан' : 'Ок'}</td>
                <td>
                    <button class="btn-sm btn-blue" onclick="adminAction('${u.uid}', 'verify', ${!u.verified})">${u.verified ? 'Убр. вериф' : 'Вериф'}</button>
                    <button class="btn-sm" onclick="adminAction('${u.uid}', 'ban', ${!u.banned})">${u.banned ? 'Разбан' : 'Бан'}</button>
                    <button class="btn-sm btn-red" onclick="adminAction('${u.uid}', 'delete')">Удалить</button>
                </td>
            `;
            list.appendChild(tr);
        });
    }

    window.adminAction = function(uid, type, val) {
        if (type === 'verify') db.ref('users/' + uid).update({ verified: val });
        if (type === 'ban') db.ref('users/' + uid).update({ banned: val });
        if (type === 'delete') {
            if (confirm("Удалить пользователя навсегда?")) db.ref('users/' + uid).remove();
        }
    }
</script>
</body>
</html>
