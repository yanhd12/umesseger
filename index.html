<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untitled Messenger</title>

<style>
:root {
    --bg:#000;
    --side:#0a0a0a;
    --card:#1c1c1e;
    --accent:#007aff;
    --text:#fff;
    --text-dim:#8e8e93;
    --border:#2c2c2e;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
    height:100vh;
    display:flex;
}

/* AUTH SCREEN */
#auth-screen{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

.modal-box{
    background:var(--card);
    padding:30px;
    border-radius:28px;
    width:100%;
    max-width:380px;
    border:1px solid var(--border);
    text-align:center;
}

input{
    width:100%;
    padding:14px;
    background:#0a0a0a;
    border:1px solid var(--border);
    border-radius:12px;
    color:#fff;
    margin-bottom:12px;
    outline:none;
}

.btn{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:none;
    font-weight:600;
    cursor:pointer;
    background:var(--accent);
    color:#fff;
    margin-top:5px;
}

.sidebar{
    width:300px;
    background:var(--side);
    border-right:1px solid var(--border);
    padding:20px;
}
</style>
</head>
<body>

<div id="auth-screen">
    <div class="modal-box">
        <h2 style="margin-bottom:20px">Untitled</h2>

        <div id="reg-fields" style="display:none">
            <input type="text" id="auth-name" placeholder="Имя">
            <input type="text" id="auth-un" placeholder="Юзернейм">
        </div>

        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-pass" placeholder="Пароль">

        <button class="btn" onclick="handleAuth()">Продолжить</button>

        <p onclick="toggleAuth()" id="auth-toggle-text"
           style="color:var(--text-dim); font-size:13px; margin-top:15px; cursor:pointer">
            Зарегистрироваться
        </p>
    </div>
</div>

<div class="sidebar">
    <h3>Untitled Messenger</h3>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    databaseURL: "YOUR_DATABASE_URL",
    projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let isReg = false;

/* AUTH STATE */
auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById("auth-screen").style.display = "none";
    } else {
        document.getElementById("auth-screen").style.display = "flex";
    }
});

/* TOGGLE LOGIN/REGISTER */
function toggleAuth() {
    isReg = !isReg;
    document.getElementById('reg-fields').style.display = isReg ? 'block' : 'none';
    document.getElementById('auth-toggle-text').innerText =
        isReg ? 'У меня уже есть аккаунт' : 'Зарегистрироваться';
}

/* AUTH FUNCTION */
async function handleAuth() {
    const email = document.getElementById('auth-email').value.trim();
    const pass = document.getElementById('auth-pass').value.trim();

    if (!email || !pass) {
        alert("Заполни email и пароль");
        return;
    }

    try {
        if (isReg) {
            const name = document.getElementById('auth-name').value.trim();
            const username = document.getElementById('auth-un').value.trim().toLowerCase();

            if (!name || !username) {
                alert("Заполни имя и юзернейм");
                return;
            }

            const res = await auth.createUserWithEmailAndPassword(email, pass);

            await db.ref('users/' + res.user.uid).set({
                uid: res.user.uid,
                name: name,
                username: username,
                email: email,
                role: 'user',
                verified: false,
                online: true,
                createdAt: Date.now()
            });

        } else {
            await auth.signInWithEmailAndPassword(email, pass);
        }

    } catch (err) {
        alert(err.message);
    }
}
</script>

</body>
</html>
