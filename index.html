<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tab-title">Untitled Messenger</title>
    <style>
        :root {
            --bg: #000; --side: #0a0a0a; --card: #121212; --accent: #007aff;
            --text: #fff; --text-dim: #8e8e93; --border: #1c1c1e;
            --online: #32d74b; --gold: #ffcc00; --blue: #0095f6; --danger: #ff3b30;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 320px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
        .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; cursor: pointer; position: relative; transition: 0.2s; }
        .chat-item:hover { background: #1a1a1a; }
        .chat-item.active { background: #1a1a1a; border-left: 3px solid var(--accent); }

        .avatar { width: 45px; height: 45px; border-radius: 50%; background: #222; background-size: cover; background-position: center; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: bold; position: relative; border: 1px solid var(--border); }

        /* Main Chat */
        .main-chat { flex: 1; display: flex; flex-direction: column; position: relative; background: #000; }
        .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 70%; padding: 10px 16px; border-radius: 18px; font-size: 15px; word-wrap: break-word; line-height: 1.4; }
        .msg.mine { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.theirs { background: var(--card); align-self: flex-start; border-bottom-left-radius: 4px; }

        /* Modals */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 5000; align-items: center; justify-content: center; }
        .modal-box { background: var(--card); padding: 25px; border-radius: 24px; width: 90%; max-width: 400px; border: 1px solid var(--border); position: relative; }
        
        .btn { width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        input, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); border-radius: 10px; color: #fff; margin-bottom: 10px; outline: none; }

        .badge { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 50%; font-size: 10px; margin-left: 5px; vertical-align: middle; }
        .badge-gold { background: var(--gold); color: #000; }
        .badge-blue { background: var(--blue); color: #fff; }

        /* Admin Styles */
        .admin-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: #1c1c1e; padding: 15px; border-radius: 15px; text-align: center; }
        .stat-card span { display: block; font-size: 20px; font-weight: bold; color: var(--accent); }
        .admin-user-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .admin-actions { display: flex; gap: 5px; }
        .admin-actions button { padding: 5px 10px; font-size: 11px; border-radius: 5px; border: none; cursor: pointer; }

        .dots-btn { padding: 10px; cursor: pointer; color: var(--text-dim); border-radius: 50%; }
        .dots-btn:hover { background: #222; color: #fff; }
    </style>
</head>
<body>

<div id="context-menu" style="display: none; position: fixed; background: #1c1c1e; border: 1px solid var(--border); border-radius: 8px; z-index: 1000; width: 150px;">
    <div class="menu-item" style="padding: 10px 15px; cursor: pointer; color: var(--danger);" onclick="deleteCurrentChat()">Удалить чат</div>
</div>

<div id="auth-screen">
    <div class="modal-box">
        <h2 style="margin-bottom: 20px;">Untitled</h2>
        <div id="reg-fields" style="display:none">
            <input type="text" id="auth-name" placeholder="Имя">
            <input type="text" id="auth-un" placeholder="Юзернейм">
        </div>
        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button class="btn" style="background:var(--accent); color:#fff" onclick="handleAuth()">Продолжить</button>
        <p onclick="toggleAuth()" style="color:var(--text-dim); font-size:12px; margin-top:15px; cursor:pointer">Нет аккаунта? Зарегистрироваться</p>
    </div>
</div>

<div class="sidebar">
    <div style="padding:20px"><input type="text" id="search-inp" placeholder="Поиск людей..." oninput="searchUsers(this.value)"></div>
    <div id="search-results"></div>
    <div style="padding:0 20px 10px; font-size:11px; color:var(--text-dim); letter-spacing: 1px;">ВАШИ ЧАТЫ</div>
    <div class="chat-list" id="user-chats" style="flex:1; overflow-y: auto;"></div>
    
    <div style="padding:12px 15px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content: space-between;">
        <div style="display:flex; align-items:center; gap:12px; cursor:pointer; flex: 1;" onclick="showProfile('other', me.uid)">
            <div class="avatar" id="my-av-small"></div>
            <div style="overflow: hidden;">
                <div id="my-name-small" style="font-weight:600; font-size:14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></div>
                <div id="my-un-small" style="color:var(--text-dim); font-size:12px"></div>
            </div>
        </div>
        <div class="dots-btn" onclick="showSettings()">⋮</div>
    </div>
</div>

<div class="main-chat">
    <div id="active-chat-ui" style="display:none; flex-direction:column; height:100%">
        <div style="padding:15px 25px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; cursor:pointer" onclick="showProfile('other', currentPeerId)">
            <div id="active-av" class="avatar"></div>
            <div>
                <div style="font-weight:600"><span id="active-name"></span><span id="active-badge"></span></div>
                <div id="active-un" style="color:var(--accent); font-size:12px"></div>
            </div>
        </div>
        <div class="messages-container" id="messages-box"></div>
        <div style="padding:20px; display:flex; gap:10px">
            <input type="text" id="msg-input" placeholder="Напишите сообщение..." style="margin:0" onkeydown="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" style="background:var(--accent); border:none; width:50px; border-radius:12px; color:#fff; cursor:pointer">➤</button>
        </div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-box">
        <div class="avatar" id="modal-av" style="width:100px; height:100px; margin:0 auto 15px; font-size: 32px;"></div>
        <h3 id="view-name"></h3>
        <p id="view-un" style="color:var(--accent); margin-bottom:10px"></p>
        <p id="view-bio" style="color:var(--text-dim); margin-bottom:20px; font-size:14px"></p>

        <div id="edit-form" style="display:none">
            <input type="text" id="edit-name" placeholder="Имя">
            <input type="text" id="edit-un" placeholder="Юзернейм">
            <textarea id="edit-bio" placeholder="О себе..."></textarea>
            <button class="btn" style="background:var(--accent); color:#fff" onclick="saveProfile()">Сохранить изменения</button>
            <button class="btn" style="background:#222; color:#fff" onclick="document.getElementById('file-inp').click()">Сменить фото</button>
            <input type="file" id="file-inp" hidden onchange="uploadPhoto(this)">
            <button id="admin-panel-btn" class="btn" style="background:var(--gold); color:#000; display:none; margin-top: 20px;" onclick="openAdmin()">Админ-панель</button>
        </div>

        <button id="start-chat-btn" class="btn" style="background:var(--accent); color:#fff; display:none">Написать сообщение</button>
        <button class="btn" style="background:none; color:var(--text-dim)" onclick="closeModal()">Закрыть</button>
    </div>
</div>

<div id="admin-modal" class="modal">
    <div class="modal-box" style="max-width:500px; max-height: 90vh; overflow-y: auto;">
        <h2 style="text-align: left; margin-bottom: 15px;">Управление системой</h2>
        
        <div class="admin-stat-grid">
            <div class="stat-card"><span id="stat-users">0</span>Всего юзеров</div>
            <div class="stat-card"><span id="stat-chats">0</span>Всего чатов</div>
        </div>

        <div id="admin-list"></div>
        <button class="btn" style="background:#222; color:#fff" onclick="document.getElementById('admin-modal').style.display='none'">Назад</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const IMGBB_KEY = "db82b9743e8c49d89b26bf5392e1578f";
    const firebaseConfig = {
        apiKey: "AIzaSyB6s4lfDc_eHL1ojTS3w_NV8WkjPHfwFcE",
        authDomain: "umessege-e77fd.firebaseapp.com",
        databaseURL: "https://umessege-e77fd-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "umessege-e77fd"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    let me = null, meData = null, activeChatId = null, currentPeerId = null, isReg = false;

    // --- Helpers ---
    const getBadge = u => {
        let b = '';
        if(u.role === 'admin') b += '<span class="badge badge-gold">✓</span>';
        if(u.verified) b += '<span class="badge badge-blue">✓</span>';
        return b;
    };

    function updateTabTitle(text) {
        document.getElementById('tab-title').innerText = text;
    }

    function drawAv(el, photo, name) {
        if (!el) return;
        el.style.backgroundImage = photo ? `url(${photo})` : 'none';
        el.innerText = photo ? '' : (name ? name[0].toUpperCase() : '?');
    }

    // --- Auth & Profile ---
    auth.onAuthStateChanged(user => {
        if (user) {
            me = user;
            db.ref('users/'+user.uid).on('value', s => {
                meData = s.val(); if(!meData) return;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('my-name-small').innerHTML = meData.name + getBadge(meData);
                document.getElementById('my-un-small').innerText = '@' + meData.username;
                drawAv(document.getElementById('my-av-small'), meData.photo, meData.name);
                if(meData.role === 'admin') document.getElementById('admin-panel-btn').style.display='block';
                updateTabTitle('Untitled Messenger');
            });
            loadChats();
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
        }
    });

    async function handleAuth() {
        const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
        try {
            if(isReg) {
                const un = document.getElementById('auth-un').value.toLowerCase().trim();
                const res = await auth.createUserWithEmailAndPassword(e,p);
                await db.ref('users/'+res.user.uid).set({ uid: res.user.uid, name: document.getElementById('auth-name').value, username: un, email: e, role: 'user', verified: false, bio: '' });
            } else {
                await auth.signInWithEmailAndPassword(e,p);
            }
        } catch(err) { alert(err.message); }
    }

    // --- Chats ---
    function loadChats() {
        db.ref('chats').on('value', async s => {
            const cont = document.getElementById('user-chats'); cont.innerHTML = '';
            const data = s.val() || {};
            for (let id in data) {
                if (id.includes(me.uid)) {
                    const oId = id.replace(me.uid,'').replace('_','');
                    const u = (await db.ref('users/'+oId).once('value')).val();
                    if(!u) continue;
                    const div = document.createElement('div');
                    div.className = `chat-item ${activeChatId===id?'active':''}`;
                    div.onclick = () => openChat(id, u);
                    div.innerHTML = `<div class="avatar" id="l-${u.uid}"></div>
                        <div style="overflow:hidden">
                            <div style="font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis">${u.name}${getBadge(u)}</div>
                            <div style="color:var(--text-dim); font-size:12px">@${u.username}</div>
                        </div>`;
                    cont.appendChild(div);
                    drawAv(document.getElementById('l-'+u.uid), u.photo, u.name);
                }
            }
        });
    }

    function openChat(id, u) {
        activeChatId = id; currentPeerId = u.uid;
        document.getElementById('active-chat-ui').style.display = 'flex';
        document.getElementById('active-name').innerText = u.name;
        document.getElementById('active-un').innerText = '@'+u.username;
        document.getElementById('active-badge').innerHTML = getBadge(u);
        drawAv(document.getElementById('active-av'), u.photo, u.name);
        updateTabTitle('Чат с ' + u.name);
        
        db.ref('messages/'+id).off();
        db.ref('messages/'+id).on('value', s => {
            const box = document.getElementById('messages-box'); box.innerHTML = '';
            Object.values(s.val()||{}).forEach(m => {
                const d = document.createElement('div');
                d.className = `msg ${m.from===me.uid?'mine':'theirs'}`;
                d.innerText = m.text; box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg() {
        const v = document.getElementById('msg-input').value; if(!v.trim()) return;
        db.ref('messages/'+activeChatId).push({ from: me.uid, text: v, time: Date.now() });
        document.getElementById('msg-input').value = '';
    }

    // --- Profile & Settings ---
    function showSettings() {
        const u = meData;
        document.getElementById('view-name').innerText = "Настройки профиля";
        document.getElementById('view-un').innerText = "@"+u.username;
        document.getElementById('view-bio').style.display = 'none';
        document.getElementById('start-chat-btn').style.display = 'none';
        document.getElementById('edit-form').style.display = 'block';
        
        document.getElementById('edit-name').value = u.name;
        document.getElementById('edit-un').value = u.username;
        document.getElementById('edit-bio').value = u.bio || '';
        drawAv(document.getElementById('modal-av'), u.photo, u.name);
        document.getElementById('modal').style.display = 'flex';
    }

    function showProfile(type, uid) {
        db.ref('users/'+uid).once('value', s => {
            const u = s.val();
            document.getElementById('view-name').innerHTML = u.name + getBadge(u);
            document.getElementById('view-un').innerText = '@'+u.username;
            document.getElementById('view-bio').innerText = u.bio || 'Нет описания';
            document.getElementById('view-bio').style.display = 'block';
            drawAv(document.getElementById('modal-av'), u.photo, u.name);
            
            document.getElementById('edit-form').style.display = 'none';
            document.getElementById('start-chat-btn').style.display = uid === me.uid ? 'none' : 'block';
            
            if(uid !== me.uid) {
                document.getElementById('start-chat-btn').onclick = () => {
                    const id = [me.uid, u.uid].sort().join('_');
                    db.ref('chats/'+id).update({exists:true}); 
                    openChat(id, u); closeModal();
                };
            }
            document.getElementById('modal').style.display = 'flex';
        });
    }

    async function saveProfile() {
        const nName = document.getElementById('edit-name').value;
        const nUn = document.getElementById('edit-un').value.toLowerCase().trim();
        const nBio = document.getElementById('edit-bio').value;
        await db.ref('users/'+me.uid).update({ name: nName, username: nUn, bio: nBio });
        closeModal();
    }

    async function uploadPhoto(inp) {
        if(!inp.files[0]) return;
        const fd = new FormData(); fd.append('image', inp.files[0]);
        try {
            const r = await fetch('https://api.imgbb.com/1/upload?key='+IMGBB_KEY, {method:'POST', body:fd});
            const d = await r.json(); 
            await db.ref('users/'+me.uid).update({photo: d.data.url});
            drawAv(document.getElementById('modal-av'), d.data.url, meData.name);
        } catch(e) { alert("Ошибка загрузки"); }
    }

    // --- Admin Panel ---
    function openAdmin() {
        document.getElementById('admin-modal').style.display='flex';
        db.ref('users').on('value', s => {
            const users = s.val();
            document.getElementById('stat-users').innerText = Object.keys(users).length;
            const cont = document.getElementById('admin-list'); cont.innerHTML = '';
            
            Object.values(users).forEach(u => {
                const d = document.createElement('div');
                d.className = "admin-user-item";
                d.innerHTML = `
                    <div style="font-size:13px">
                        <b>${u.name}</b> (@${u.username})<br>
                        <small style="color:var(--text-dim)">${u.role}</small>
                    </div>
                    <div class="admin-actions">
                        <button style="background:${u.verified?'var(--danger)':'var(--blue)'}; color:#fff" onclick="toggleVerify('${u.uid}', ${u.verified})">
                            ${u.verified ? 'Убрать ✓' : 'Галочка'}
                        </button>
                        <button style="background:${u.role==='admin'?'#444':'var(--gold)'}; color:#000" onclick="toggleAdmin('${u.uid}', '${u.role}')">
                            ${u.role==='admin' ? 'Снять админа' : 'Дать админа'}
                        </button>
                    </div>`;
                cont.appendChild(d);
            });
        });
        db.ref('chats').once('value', s => {
            document.getElementById('stat-chats').innerText = s.numChildren();
        });
    }

    function toggleVerify(uid, current) { db.ref('users/'+uid).update({verified: !current}); }
    function toggleAdmin(uid, current) { db.ref('users/'+uid).update({role: current==='admin'?'user':'admin'}); }

    function searchUsers(v) {
        const res = document.getElementById('search-results');
        if(!v.trim()) { res.innerHTML = ''; return; }
        db.ref('users').orderByChild('username').startAt(v.toLowerCase()).endAt(v.toLowerCase()+'\uf8ff').once('value', s => {
            res.innerHTML = '<div style="padding:10px 20px; font-size:11px; color:var(--text-dim)">РЕЗУЛЬТАТЫ ПОИСКА</div>';
            Object.values(s.val()||{}).forEach(u => {
                if(u.uid === me.uid) return;
                const div = document.createElement('div');
                div.className = 'chat-item';
                div.innerHTML = `<div class="avatar" id="s-${u.uid}"></div><div><b>${u.name}${getBadge(u)}</b><br><small style="color:var(--accent)">@${u.username}</small></div>`;
                div.onclick = () => showProfile('other', u.uid);
                res.appendChild(div);
                drawAv(document.getElementById('s-'+u.uid), u.photo, u.name);
            });
        });
    }

    function toggleAuth() { isReg=!isReg; document.getElementById('reg-fields').style.display=isReg?'block':'none'; }
    function closeModal() { document.getElementById('modal').style.display='none'; }
</script>
</body>
</html>
