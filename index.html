<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flame — Free Storage Edition</title>
    <style>
        :root {
            --bg: #000000;
            --side: #0a0a0a;
            --card: #111111;
            --accent: #007aff;
            --text: #ffffff;
            --text-dim: #888888;
            --border: #1a1a1a;
            --online: #34c759;
            --red: #ff3b30;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Auth */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; flex-direction: column; }
        .auth-card { background: var(--card); padding: 40px; border-radius: 24px; width: 340px; text-align: center; border: 1px solid var(--border); }
        .auth-card input { width: 100%; padding: 12px; margin-bottom: 10px; background: #000; border: 1px solid var(--border); border-radius: 10px; color: #fff; outline: none; }
        .btn-google { background: #fff; color: #000; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: 600; width: 100%; padding: 12px; border-radius: 10px; cursor: pointer; border: none; }

        /* App Layout */
        #app { display: none; height: 100vh; width: 100%; }
        .sidebar { width: 320px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .chat-main { flex: 1; display: flex; flex-direction: column; background: var(--bg); overflow: hidden; }

        /* Avatar */
        .avatar { width: 42px; height: 42px; border-radius: 12px; background: #1a1a1a; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-weight: 600; color: var(--accent); position: relative; flex-shrink: 0; overflow: hidden; }
        .online-dot { width: 10px; height: 10px; background: var(--online); border: 2px solid var(--side); border-radius: 50%; position: absolute; bottom: -2px; right: -2px; display: none; }
        .is-online .online-dot { display: block; }

        /* Messages */
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; scroll-behavior: smooth; }
        .msg { max-width: 75%; padding: 10px 16px; border-radius: 16px; font-size: 15px; word-wrap: break-word; }
        .msg.in { background: var(--card); align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg.out { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 4px; }

        .input-area { padding: 15px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .my-profile-bar { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px; cursor: pointer; }

        /* Modals */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; align-items: center; justify-content: center; }
        .modal-box { background: var(--card); padding: 30px; border-radius: 24px; width: 350px; text-align: center; }
        .profile-edit-av { width: 80px; height: 80px; border-radius: 20px; margin: 0 auto 15px; cursor: pointer; border: 2px dashed var(--border); display: flex; align-items: center; justify-content: center; background-size: cover; background-position: center; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h2 style="margin-bottom:20px">Flame</h2>
        <div id="reg-fields" style="display:none"><input type="text" id="auth-name" placeholder="Имя"></div>
        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button onclick="handleAuth()" style="width:100%; padding:12px; background:var(--accent); border:none; border-radius:10px; color:white; font-weight:600; cursor:pointer;">Войти</button>
        
        <button class="btn-google" onclick="loginGoogle()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_\"G\"_Logo.svg" width="18"> Войти через Google
        </button>
        
        <p onclick="toggleAuth()" style="font-size:12px; color:var(--text-dim); margin-top:15px; cursor:pointer;">Регистрация</p>
    </div>
</div>

<div id="app">
    <div class="sidebar">
        <div style="padding:20px; border-bottom:1px solid var(--border); font-weight:800;">FLAME</div>
        <div class="list-container" style="flex:1; overflow-y:auto;">
            <div class="list-label" style="padding:10px 20px; font-size:11px; color:var(--text-dim)">ЧАТЫ</div>
            <div id="chats-list"></div>
            <div class="list-label" style="padding:10px 20px; font-size:11px; color:var(--text-dim)">ЛЮДИ</div>
            <div id="users-list"></div>
        </div>
        <div class="my-profile-bar" onclick="showProfile()">
            <div class="avatar" id="my-av-img">?</div>
            <div style="flex:1; overflow:hidden">
                <div id="my-name-display" style="font-weight:600; font-size:14px">...</div>
                <div style="font-size:11px; color:var(--online)">в сети</div>
            </div>
        </div>
    </div>
    
    <div class="chat-main">
        <div id="chat-active" style="display:none; flex-direction:column; height:100%;">
            <div style="padding:15px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px;">
                <div id="active-av" class="avatar"></div>
                <div id="active-name" style="font-weight:600"></div>
            </div>
            <div class="messages" id="messages-box"></div>
            <div class="input-area">
                <input type="text" id="msg-input" placeholder="Сообщение..." onkeydown="if(event.key==='Enter') sendMsg()" style="flex:1; background:var(--card); border:none; padding:12px; border-radius:12px; color:#fff; outline:none;">
                <button onclick="sendMsg()" style="background:var(--accent); border:none; color:white; padding:0 15px; border-radius:12px; cursor:pointer">➤</button>
            </div>
        </div>
        <div id="chat-none" style="flex:1; display:flex; align-items:center; justify-content:center; color:var(--text-dim)">Выберите чат</div>
    </div>
</div>

<div class="modal" id="profile-modal">
    <div class="modal-box">
        <h3>Профиль</h3>
        <label for="av-upload">
            <div class="profile-edit-av" id="edit-av-preview">📷</div>
        </label>
        <input type="file" id="av-upload" hidden accept="image/*" onchange="uploadToImgBB(this)">
        
        <input type="text" id="edit-name" placeholder="Имя">
        <textarea id="edit-bio" placeholder="О себе..." style="width:100%; background:#000; border:1px solid var(--border); color:#fff; padding:10px; border-radius:10px; margin-top:10px; resize:none;"></textarea>
        
        <button onclick="saveProfile()" style="width:100%; background:var(--accent); border:none; padding:12px; border-radius:10px; color:#fff; margin-top:15px; font-weight:600; cursor:pointer;">Сохранить</button>
        <button onclick="firebase.auth().signOut()" style="background:none; border:none; color:var(--red); margin-top:15px; cursor:pointer;">Выйти</button>
        <button onclick="closeModal()" style="display:block; margin: 10px auto; background:none; border:none; color:var(--text-dim); cursor:pointer;">Закрыть</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // КОНФИГ
    const IMGBB_API_KEY = "ВАШ_API_КЛЮЧ_IMGBB"; // ВСТАВЬТЕ СЮДА ВАШ КЛЮЧ
    
    const firebaseConfig = {
        apiKey: "AIzaSyB6s4lfDc_eHL1ojTS3w_NV8WkjPHfwFcE",
        authDomain: "umessege-e77fd.firebaseapp.com",
        databaseURL: "https://umessege-e77fd-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "umessege-e77fd",
        storageBucket: "umessege-e77fd.appspot.com",
        messagingSenderId: "20493632508",
        appId: "1:20493632508:web:6c2b2e1281fcb32f392879"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    let me = null, meData = null, activeChatId = null, isReg = false;

    // Вход через Google
    window.loginGoogle = async () => {
        const provider = new firebase.auth.GoogleAuthProvider();
        try {
            const res = await auth.signInWithPopup(provider);
            const u = res.user;
            const s = await db.ref('users/' + u.uid).once('value');
            if (!s.exists()) {
                await db.ref('users/' + u.uid).set({
                    uid: u.uid, name: u.displayName, email: u.email, 
                    photo: u.photoURL, role: 'user', bio: '', online: true
                });
            }
        } catch (e) { alert(e.message); }
    };

    // Загрузка на ImgBB
    window.uploadToImgBB = async (input) => {
        const file = input.files[0];
        if(!file) return;

        const formData = new FormData();
        formData.append("image", file);

        try {
            document.getElementById('edit-av-preview').innerText = "⏳";
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                method: "POST",
                body: formData
            });
            const data = await response.json();
            const url = data.data.url;

            await db.ref('users/'+me.uid).update({photo: url});
            document.getElementById('edit-av-preview').style.backgroundImage = `url(${url})`;
            document.getElementById('edit-av-preview').innerText = "";
        } catch (e) {
            alert("Ошибка загрузки");
            document.getElementById('edit-av-preview').innerText = "📷";
        }
    };

    window.toggleAuth = () => { isReg = !isReg; document.getElementById('reg-fields').style.display = isReg ? 'block' : 'none'; };

    async function handleAuth() {
        const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
        try {
            if(isReg) {
                const res = await auth.createUserWithEmailAndPassword(e, p);
                const n = document.getElementById('auth-name').value;
                await db.ref('users/'+res.user.uid).set({uid:res.user.uid, name:n, email:e, role:'user', bio:'', photo: '', online:true});
            } else { await auth.signInWithEmailAndPassword(e, p); }
        } catch(err) { alert(err.message); }
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            me = user;
            db.ref('users/'+user.uid).on('value', s => {
                meData = s.val();
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                document.getElementById('my-name-display').innerText = meData.name;
                setAv(document.getElementById('my-av-img'), meData.photo, meData.name);
                loadData();
            });
            db.ref('users/'+user.uid).update({online: true});
            db.ref('users/'+user.uid).onDisconnect().update({online: false});
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
        }
    });

    function setAv(el, url, name) {
        if(url) { el.style.backgroundImage = `url(${url})`; el.innerText = ''; }
        else { el.style.backgroundImage = 'none'; el.innerText = name ? name[0] : '?'; }
    }

    window.showProfile = () => {
        document.getElementById('edit-name').value = meData.name;
        document.getElementById('edit-bio').value = meData.bio || '';
        setAv(document.getElementById('edit-av-preview'), meData.photo, meData.name);
        document.getElementById('profile-modal').style.display = 'flex';
    };

    window.closeModal = () => document.getElementById('profile-modal').style.display = 'none';

    async function saveProfile() {
        await db.ref('users/'+me.uid).update({
            name: document.getElementById('edit-name').value,
            bio: document.getElementById('edit-bio').value
        });
        closeModal();
    }

    function loadData() {
        db.ref('users').on('value', s => {
            const list = document.getElementById('users-list');
            list.innerHTML = '';
            Object.values(s.val() || {}).forEach(u => {
                if(u.uid === me.uid) return;
                const item = document.createElement('div');
                item.className = `item ${u.online?'is-online':''}`;
                item.onclick = () => startChat(u.uid, u.name);
                item.innerHTML = `<div class="avatar" id="av-${u.uid}"></div>
                    <div style="overflow:hidden;flex:1"><div style="font-size:14px;font-weight:600">${u.name}</div>
                    <div style="font-size:11px;color:var(--text-dim);text-overflow:ellipsis;white-space:nowrap;overflow:hidden">${u.bio||'No bio'}</div></div>
                    <div class="online-dot" style="position:static; margin-left:10px; display:${u.online?'block':'none'}"></div>`;
                list.appendChild(item);
                setAv(document.getElementById(`av-${u.uid}`), u.photo, u.name);
            });
        });

        db.ref('chats').on('value', s => {
            const list = document.getElementById('chats-list');
            list.innerHTML = '';
            Object.entries(s.val() || {}).forEach(([id, data]) => {
                if(!id.includes(me.uid)) return;
                const otherUid = id.replace(me.uid,'').replace('_','');
                db.ref('users/'+otherUid).once('value', us => {
                    const u = us.val(); if(!u) return;
                    const item = document.createElement('div');
                    item.className = `item ${activeChatId===id?'active':''}`;
                    item.onclick = () => openChat(id, u.name, u.photo);
                    item.innerHTML = `<div class="avatar" id="cav-${u.uid}"></div>
                        <div style="overflow:hidden"><div style="font-size:14px">${u.name}</div>
                        <div style="font-size:11px;color:var(--text-dim);text-overflow:ellipsis;white-space:nowrap;overflow:hidden">${data.lastMsg||''}</div></div>`;
                    list.appendChild(item);
                    setAv(document.getElementById(`cav-${u.uid}`), u.photo, u.name);
                });
            });
        });
    }

    window.startChat = (uid, name) => {
        const id = [me.uid, uid].sort().join('_');
        db.ref('chats/'+id).update({exists:true});
        openChat(id, name);
    };

    window.openChat = (id, name, photo) => {
        activeChatId = id;
        document.getElementById('chat-none').style.display = 'none';
        document.getElementById('chat-active').style.display = 'flex';
        document.getElementById('active-name').innerText = name;
        setAv(document.getElementById('active-av'), photo, name);
        db.ref('messages/'+id).on('value', s => {
            const box = document.getElementById('messages-box');
            box.innerHTML = '';
            if(s.val()) Object.values(s.val()).forEach(m => {
                box.innerHTML += `<div class="msg ${m.from===me.uid?'out':'in'}">${m.text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    };

    window.sendMsg = () => {
        const inp = document.getElementById('msg-input'), txt = inp.value.trim();
        if(!txt || !activeChatId) return;
        db.ref('messages/'+activeChatId).push({from:me.uid, text:txt, ts:Date.now()});
        db.ref('chats/'+activeChatId).update({lastMsg:txt, lastTs:Date.now()});
        inp.value = '';
    };
</script>
</body>
</html>
