<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlameChat — Мессенджер</title>
<style>
  :root {
    --bg: #0e1621;
    --sidebar: #17212b;
    --panel: #1c2733;
    --bubble-in: #182533;
    --bubble-out: #2b5278;
    --accent: #5288c1;
    --accent2: #64b5f6;
    --text: #e8e8e8;
    --sub: #708499;
    --border: #ffffff12;
    --online: #4caf50;
    --red: #ef5350;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

  /* AUTH SCREEN */
  #auth-screen { display: flex; align-items: center; justify-content: center; height: 100vh; z-index: 1000; position: relative; }
  .auth-box { background: var(--sidebar); border-radius: 16px; padding: 40px; width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); text-align: center; }
  .auth-tabs { display: flex; margin: 20px 0; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .auth-tab { flex: 1; padding: 10px; cursor: pointer; background: transparent; color: var(--sub); border: none; }
  .auth-tab.active { background: var(--accent); color: #fff; }
  .auth-form input { width: 100%; padding: 12px; margin-bottom: 10px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; color: #fff; outline: none; }
  .auth-btn { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 8px; color: #fff; font-weight: 600; cursor: pointer; }
  .google-btn { background: #fff; color: #000; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }

  /* APP LAYOUT */
  #app { display: none; height: 100vh; }
  .sidebar { width: 300px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
  .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg); }

  /* AVATARS */
  .avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; flex-shrink: 0; background-size: cover; background-position: center; position: relative; }
  .online-badge { width: 12px; height: 12px; background: var(--online); border: 2px solid var(--sidebar); border-radius: 50%; position: absolute; bottom: 2px; right: 2px; }

  /* CHAT ITEMS */
  .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; }
  .chat-item:hover { background: var(--panel); }
  .chat-item.active { background: #2b527844; }

  /* MESSAGES */
  .msgs-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
  .msg { max-width: 70%; padding: 8px 12px; border-radius: 12px; font-size: 14px; line-height: 1.4; }
  .msg.out { align-self: flex-end; background: var(--bubble-out); border-bottom-right-radius: 4px; }
  .msg.in { align-self: flex-start; background: var(--bubble-in); border-bottom-left-radius: 4px; }

  /* MODALS */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--panel); padding: 25px; border-radius: 15px; width: 320px; text-align: center; }
  .pm-av { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 15px; cursor: pointer; background-size: cover; display: flex; align-items: center; justify-content: center; border: 2px dashed var(--border); font-size: 30px; }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <h2>FlameChat</h2>
    <div class="auth-tabs">
      <div id="tab-l" class="auth-tab active" onclick="selTab('l')">Вход</div>
      <div id="tab-r" class="auth-tab" onclick="selTab('r')">Регистрация</div>
    </div>
    <div id="form-l">
      <input type="email" id="l-email" placeholder="Email">
      <input type="password" id="l-pass" placeholder="Пароль">
      <button class="auth-btn" onclick="login()">Войти</button>
      <button class="auth-btn google-btn" onclick="loginGoogle()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18"> Google
      </button>
    </div>
    <div id="form-r" style="display:none">
      <input type="text" id="r-name" placeholder="Имя">
      <input type="email" id="r-email" placeholder="Email">
      <input type="password" id="r-pass" placeholder="Пароль">
      <button class="auth-btn" onclick="register()">Создать</button>
    </div>
  </div>
</div>

<div id="app">
  <div class="sidebar">
    <div style="padding:15px; font-weight:bold; border-bottom:1px solid var(--border)">FLAME</div>
    <div id="chat-list" style="flex:1; overflow-y:auto"></div>
    <div style="padding:12px; border-top:1px solid var(--border); display:flex; align-items:center; gap:10px; cursor:pointer" onclick="openProfile()">
      <div id="my-av" class="avatar" style="width:36px; height:36px; font-size:14px"></div>
      <div id="my-name" style="font-size:14px; font-weight:600">Загрузка...</div>
    </div>
  </div>
  <div class="chat-area">
    <div id="active-chat" style="display:none; flex:1; flex-direction:column">
      <div id="chat-h" style="padding:10px 20px; background:var(--sidebar); border-bottom:1px solid var(--border); font-weight:600">Чат</div>
      <div id="msgs" class="msgs-container"></div>
      <div style="padding:15px; display:flex; gap:10px; background:var(--sidebar)">
        <input type="text" id="m-input" placeholder="Напишите сообщение..." style="flex:1; background:var(--panel); border:none; padding:10px; border-radius:8px; color:#fff; outline:none">
        <button onclick="send()" style="background:var(--accent); border:none; color:#fff; padding:0 15px; border-radius:8px; cursor:pointer">➤</button>
      </div>
    </div>
    <div id="no-chat" style="flex:1; display:flex; align-items:center; justify-content:center; color:var(--sub)">Выберите чат</div>
  </div>
</div>

<div class="modal-overlay" id="p-modal">
  <div class="modal">
    <h3>Профиль</h3>
    <label for="av-upload">
      <div id="pm-av" class="pm-av">?</div>
    </label>
    <input type="file" id="av-upload" hidden accept="image/*" onchange="uploadAv(this)">
    <div id="pm-name" style="margin-bottom:20px; font-weight:bold"></div>
    <button class="auth-btn" onclick="signOutUser()" style="background:var(--red)">Выйти</button>
    <button class="auth-btn" onclick="closeP()" style="background:var(--sub); margin-top:10px">Закрыть</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, set, get, onValue, push, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const IMGBB_KEY = "db82b9743e8c49d89b26bf5392e1578f";
const firebaseConfig = {
  apiKey: "AIzaSyB6s4lfDc_eHL1ojTS3w_NV8WkjPHfwFcE",
  authDomain: "umessege-e77fd.firebaseapp.com",
  databaseURL: "https://umessege-e77fd-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "umessege-e77fd",
  storageBucket: "umessege-e77fd.firebasestorage.app",
  messagingSenderId: "20493632508",
  appId: "1:20493632508:web:6c2b2e1281fcb32f392879"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let me = null, meData = null, curCid = null;

// UI Helpers
const getInitials = n => n ? n.split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2) : '?';
const getClr = n => { const colors=['#5288c1','#4caf50','#e91e63','#ff9800','#9c27b0']; let hash=0; for(let i=0;i<n.length;i++) hash=n.charCodeAt(i)+((hash<<5)-hash); return colors[Math.abs(hash)%colors.length]; };

window.selTab = t => {
  document.getElementById('form-l').style.display = t==='l'?'block':'none';
  document.getElementById('form-r').style.display = t==='r'?'block':'none';
  document.getElementById('tab-l').className = 'auth-tab '+(t==='l'?'active':'');
  document.getElementById('tab-r').className = 'auth-tab '+(t==='r'?'active':'');
};

// AUTH
window.login = () => signInWithEmailAndPassword(auth, document.getElementById('l-email').value, document.getElementById('l-pass').value).catch(e=>alert(e.message));
window.register = async () => {
  const n = document.getElementById('r-name').value;
  const res = await createUserWithEmailAndPassword(auth, document.getElementById('r-email').value, document.getElementById('r-pass').value).catch(e=>alert(e.message));
  if(res) set(ref(db, 'users/'+res.user.uid), { uid: res.user.uid, name: n, photo: '', online: true });
};
window.loginGoogle = async () => {
  const res = await signInWithPopup(auth, new GoogleAuthProvider());
  const u = res.user;
  const s = await get(ref(db, 'users/'+u.uid));
  if(!s.exists()) set(ref(db, 'users/'+u.uid), { uid: u.uid, name: u.displayName, photo: u.photoURL, online: true });
};
window.signOutUser = () => signOut(auth);

onAuthStateChanged(auth, user => {
  if(user) {
    me = user;
    onValue(ref(db, 'users/'+user.uid), s => {
      meData = s.val();
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      renderMe();
      loadChats();
    });
  } else {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});

function renderMe() {
  const el = document.getElementById('my-av');
  document.getElementById('my-name').innerText = meData.name;
  if(meData.photo) { el.style.backgroundImage = `url(${meData.photo})`; el.innerText = ''; }
  else { el.style.background = getClr(meData.name); el.innerText = getInitials(meData.name); }
}

// IMGBB
window.uploadAv = async (input) => {
  const file = input.files[0]; if(!file) return;
  const fd = new FormData(); fd.append('image', file);
  const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method:'POST', body:fd }).then(r=>r.json());
  if(res.data) update(ref(db, 'users/'+me.uid), { photo: res.data.url });
};

// MESSAGING
function loadChats() {
  onValue(ref(db, 'users'), s => {
    const users = s.val();
    const list = document.getElementById('chat-list');
    list.innerHTML = '';
    Object.values(users).forEach(u => {
      if(u.uid === me.uid) return;
      const item = document.createElement('div');
      item.className = 'chat-item';
      const avStyle = u.photo ? `background-image:url(${u.photo})` : `background:${getClr(u.name)}`;
      item.innerHTML = `<div class="avatar" style="${avStyle}">${u.photo?'':getInitials(u.name)}${u.online?'<div class="online-badge"></div>':''}</div><div>${u.name}</div>`;
      item.onclick = () => openChat(u);
      list.appendChild(item);
    });
  });
}

function openChat(user) {
  curCid = me.uid < user.uid ? me.uid+'_'+user.uid : user.uid+'_'+me.uid;
  document.getElementById('no-chat').style.display = 'none';
  document.getElementById('active-chat').style.display = 'flex';
  document.getElementById('chat-h').innerText = user.name;
  onValue(ref(db, 'messages/'+curCid), s => {
    const msgs = s.val() || {};
    const cont = document.getElementById('msgs');
    cont.innerHTML = '';
    Object.values(msgs).forEach(m => {
      const div = document.createElement('div');
      div.className = 'msg ' + (m.from === me.uid ? 'out' : 'in');
      div.innerText = m.text;
      cont.appendChild(div);
    });
    cont.scrollTop = cont.scrollHeight;
  });
}

window.send = () => {
  const i = document.getElementById('m-input');
  if(!i.value || !curCid) return;
  push(ref(db, 'messages/'+curCid), { from: me.uid, text: i.value, ts: Date.now() });
  i.value = '';
};

// MODALS
window.openProfile = () => {
  document.getElementById('p-modal').classList.add('open');
  document.getElementById('pm-name').innerText = meData.name;
  const el = document.getElementById('pm-av');
  if(meData.photo) { el.style.backgroundImage = `url(${meData.photo})`; el.innerText = ''; }
  else { el.style.background = getClr(meData.name); el.innerText = getInitials(meData.name); }
};
window.closeP = () => document.getElementById('p-modal').classList.remove('open');
</script>
</body>
</html>
