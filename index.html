<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untitled Messenger</title>
    <style>
        :root {
            --bg: #000; --side: #0a0a0a; --card: #1c1c1e; --accent: #007aff;
            --text: #fff; --text-dim: #8e8e93; --border: #2c2c2e;
            --online: #32d74b; --gold: #ffcc00; --blue: #0095f6; --danger: #ff3b30;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 320px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; cursor: pointer; border-bottom: 1px solid #111; }
        .chat-item:hover { background: #1a1a1a; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: #222; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid var(--border); flex-shrink: 0; }

        /* Main Chat */
        .main-chat { flex: 1; display: flex; flex-direction: column; }
        .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 70%; padding: 10px 15px; border-radius: 18px; font-size: 15px; position: relative; }
        .msg.mine { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.theirs { background: var(--card); align-self: flex-start; border-bottom-left-radius: 4px; }

        /* Modals */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; align-items: center; justify-content: center; }
        .modal-box { background: var(--card); padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid var(--border); }
        
        input, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); border-radius: 10px; color: #fff; margin-bottom: 10px; outline: none; }
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; background: var(--accent); color: #fff; margin-bottom: 5px; }
        
        .badge { display: inline-block; width: 16px; height: 16px; border-radius: 50%; font-size: 10px; margin-left: 5px; text-align: center; line-height: 16px; font-weight: bold; }
        .badge-gold { background: var(--gold); color: #000; }
        .badge-blue { background: var(--blue); color: #fff; }

        #settings-menu { display: none; position: fixed; background: #2c2c2e; border: 1px solid var(--border); border-radius: 10px; z-index: 6000; width: 200px; }
        .menu-item { padding: 12px; cursor: pointer; font-size: 14px; }
        .menu-item:hover { background: #3a3a3c; }

        /* Admin Table */
        .admin-user-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #333; }
        .admin-btns { display: flex; gap: 5px; }
        .admin-btns button { padding: 5px 8px; font-size: 10px; cursor: pointer; border: none; border-radius: 4px; color: #fff; }
    </style>
</head>
<body>

<div id="auth-screen" class="modal" style="display:flex">
    <div class="modal-box">
        <h2 style="margin-bottom:20px; text-align:center">Untitled</h2>
        <div id="reg-fields" style="display:none">
            <input type="text" id="auth-name" placeholder="Ваше имя">
            <input type="text" id="auth-un" placeholder="Юзернейм (без @)">
        </div>
        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button class="btn" onclick="handleAuth()">Войти / Регистрация</button>
        <p onclick="toggleAuth()" style="color:var(--text-dim); text-align:center; font-size:13px; cursor:pointer; margin-top:10px">Переключить Вход/Регистрация</p>
    </div>
</div>

<div id="settings-menu">
    <div class="menu-item" onclick="openEditProfile()">Профиль</div>
    <div id="admin-btn" class="menu-item" style="display:none; color:var(--gold)" onclick="openAdmin()">Админ-панель</div>
    <div class="menu-item" style="color:var(--danger)" onclick="auth.signOut().then(()=>location.reload())">Выйти</div>
</div>

<div id="modal-edit" class="modal">
    <div class="modal-box">
        <h3>Редактировать профиль</h3><br>
        <input type="text" id="edit-name" placeholder="Имя">
        <input type="text" id="edit-un" placeholder="Юзернейм">
        <textarea id="edit-bio" placeholder="О себе..."></textarea>
        <button class="btn" onclick="saveProfile()">Сохранить</button>
        <button class="btn" style="background:#333" onclick="closeModals()">Отмена</button>
    </div>
</div>

<div id="modal-admin" class="modal">
    <div class="modal-box" style="max-width:500px">
        <h3>Админ-панель</h3>
        <div id="admin-list" style="margin:15px 0; max-height:300px; overflow-y:auto"></div>
        <button class="btn" onclick="closeModals()">Закрыть</button>
    </div>
</div>

<div class="sidebar">
    <div style="padding:20px">
        <input type="text" placeholder="Поиск @юзернейм" oninput="searchUsers(this.value)">
        <div id="search-results" style="background:#050505"></div>
    </div>
    <div id="user-chats" style="flex:1; overflow-y:auto"></div>
    <div style="padding:15px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between">
        <div id="my-info" style="display:flex; align-items:center; gap:10px">
            <div class="avatar" id="my-av"></div>
            <div>
                <div id="my-name" style="font-size:14px; font-weight:600"></div>
                <div id="my-un" style="font-size:12px; color:var(--text-dim)"></div>
            </div>
        </div>
        <div style="cursor:pointer; font-size:20px" onclick="toggleSettings(event)">⋮</div>
    </div>
</div>

<div class="main-chat">
    <div id="chat-ui" style="display:none; flex-direction:column; height:100%">
        <div style="padding:15px 20px; border-bottom:1px solid var(--border); font-weight:600">
            <span id="chat-with-name"></span> <span id="chat-with-badge"></span>
        </div>
        <div class="messages-container" id="messages-box"></div>
        <div style="padding:20px; display:flex; gap:10px">
            <input type="text" id="msg-input" placeholder="Сообщение..." style="margin:0" onkeydown="if(event.key==='Enter') sendMsg()">
            <button class="btn" onclick="sendMsg()" style="width:60px; margin:0">➤</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB6s4lfDc_eHL1ojTS3w_NV8WkjPHfwFcE",
        authDomain: "umessege-e77fd.firebaseapp.com",
        databaseURL: "https://umessege-e77fd-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "umessege-e77fd"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    let me = null, meData = null, activeChatId = null, isReg = false;

    // --- СИСТЕМА AUTH ---
    auth.onAuthStateChanged(user => {
        if (user) {
            me = user;
            db.ref('users/'+user.uid).on('value', s => {
                meData = s.val();
                if(!meData) return;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('my-name').innerText = meData.name;
                document.getElementById('my-un').innerText = '@' + meData.username;
                document.getElementById('admin-btn').style.display = meData.role === 'admin' ? 'block' : 'none';
                drawAv(document.getElementById('my-av'), meData.photo, meData.name);
            });
            loadChats();
        }
    });

    async function handleAuth() {
        const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
        try {
            if(isReg) {
                const name = document.getElementById('auth-name').value;
                const un = document.getElementById('auth-un').value.toLowerCase().trim();
                const check = await db.ref('users').orderByChild('username').equalTo(un).once('value');
                if(check.exists()) return alert("Ник занят");
                const res = await auth.createUserWithEmailAndPassword(e,p);
                await db.ref('users/'+res.user.uid).set({ uid: res.user.uid, name, username: un, role: 'user', verified: false });
            } else {
                await auth.signInWithEmailAndPassword(e,p);
            }
        } catch(err) { alert(err.message); }
    }

    function toggleAuth() { isReg = !isReg; document.getElementById('reg-fields').style.display = isReg ? 'block' : 'none'; }

    // --- ЧАТЫ И СООБЩЕНИЯ ---
    function loadChats() {
        db.ref('chats').on('value', async s => {
            const cont = document.getElementById('user-chats'); cont.innerHTML = '';
            const data = s.val() || {};
            for(let id in data) {
                if(id.includes(me.uid)) {
                    const peerId = id.replace(me.uid, '').replace('_', '');
                    const u = (await db.ref('users/'+peerId).once('value')).val();
                    if(!u) continue;
                    const d = document.createElement('div');
                    d.className = 'chat-item';
                    d.innerHTML = `<div class="avatar" id="av-${u.uid}"></div><div><b>${u.name}</b><br><small>@${u.username}</small></div>`;
                    d.onclick = () => openChat(id, u);
                    cont.appendChild(d);
                    drawAv(document.getElementById('av-'+u.uid), u.photo, u.name);
                }
            }
        });
    }

    function openChat(id, u) {
        activeChatId = id;
        document.getElementById('chat-ui').style.display = 'flex';
        document.getElementById('chat-with-name').innerText = u.name;
        document.getElementById('chat-with-badge').innerHTML = (u.role==='admin'?'<span class="badge badge-gold">✓</span>':(u.verified?'<span class="badge badge-blue">✓</span>':''));
        
        db.ref('messages/'+id).off();
        db.ref('messages/'+id).on('value', s => {
            const box = document.getElementById('messages-box'); box.innerHTML = '';
            const msgs = s.val() || {};
            Object.values(msgs).forEach(m => {
                const d = document.createElement('div');
                d.className = `msg ${m.from === me.uid ? 'mine' : 'theirs'}`;
                d.innerText = m.text;
                box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg() {
        const val = document.getElementById('msg-input').value;
        if(!val.trim() || !activeChatId) return;
        db.ref('messages/'+activeChatId).push({ from: me.uid, text: val, time: Date.now() });
        document.getElementById('msg-input').value = '';
    }

    async function searchUsers(val) {
        const resDiv = document.getElementById('search-results');
        if(val.length < 2) { resDiv.innerHTML = ''; return; }
        const snap = await db.ref('users').orderByChild('username').startAt(val).endAt(val + '\uf8ff').once('value');
        resDiv.innerHTML = '';
        snap.forEach(child => {
            const u = child.val(); if(u.uid === me.uid) return;
            const d = document.createElement('div');
            d.className = 'chat-item'; d.innerHTML = `<b>${u.name}</b> @${u.username}`;
            d.onclick = () => {
                const id = me.uid < u.uid ? `${me.uid}_${u.uid}` : `${u.uid}_${me.uid}`;
                db.ref('chats/'+id).update({exists: true});
                openChat(id, u);
                resDiv.innerHTML = '';
            };
            resDiv.appendChild(d);
        });
    }

    // --- ПРОФИЛЬ И АДМИНКА ---
    function openEditProfile() {
        document.getElementById('modal-edit').style.display = 'flex';
        document.getElementById('edit-name').value = meData.name;
        document.getElementById('edit-un').value = meData.username;
        document.getElementById('edit-bio').value = meData.bio || '';
    }

    async function saveProfile() {
        const name = document.getElementById('edit-name').value;
        const un = document.getElementById('edit-un').value.toLowerCase().trim();
        if(un !== meData.username) {
            const check = await db.ref('users').orderByChild('username').equalTo(un).once('value');
            if(check.exists()) return alert("Ник занят");
        }
        await db.ref('users/'+me.uid).update({ name, username: un, bio: document.getElementById('edit-bio').value });
        closeModals();
    }

    function openAdmin() {
        document.getElementById('modal-admin').style.display = 'flex';
        const list = document.getElementById('admin-list'); list.innerHTML = 'Загрузка...';
        db.ref('users').once('value', s => {
            list.innerHTML = '';
            s.forEach(child => {
                const u = child.val();
                const row = document.createElement('div');
                row.className = 'admin-user-row';
                row.innerHTML = `<span>${u.name} (@${u.username})</span>
                    <div class="admin-btns">
                        <button style="background:var(--blue)" onclick="updUsr('${u.uid}', 'verified', ${!u.verified})">Галочка</button>
                        <button style="background:var(--gold); color:#000" onclick="updUsr('${u.uid}', 'role', '${u.role==='admin'?'user':'admin'}')">Админ</button>
                    </div>`;
                list.appendChild(row);
            });
        });
    }

    function updUsr(uid, key, val) { db.ref('users/'+uid).update({[key]: val}).then(()=>openAdmin()); }

    // --- ВСПОМОГАТЕЛЬНОЕ ---
    function drawAv(el, photo, name) {
        if(!el) return;
        el.style.backgroundImage = photo ? `url(${photo})` : 'none';
        el.innerText = photo ? '' : (name ? name[0] : '?');
    }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
    function toggleSettings(e) {
        const m = document.getElementById('settings-menu');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
        m.style.left = (e.pageX - 180) + 'px'; m.style.top = (e.pageY + 15) + 'px';
        e.stopPropagation();
    }
    document.addEventListener('click', () => document.getElementById('settings-menu').style.display='none');
</script>
</body>
</html>
