<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flame — Deep Dark</title>
    <style>
        :root {
            --bg: #000; --side: #0a0a0a; --card: #111; --accent: #007aff;
            --text: #fff; --text-dim: #888; --border: #1a1a1a; --red: #ff3b30;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Экраны */
        #auth-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        #app { display: none; height: 100vh; flex-direction: row; }

        /* Боковая панель */
        .sidebar { width: 320px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .list-container { flex: 1; overflow-y: auto; }
        .item { display: flex; align-items: center; gap: 12px; padding: 15px 20px; cursor: pointer; transition: 0.2s; position: relative; }
        .item:hover { background: var(--card); }
        .item.active { background: #007aff15; border-right: 3px solid var(--accent); }

        /* Аватарки */
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: #222; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--accent); flex-shrink: 0; border: 1px solid var(--border); }

        /* Контекстное меню ПКМ */
        #context-menu { display: none; position: fixed; background: #1c1c1e; border: 1px solid #333; border-radius: 10px; z-index: 5000; width: 180px; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .menu-item { padding: 12px; cursor: pointer; font-size: 14px; color: #fff; }
        .menu-item:hover { background: #2c2c2e; }
        .menu-item.red { color: var(--red); }

        /* Чат */
        .chat-main { flex: 1; display: flex; flex-direction: column; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 70%; padding: 10px 15px; border-radius: 15px; font-size: 15px; }
        .msg.in { background: var(--card); align-self: flex-start; }
        .msg.out { background: var(--accent); align-self: flex-end; }

        /* Модалки */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 350px; text-align: center; display: flex; flex-direction: column; gap: 15px; }
        input, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); border-radius: 10px; color: #fff; outline: none; }
        .btn { padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .btn-blue { background: var(--accent); color: #fff; }
        .btn-ghost { background: none; color: var(--text-dim); }
    </style>
</head>
<body onclick="hideMenu()" oncontextmenu="return false;">

<div id="context-menu">
    <div class="menu-item" onclick="deleteChatAction('me')">Удалить у себя</div>
    <div class="menu-item red" onclick="deleteChatAction('both')">Удалить у всех</div>
</div>

<div id="auth-screen">
    <div class="modal-content" style="width: 320px;">
        <h2>Flame</h2>
        <div id="reg-box" style="display:none">
            <input type="text" id="auth-name" placeholder="Имя">
            <input type="text" id="auth-un" placeholder="Юзернейм">
        </div>
        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button class="btn btn-blue" onclick="handleAuth()">Войти / Регистрация</button>
        <button class="btn btn-ghost" onclick="toggleReg()">Сменить режим</button>
    </div>
</div>

<div id="app">
    <div class="sidebar">
        <div style="padding: 15px;"><input type="text" placeholder="Поиск @юзернейм" oninput="searchUsers(this.value)"></div>
        <div class="list-container" id="chats-list"></div>
        <div id="search-results" class="list-container" style="display:none; border-top: 1px solid #333;"></div>
        
        <div onclick="openMyProfile()" style="padding: 15px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; cursor: pointer;">
            <div class="avatar" id="my-av-bar"></div>
            <div><div id="my-name-bar" style="font-weight:bold"></div><div id="my-un-bar" style="color:var(--accent); font-size:12px"></div></div>
        </div>
    </div>

    <div class="chat-main">
        <div id="chat-active" style="display:none; flex-direction:column; height: 100%;">
            <div style="padding: 15px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px;">
                <div id="active-av" class="avatar"></div>
                <b id="active-name"></b>
            </div>
            <div class="messages" id="msg-box"></div>
            <div style="padding: 15px; display: flex; gap: 10px;">
                <input type="text" id="msg-input" placeholder="Сообщение..." onkeydown="if(event.key==='Enter') sendMsg()">
                <button class="btn btn-blue" onclick="sendMsg()">➤</button>
            </div>
        </div>
        <div id="chat-none" style="flex:1; display:flex; align-items:center; justify-content:center; color:#555">Выберите чат</div>
    </div>
</div>

<div class="modal" id="modal-profile">
    <div class="modal-content">
        <h3 id="profile-title">Профиль</h3>
        <div class="avatar" id="profile-av-edit" style="width:90px; height:90px; align-self:center; cursor:pointer; font-size:30px"></div>
        <input type="file" id="file-input" hidden accept="image/*" onchange="uploadAvatar(this)">
        
        <div id="edit-fields" style="display:flex; flex-direction:column; gap:10px">
            <input type="text" id="edit-name" placeholder="Имя">
            <input type="text" id="edit-un" placeholder="Юзернейм">
            <textarea id="edit-bio" placeholder="О себе..."></textarea>
            <button class="btn btn-blue" onclick="saveProfile()">Сохранить</button>
        </div>
        
        <div id="view-fields" style="display:none; flex-direction:column; gap:10px">
            <p id="view-bio"></p>
            <button class="btn btn-blue" id="btn-start-chat">Написать</button>
        </div>
        
        <button class="btn btn-ghost" onclick="closeModal()">Закрыть</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const IMGBB_KEY = "db82b9743e8c49d89b26bf5392e1578f"; 
    const firebaseConfig = {
        apiKey: "AIzaSyB6s4lfDc_eHL1ojTS3w_NV8WkjPHfwFcE",
        authDomain: "umessege-e77fd.firebaseapp.com",
        databaseURL: "https://umessege-e77fd-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "umessege-e77fd",
        storageBucket: "umessege-e77fd.firebasestorage.app",
        messagingSenderId: "20493632508",
        appId: "1:20493632508:web:6c2b2e1281fcb32f392879"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    let me = null, meData = null, activeChatId = null, selectedChatId = null, isReg = false;

    // --- АВТОРИЗАЦИЯ ---
    function toggleReg() { isReg = !isReg; document.getElementById('reg-box').style.display = isReg ? 'block' : 'none'; }
    async function handleAuth() {
        const email = document.getElementById('auth-email').value, pass = document.getElementById('auth-pass').value;
        try {
            if(isReg) {
                const name = document.getElementById('auth-name').value, un = document.getElementById('auth-un').value.toLowerCase().trim();
                const res = await auth.createUserWithEmailAndPassword(email, pass);
                await db.ref('users/'+res.user.uid).set({uid:res.user.uid, name, username:un, photo:''});
                await db.ref('usernames/'+un).set(res.user.uid);
            } else { await auth.signInWithEmailAndPassword(email, pass); }
        } catch(e) { alert(e.message); }
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            me = user;
            db.ref('users/'+user.uid).on('value', s => {
                meData = s.val();
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                document.getElementById('my-name-bar').innerText = meData.name;
                document.getElementById('my-un-bar').innerText = '@'+meData.username;
                setAv('my-av-bar', meData.photo, meData.name);
            });
            loadChats();
        } else { document.getElementById('auth-screen').style.display = 'flex'; }
    });

    // --- ВСПОМОГАТЕЛЬНОЕ ---
    function setAv(id, url, name) {
        const el = document.getElementById(id); if(!el) return;
        if(url) { el.style.backgroundImage = `url('${url}')`; el.innerText = ''; }
        else { el.style.backgroundImage = 'none'; el.innerText = name ? name[0] : '?'; }
    }
    function closeModal() { document.getElementById('modal-profile').style.display = 'none'; }

    // --- ПРОФИЛЬ И ФОТО ---
    function openMyProfile() {
        document.getElementById('profile-title').innerText = "Мой профиль";
        document.getElementById('edit-fields').style.display = 'flex';
        document.getElementById('view-fields').style.display = 'none';
        document.getElementById('edit-name').value = meData.name;
        document.getElementById('edit-un').value = meData.username;
        document.getElementById('edit-bio').value = meData.bio || '';
        setAv('profile-av-edit', meData.photo, meData.name);
        document.getElementById('profile-av-edit').onclick = () => document.getElementById('file-input').click();
        document.getElementById('modal-profile').style.display = 'flex';
    }

    async function uploadAvatar(input) {
        if(!input.files[0]) return;
        const fd = new FormData(); fd.append('image', input.files[0]);
        const res = await fetch('https://api.imgbb.com/1/upload?key='+IMGBB_KEY, {method:'POST', body:fd});
        const json = await res.json();
        const url = json.data.url;
        await db.ref('users/'+me.uid).update({photo: url});
        setAv('profile-av-edit', url, meData.name);
    }

    async function saveProfile() {
        const newUn = document.getElementById('edit-un').value.toLowerCase().trim();
        if(newUn !== meData.username) {
            const check = await db.ref('usernames/'+newUn).once('value');
            if(check.exists()) return alert("Ник занят");
            await db.ref('usernames/'+meData.username).remove();
            await db.ref('usernames/'+newUn).set(me.uid);
        }
        await db.ref('users/'+me.uid).update({name: document.getElementById('edit-name').value, username: newUn, bio: document.getElementById('edit-bio').value});
        closeModal();
    }

    // --- ЧАТЫ И УДАЛЕНИЕ ---
    function loadChats() {
        db.ref('chats').on('value', async s => {
            const list = document.getElementById('chats-list'); list.innerHTML = '';
            const data = s.val() || {};
            for(let id in data) {
                if(id.includes(me.uid)) {
                    const otherId = id.replace(me.uid,'').replace('_','');
                    const u = (await db.ref('users/'+otherId).once('value')).val();
                    if(!u) continue;
                    const el = document.createElement('div');
                    el.className = `item ${activeChatId===id?'active':''}`;
                    el.oncontextmenu = (e) => showMenu(e, id);
                    el.onclick = () => openChat(id, u);
                    el.innerHTML = `<div class="avatar" id="av-${id}"></div><div><b>${u.name}</b><div style="font-size:12px;color:#555">${data[id].last || ''}</div></div>`;
                    list.appendChild(el);
                    setAv('av-'+id, u.photo, u.name);
                }
            }
        });
    }

    function showMenu(e, id) {
        e.preventDefault(); selectedChatId = id;
        const menu = document.getElementById('context-menu');
        menu.style.display = 'block'; menu.style.left = e.pageX+'px'; menu.style.top = e.pageY+'px';
    }
    function hideMenu() { document.getElementById('context-menu').style.display = 'none'; }

    async function deleteChatAction(type) {
        if(!selectedChatId) return;
        if(type === 'both') {
            await db.ref('messages/'+selectedChatId).remove();
            await db.ref('chats/'+selectedChatId).remove();
        } else {
            // Удалить у себя — это просто очистка истории для текущего юзера
            await db.ref('chats/'+selectedChatId).remove(); 
        }
        if(activeChatId === selectedChatId) document.getElementById('chat-active').style.display='none';
        hideMenu();
    }

    function openChat(id, u) {
        activeChatId = id;
        document.getElementById('chat-none').style.display = 'none';
        document.getElementById('chat-active').style.display = 'flex';
        document.getElementById('active-name').innerText = u.name;
        setAv('active-av', u.photo, u.name);
        db.ref('messages/'+id).on('value', s => {
            const box = document.getElementById('msg-box'); box.innerHTML = '';
            Object.values(s.val() || {}).forEach(m => {
                box.innerHTML += `<div class="msg ${m.from===me.uid?'out':'in'}">${m.text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg() {
        const txt = document.getElementById('msg-input').value; if(!txt) return;
        db.ref('messages/'+activeChatId).push({from:me.uid, text:txt});
        db.ref('chats/'+activeChatId).update({last:txt, time:Date.now()});
        document.getElementById('msg-input').value = '';
    }

    function searchUsers(q) {
        if(!q) { document.getElementById('search-results').style.display='none'; return; }
        db.ref('users').orderByChild('username').startAt(q).endAt(q+'\uf8ff').once('value', s => {
            const res = document.getElementById('search-results'); res.innerHTML = ''; res.style.display='block';
            Object.values(s.val() || {}).forEach(u => {
                if(u.uid === me.uid) return;
                const el = document.createElement('div'); el.className = 'item';
                el.innerHTML = `<div class="avatar" id="sav-${u.uid}"></div><div><b>${u.name}</b><br><small>@${u.username}</small></div>`;
                el.onclick = () => {
                    activeChatId = [me.uid, u.uid].sort().join('_');
                    db.ref('chats/'+activeChatId).update({exists:true});
                    openChat(activeChatId, u);
                    res.style.display='none';
                };
                res.appendChild(el); setAv('sav-'+u.uid, u.photo, u.name);
            });
        });
    }
</script>
</body>
</html>
