<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tab-title">Untitled</title>
    <style>
        :root {
            --bg: #000000;
            --side: #0a0a0a;
            --card: #121212;
            --accent: #007aff;
            --text: #ffffff;
            --text-dim: #8e8e93;
            --border: #1c1c1e;
            --online: #32d74b;
            --admin-gold: #ffcc00;
            --verify-blue: #0095f6;
            --danger: #ff3b30;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; }

        /* Sidebar & Layout */
        .sidebar { width: 350px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; cursor: pointer; border-left: 3px solid transparent; }
        .chat-item.active { background: #1a1a1a; border-left-color: var(--accent); }

        .avatar { width: 48px; height: 48px; border-radius: 50%; background: #222; background-size: cover; background-position: center; position: relative; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .online-dot { width: 12px; height: 12px; background: var(--online); border: 2px solid var(--side); border-radius: 50%; position: absolute; bottom: 2px; right: 2px; display: none; }
        .is-online .online-dot { display: block; }

        .badge { width: 15px; height: 15px; border-radius: 50%; font-size: 9px; display: inline-flex; align-items: center; justify-content: center; margin-left: 5px; }
        .badge-gold { background: var(--admin-gold); color: #000; }
        .badge-blue { background: var(--verify-blue); color: #fff; }

        /* Main */
        .main-chat { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
        .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .message { max-width: 70%; padding: 10px 16px; border-radius: 18px; font-size: 15px; }
        .message.mine { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 4px; }
        .message.theirs { background: var(--card); align-self: flex-start; border-bottom-left-radius: 4px; }

        /* Modals */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 5000; align-items: center; justify-content: center; }
        .modal-box { background: var(--card); padding: 30px; border-radius: 32px; width: 380px; border: 1px solid var(--border); text-align: center; max-height: 90vh; overflow-y: auto; }
        
        .edit-input { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); border-radius: 12px; color: #fff; margin-bottom: 10px; outline: none; }
        .btn-action { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; margin-top: 10px; }
        
        /* Admin List */
        .admin-user-row { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid var(--border); font-size: 13px; }

        #fs-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; }
    </style>
</head>
<body oncontextmenu="return true;"> <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>
<div id="fs-overlay" onclick="this.style.display='none'"><img id="fs-img" style="max-width:90%; max-height:90%; border-radius:20px;"></div>

<div id="auth-screen" class="modal" style="display: flex;">
    <div class="auth-card">
        <h1>Untitled</h1><br>
        <div id="reg-fields" style="display:none">
            <input type="text" id="auth-name" placeholder="Имя">
            <input type="text" id="auth-un" placeholder="Юзернейм">
        </div>
        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button class="btn-action" style="background:var(--accent); color:#fff" onclick="handleAuth()">Продолжить</button>
        <p onclick="toggleAuth()" style="cursor:pointer; margin-top:15px; font-size:12px; color:var(--text-dim)">Сменить режим входа</p>
    </div>
</div>

<div class="sidebar">
    <div style="padding:20px;"><input type="text" id="search-inp" class="edit-input" placeholder="Поиск..." oninput="searchUsers(this.value)"></div>
    <div class="chat-list" id="user-chats"></div>
    <div style="padding:15px; border-top:1px solid var(--border); display:flex; align-items:center; gap:12px; cursor:pointer" onclick="showProfile('me')">
        <div class="avatar" id="my-av-small"></div>
        <div><div id="my-name-small" style="font-weight:600"></div><div id="my-un-small" style="color:var(--accent); font-size:12px"></div></div>
    </div>
</div>

<div class="main-chat">
    <div id="active-chat-ui" style="display:none; flex-direction:column; height:100%;">
        <div style="padding:15px 25px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:15px; cursor:pointer" onclick="showProfile('other', currentPeerId)">
            <div id="active-av" class="avatar"></div>
            <div>
                <div style="font-weight:600; display:flex; align-items:center;"><span id="active-name"></span><span id="active-badge"></span></div>
                <div id="active-un" style="color:var(--accent); font-size:12px"></div>
            </div>
        </div>
        <div class="messages-container" id="messages-box"></div>
        <div style="padding:20px; display:flex; gap:10px">
            <input type="text" id="msg-input" class="edit-input" style="margin:0" placeholder="Сообщение..." onkeydown="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" style="background:var(--accent); border:none; padding:0 20px; border-radius:12px; color:#fff">➤</button>
        </div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-box">
        <div class="avatar" id="modal-av" style="width:100px; height:100px; margin:0 auto 15px; cursor:pointer" onclick="openFs()"></div>
        <h2 id="view-name"></h2>
        <p id="view-un" style="color:var(--accent); margin-bottom:15px"></p>
        
        <div id="me-edit" style="display:none">
            <input type="text" id="edit-name" class="edit-input" placeholder="Имя">
            <input type="text" id="edit-un" class="edit-input" placeholder="Юзернейм">
            <input type="text" id="edit-bio" class="edit-input" placeholder="О себе">
            <button class="btn-action" style="background:var(--accent); color:#fff" onclick="saveProfile()">Сохранить</button>
            <input type="file" id="file-inp" hidden onchange="uploadPhoto(this)">
            <button class="btn-action" style="background:#222; color:#fff" onclick="document.getElementById('file-inp').click()">Сменить фото</button>
            <button id="admin-btn" class="btn-action" style="background:var(--admin-gold); color:#000; display:none" onclick="openAdmin()">Админ-панель</button>
        </div>
        
        <button id="start-chat-btn" class="btn-action" style="background:var(--accent); color:#fff; display:none">Написать</button>
        <button class="btn-action" style="background:none; color:var(--text-dim)" onclick="closeModal()">Закрыть</button>
    </div>
</div>

<div id="admin-modal" class="modal">
    <div class="modal-box" style="width:500px">
        <h3>Управление пользователями</h3><br>
        <div id="admin-user-list"></div>
        <button class="btn-action" onclick="document.getElementById('admin-modal').style.display='none'">Выйти</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const IMGBB_KEY = "db82b9743e8c49d89b26bf5392e1578f";
    const firebaseConfig = {
        apiKey: "AIzaSyB6s4lfDc_eHL1ojTS3w_NV8WkjPHfwFcE",
        authDomain: "umessege-e77fd.firebaseapp.com",
        databaseURL: "https://umessege-e77fd-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "umessege-e77fd",
        storageBucket: "umessege-e77fd.firebasestorage.app",
        messagingSenderId: "20493632508",
        appId: "1:20493632508:web:6c2b2e1281fcb32f392879"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    let me = null, meData = null, activeChatId = null, currentPeerId = null, isReg = false;
    let curPhoto = "";

    const getBadge = u => u.role==='admin' ? '<span class="badge badge-gold">✓</span>' : (u.verified ? '<span class="badge badge-blue">✓</span>' : '');

    function drawAv(el, photo, name) {
        if (!el) return;
        el.style.backgroundImage = photo ? `url(${photo})` : 'none';
        el.innerText = photo ? '' : (name ? name[0].toUpperCase() : '?');
    }

    function openFs() { if(curPhoto) { document.getElementById('fs-img').src=curPhoto; document.getElementById('fs-overlay').style.display='flex'; } }

    auth.onAuthStateChanged(user => {
        if (user) {
            me = user;
            db.ref('users/'+user.uid).on('value', s => {
                meData = s.val(); if(!meData) return;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('my-name-small').innerHTML = meData.name + getBadge(meData);
                document.getElementById('my-un-small').innerText = '@' + meData.username;
                drawAv(document.getElementById('my-av-small'), meData.photo, meData.name);
                if(meData.role === 'admin') document.getElementById('admin-btn').style.display='block';
                db.ref('users/'+user.uid).update({online: true});
            });
            loadChats();
        }
    });

    function loadChats() {
        db.ref('chats').on('value', async s => {
            const cont = document.getElementById('user-chats'); cont.innerHTML = '';
            const data = s.val() || {};
            for (let id in data) {
                if (id.includes(me.uid)) {
                    const oId = id.replace(me.uid,'').replace('_','');
                    const u = (await db.ref('users/'+oId).once('value')).val();
                    if(!u) continue;
                    const div = document.createElement('div');
                    div.className = `chat-item ${activeChatId===id?'active':''} ${u.online?'is-online':''}`;
                    div.onclick = () => openChat(id, u);
                    div.innerHTML = `<div class="avatar" id="l-${u.uid}"><div class="online-dot"></div></div>
                        <div><b>${u.name}${getBadge(u)}</b><br><small style="color:var(--accent)">@${u.username}</small></div>`;
                    cont.appendChild(div);
                    drawAv(document.getElementById('l-'+u.uid), u.photo, u.name);
                }
            }
        });
    }

    function openChat(id, u) {
        activeChatId = id; currentPeerId = u.uid;
        document.getElementById('active-chat-ui').style.display = 'flex';
        document.getElementById('active-name').innerText = u.name;
        document.getElementById('active-un').innerText = '@'+u.username;
        document.getElementById('active-badge').innerHTML = getBadge(u);
        drawAv(document.getElementById('active-av'), u.photo, u.name);
        db.ref('messages/'+id).on('value', s => {
            const box = document.getElementById('messages-box'); box.innerHTML = '';
            Object.values(s.val()||{}).forEach(m => {
                const d = document.createElement('div');
                d.className = `message ${m.from===me.uid?'mine':'theirs'}`;
                d.innerText = m.text; box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function showProfile(type, uid) {
        const tId = uid || me.uid;
        db.ref('users/'+tId).once('value', s => {
            const u = s.val(); curPhoto = u.photo;
            document.getElementById('view-name').innerHTML = u.name + getBadge(u);
            document.getElementById('view-un').innerText = '@'+u.username;
            drawAv(document.getElementById('modal-av'), u.photo, u.name);
            document.getElementById('me-edit').style.display = type==='me'?'block':'none';
            document.getElementById('start-chat-btn').style.display = type==='me'?'none':'block';
            if(type==='me'){
                document.getElementById('edit-name').value = u.name;
                document.getElementById('edit-un').value = u.username;
                document.getElementById('edit-bio').value = u.bio || '';
            } else {
                document.getElementById('start-chat-btn').onclick = () => {
                    const id = [me.uid, u.uid].sort().join('_');
                    db.ref('chats/'+id).update({exists:true}); openChat(id, u); closeModal();
                };
            }
            document.getElementById('modal').style.display = 'flex';
        });
    }

    async function saveProfile() {
        const nName = document.getElementById('edit-name').value;
        const nUn = document.getElementById('edit-un').value.toLowerCase().trim();
        const nBio = document.getElementById('edit-bio').value;
        
        if (nUn !== meData.username) {
            const check = await db.ref('usernames/'+nUn).once('value');
            if (check.exists()) return alert("Этот юзернейм занят!");
            await db.ref('usernames/'+meData.username).remove();
            await db.ref('usernames/'+nUn).set(me.uid);
        }
        await db.ref('users/'+me.uid).update({ name: nName, username: nUn, bio: nBio });
        closeModal();
    }

    async function uploadPhoto(inp) {
        const fd = new FormData(); fd.append('image', inp.files[0]);
        const r = await fetch('https://api.imgbb.com/1/upload?key='+IMGBB_KEY, {method:'POST', body:fd});
        const d = await r.json(); await db.ref('users/'+me.uid).update({photo: d.data.url});
        drawAv(document.getElementById('modal-av'), d.data.url, meData.name);
    }

    function openAdmin() {
        document.getElementById('admin-modal').style.display='flex';
        db.ref('users').once('value', s => {
            const cont = document.getElementById('admin-user-list'); cont.innerHTML = '';
            Object.values(s.val()).forEach(u => {
                const row = document.createElement('div'); row.className = 'admin-user-row';
                row.innerHTML = `<span>${u.name} (@${u.username})</span>
                    <div>
                        <button onclick="adminAction('${u.uid}', 'verified', ${!u.verified})">${u.verified?'Снять Галку':'Дать Галку'}</button>
                        <button onclick="adminAction('${u.uid}', 'banned', ${!u.banned})" style="color:red">Бан</button>
                    </div>`;
                cont.appendChild(row);
            });
        });
    }

    function adminAction(uid, field, val) { db.ref('users/'+uid).update({[field]: val}); openAdmin(); }

    function sendMsg() {
        const v = document.getElementById('msg-input').value; if(!v.trim()) return;
        db.ref('messages/'+activeChatId).push({ from: me.uid, text: v });
        document.getElementById('msg-input').value = '';
    }

    function toggleAuth() { isReg=!isReg; document.getElementById('reg-fields').style.display=isReg?'block':'none'; }
    function closeModal() { document.getElementById('modal').style.display='none'; }
    function searchUsers(v) { /* поиск как раньше */ }

    async function handleAuth() {
        const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
        if(isReg) {
            const un = document.getElementById('auth-un').value.toLowerCase().trim();
            const res = await auth.createUserWithEmailAndPassword(e,p);
            await db.ref('users/'+res.user.uid).set({ uid: res.user.uid, name: document.getElementById('auth-name').value, username: un, email: e, role: 'user', verified: false });
            await db.ref('usernames/'+un).set(res.user.uid);
        } else await auth.signInWithEmailAndPassword(e,p);
    }
</script>
</body>
</html>
