<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlameChat — Мессенджер</title>
<style>
  :root {
    --bg: #0e1621;
    --sidebar: #17212b;
    --panel: #1c2733;
    --bubble-in: #182533;
    --bubble-out: #2b5278;
    --accent: #5288c1;
    --accent2: #64b5f6;
    --text: #e8e8e8;
    --sub: #708499;
    --border: #ffffff12;
    --online: #4caf50;
    --read: #64b5f6;
    --unread: #708499;
    --red: #ef5350;
    --green: #4caf50;
    --yellow: #ffc107;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

  /* AUTH */
  #auth-screen { display: flex; align-items: center; justify-content: center; height: 100vh; }
  .auth-box { background: var(--sidebar); border-radius: 16px; padding: 40px 36px; width: 360px; box-shadow: 0 20px 60px #00000060; }
  .auth-logo { font-size: 42px; text-align: center; margin-bottom: 8px; }
  .auth-title { text-align: center; font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .auth-sub { text-align: center; color: var(--sub); font-size: 13px; margin-bottom: 28px; }
  .auth-tabs { display: flex; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 24px; }
  .auth-tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-size: 14px; background: transparent; border: none; color: var(--sub); transition: .2s; }
  .auth-tab.active { background: var(--accent); color: #fff; font-weight: 600; }
  .auth-form input { width: 100%; padding: 12px 14px; margin-bottom: 12px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; outline: none; transition: border .2s; }
  .auth-form input:focus { border-color: var(--accent); }
  .auth-form input::placeholder { color: var(--sub); }
  .auth-btn { width: 100%; padding: 13px; background: var(--accent); border: none; border-radius: 10px; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity .2s; margin-bottom: 8px; }
  .auth-btn:hover { opacity: .85; }
  .btn-google { background: #fff; color: #000; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .auth-error { color: var(--red); font-size: 12px; margin-top: 8px; text-align: center; }

  /* APP */
  #app { display: none; height: 100vh; flex-direction: row; }

  /* SIDEBAR */
  .sidebar { width: 320px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-header { padding: 14px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
  .search-wrap { flex: 1; position: relative; }
  .search-wrap input { width: 100%; padding: 8px 12px 8px 34px; background: var(--panel); border: none; border-radius: 20px; color: var(--text); font-size: 13px; outline: none; }
  .s-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--sub); font-size: 14px; }
  .new-chat-btn { width: 34px; height: 34px; border-radius: 50%; background: var(--accent); border: none; color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .chat-list { overflow-y: auto; flex: 1; }
  .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; transition: background .15s; }
  .chat-item:hover { background: var(--panel); }
  .chat-item.active { background: #5288c122; }
  
  .avatar { width: 46px; height: 46px; border-radius: 50%; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; flex-shrink: 0; position: relative; }
  .avatar .online-dot { position: absolute; bottom: 1px; right: 1px; width: 11px; height: 11px; border-radius: 50%; background: var(--online); border: 2px solid var(--sidebar); }
  
  .sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .my-avatar { width: 36px; height: 36px; border-radius: 50%; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; cursor: pointer; }

  /* CHAT AREA */
  .chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .chat-header { padding: 12px 18px; background: var(--sidebar); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .messages-wrap { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 4px; background: var(--bg); }
  .msg-row { display: flex; flex-direction: column; max-width: 68%; }
  .msg-row.out { align-self: flex-end; align-items: flex-end; }
  .msg-row.in { align-self: flex-start; align-items: flex-start; }
  .bubble { padding: 8px 12px; border-radius: 14px; font-size: 14px; background: var(--bubble-in); position: relative; }
  .msg-row.out .bubble { background: var(--bubble-out); border-bottom-right-radius: 4px; }
  
  .input-bar { padding: 12px 16px; background: var(--sidebar); border-top: 1px solid var(--border); display: flex; align-items: flex-end; gap: 10px; }
  .input-bar textarea { flex: 1; background: var(--panel); border: 1px solid var(--border); border-radius: 20px; padding: 10px 16px; color: var(--text); outline: none; resize: none; max-height: 120px; }

  /* MODALS */
  .modal-overlay { display: none; position: fixed; inset: 0; background: #000000aa; z-index: 2000; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--panel); border-radius: 16px; padding: 28px; width: 380px; border: 1px solid var(--border); }
  .pm-av-box { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 15px; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-size: 32px; border: 2px dashed var(--border); cursor: pointer; }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">🔥</div>
    <div class="auth-title">FlameChat</div>
    <div class="auth-sub">Безопасный мессенджер</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Войти</button>
      <button class="auth-tab" onclick="switchTab('register')">Регистрация</button>
    </div>
    <div class="auth-form" id="login-form">
      <input type="email" id="login-email" placeholder="Email" />
      <input type="password" id="login-pass" placeholder="Пароль" />
      <button class="auth-btn" onclick="doLogin()">Войти</button>
      <button class="auth-btn btn-google" onclick="loginGoogle()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_\"G\"_Logo.svg" width="18"> Google
      </button>
    </div>
    <div class="auth-form" id="register-form" style="display:none">
      <input type="text" id="reg-name" placeholder="Имя пользователя" />
      <input type="email" id="reg-email" placeholder="Email" />
      <input type="password" id="reg-pass" placeholder="Пароль" />
      <button class="auth-btn" onclick="doRegister()">Создать аккаунт</button>
    </div>
    <div id="auth-error" class="auth-error"></div>
  </div>
</div>

<div id="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="search-wrap">
        <span class="s-icon">🔍</span>
        <input type="text" placeholder="Поиск" oninput="filterChats(this.value)" />
      </div>
      <button class="new-chat-btn" onclick="openModal('new-chat-modal')">+</button>
    </div>
    <div class="chat-list" id="chat-list"></div>
    <div class="sidebar-footer">
      <div class="my-avatar" id="my-av" onclick="openModal('profile-modal')">?</div>
      <div style="flex:1; min-width:0">
        <div class="my-name" id="my-name-el">—</div>
        <div class="my-sub" id="my-sub-el">онлайн</div>
      </div>
    </div>
  </div>

  <div class="chat-area">
    <div id="no-chat" style="flex:1; display:flex; align-items:center; justify-content:center; color:var(--sub)">Выберите чат</div>
    <div id="active-chat" style="display:none; flex-direction:column; flex:1">
      <div class="chat-header">
        <div class="avatar" id="ch-av" style="width:38px; height:38px; font-size:15px">?</div>
        <div>
          <div id="ch-name" style="font-weight:700">Чат</div>
          <div id="ch-status" style="font-size:12px; color:var(--online)">в сети</div>
        </div>
      </div>
      <div class="messages-wrap" id="msgs"></div>
      <div class="input-bar">
        <textarea id="msg-input" placeholder="Сообщение..." rows="1" onkeydown="handleKey(event)"></textarea>
        <button class="new-chat-btn" onclick="sendMsg()">➤</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="profile-modal">
  <div class="modal" style="text-align:center">
    <h2>Профиль</h2>
    <label for="av-upload">
      <div id="pm-av-box" class="pm-av-box">?</div>
    </label>
    <input type="file" id="av-upload" hidden accept="image/*" onchange="uploadAvatar(this)">
    <div id="pm-name" style="font-weight:700; margin-bottom:20px">Имя</div>
    <div class="modal-btns" style="display:flex; gap:10px; justify-content:center">
      <button class="auth-btn" style="background:var(--red)" onclick="doLogout()">Выйти</button>
      <button class="auth-btn" style="background:var(--sub)" onclick="closeModal('profile-modal')">Закрыть</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="new-chat-modal">
  <div class="modal">
    <h2>Новый чат</h2>
    <input type="text" id="nc-name" placeholder="Имя пользователя" style="width:100%; padding:10px; margin:10px 0; background:var(--bg); border:1px solid var(--border); color:#fff" />
    <button class="auth-btn" onclick="createChat()">Начать</button>
    <button class="auth-btn" style="background:none" onclick="closeModal('new-chat-modal')">Отмена</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, set, get, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const IMGBB_KEY = "db82b9743e8c49d89b26bf5392e1578f"; //
const firebaseConfig = {
  apiKey: "AIzaSyB6s4lfDc_eHL1ojTS3w_NV8WkjPHfwFcE",
  authDomain: "umessege-e77fd.firebaseapp.com",
  databaseURL: "https://umessege-e77fd-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "umessege-e77fd",
  storageBucket: "umessege-e77fd.firebasestorage.app",
  messagingSenderId: "20493632508",
  appId: "1:20493632508:web:6c2b2e1281fcb32f392879"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let me = null, meData = null, activeCid = null, usersCache = {}, chatsCache = {};

const init2 = s => (s||'?').slice(0,2).toUpperCase();
const clr = n => { const c=['#5288c1','#4caf50','#e91e63','#ff9800']; let h=0; for(let x of(n||'')) h=(h*31+x.charCodeAt(0))%c.length; return c[h]; };

// AUTH LOGIC
window.loginGoogle = async () => {
  const provider = new GoogleAuthProvider();
  try {
    const res = await signInWithPopup(auth, provider);
    const u = res.user;
    const s = await get(ref(db, `users/${u.uid}`));
    if (!s.exists()) {
      await set(ref(db, `users/${u.uid}`), { name: u.displayName, email: u.email, uid: u.uid, photo: u.photoURL || '', online: true, createdAt: Date.now() });
    }
  } catch (e) { document.getElementById('auth-error').textContent = e.message; }
};

window.switchTab = t => {
  document.getElementById('login-form').style.display = t==='login'?'block':'none';
  document.getElementById('register-form').style.display = t==='register'?'block':'none';
};

onAuthStateChanged(auth, async user => {
  if(user) {
    me = user;
    onValue(ref(db, `users/${user.uid}`), s => {
      meData = s.val();
      document.getElementById('auth-screen').style.display='none';
      document.getElementById('app').style.display='flex';
      updateUI();
    });
  } else {
    document.getElementById('auth-screen').style.display='flex';
    document.getElementById('app').style.display='none';
  }
});

function updateUI() {
  const av = document.getElementById('my-av');
  if(meData.photo) av.style.backgroundImage = `url(${meData.photo})`;
  else { av.textContent = init2(meData.name); av.style.background = clr(meData.name); }
  document.getElementById('my-name-el').textContent = meData.name;
  
  onValue(ref(db, 'users'), s => { usersCache = s.val() || {}; renderChats(); });
  onValue(ref(db, 'chats'), s => { chatsCache = s.val() || {}; renderChats(); });
}

// IMGBB UPLOAD
window.uploadAvatar = async (input) => {
  const file = input.files[0]; if(!file) return;
  const formData = new FormData(); formData.append("image", file);
  document.getElementById('pm-av-box').textContent = "⏳";
  try {
    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: formData });
    const data = await res.json();
    await update(ref(db, `users/${me.uid}`), { photo: data.data.url });
  } catch(e) { alert("Ошибка загрузки"); }
};

// CHAT LOGIC
function renderChats() {
  const list = document.getElementById('chat-list');
  let html = '';
  Object.entries(chatsCache).forEach(([id, chat]) => {
    if(!id.includes(me.uid)) return;
    const ouid = id.split('_').find(u => u !== me.uid);
    const o = usersCache[ouid]; if(!o) return;
    const style = o.photo ? `style="background-image:url(${o.photo})"` : `style="background:${clr(o.name)}"`;
    html += `<div class="chat-item ${id===activeCid?'active':''}" onclick="openChat('${id}','${ouid}')">
      <div class="avatar" ${style}>${o.photo?'':init2(o.name)}</div>
      <div style="flex:1"><div>${o.name}</div><div style="font-size:12px;color:var(--sub)">${chat.lastMsg||''}</div></div>
    </div>`;
  });
  list.innerHTML = html;
}

window.openChat = (id, ouid) => {
  activeCid = id; renderChats();
  document.getElementById('no-chat').style.display='none';
  document.getElementById('active-chat').style.display='flex';
  const o = usersCache[ouid];
  document.getElementById('ch-name').textContent = o.name;
  onValue(ref(db, `messages/${id}`), s => {
    const msgs = s.val() || {};
    let mHtml = '';
    Object.values(msgs).sort((a,b)=>a.ts-b.ts).forEach(m => {
      mHtml += `<div class="msg-row ${m.from===me.uid?'out':'in'}"><div class="bubble">${m.text}</div></div>`;
    });
    const box = document.getElementById('msgs'); box.innerHTML = mHtml; box.scrollTop = box.scrollHeight;
  });
};

window.sendMsg = async () => {
  const inp = document.getElementById('msg-input'); if(!inp.value.trim()) return;
  const ts = Date.now();
  await push(ref(db, `messages/${activeCid}`), { from: me.uid, text: inp.value, ts });
  await update(ref(db, `chats/${activeCid}`), { lastMsg: inp.value, lastTs: ts });
  inp.value = '';
};

window.openModal = id => {
  if(id==='profile-modal') {
    document.getElementById('pm-name').textContent = meData.name;
    const box = document.getElementById('pm-av-box');
    if(meData.photo) { box.style.backgroundImage = `url(${meData.photo})`; box.textContent = ''; }
    else { box.textContent = init2(meData.name); box.style.background = clr(meData.name); }
  }
  document.getElementById(id).classList.add('open');
};
window.closeModal = id => document.getElementById(id).classList.remove('open');
window.doLogout = () => signOut(auth);
window.handleKey = e => { if(e.key==='Enter') sendMsg(); };
</script>
</body>
</html>
