<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flame — Deep Dark</title>
    <style>
        :root {
            --bg: #000000;
            --side: #0a0a0a;
            --card: #111111;
            --accent: #007aff;
            --text: #ffffff;
            --text-dim: #888888;
            --border: #1a1a1a;
            --online: #34c759;
            --red: #ff3b30;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Auth */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .auth-card { background: var(--card); padding: 40px; border-radius: 24px; width: 100%; max-width: 360px; text-align: center; }
        .auth-card input { width: 100%; padding: 14px; margin-bottom: 12px; background: #1a1a1a; border: none; border-radius: 12px; color: #fff; outline: none; }
        .auth-card button { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 12px; color: #fff; font-weight: 600; cursor: pointer; margin-bottom: 10px; }
        .google-btn { background: #fff !important; color: #000 !important; display: flex; align-items: center; justify-content: center; gap: 10px; border: none; border-radius: 12px; padding: 12px; cursor: pointer; font-weight: 600; width: 100%; }

        /* App Layout */
        #app { display: none; height: 100vh; flex-direction: row; }

        /* Sidebar */
        .sidebar { width: 320px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .side-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        
        .list-container { flex: 1; overflow-y: auto; }
        .list-label { padding: 16px 24px 8px; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        .item { display: flex; align-items: center; gap: 12px; padding: 12px 24px; cursor: pointer; position: relative; transition: 0.2s; }
        .item:hover { background: var(--card); }
        .item.active { background: #007aff15; border-right: 3px solid var(--accent); }
        
        /* Стили аватара */
        .avatar { 
            width: 40px; height: 40px; border-radius: 12px; 
            background: #222; display: flex; align-items: center; justify-content: center; 
            font-weight: 600; color: var(--accent); flex-shrink: 0; position: relative; 
            background-size: cover; background-position: center; 
        }
        
        .online-status { width: 12px; height: 12px; background: var(--online); border: 2px solid var(--side); border-radius: 50%; position: absolute; bottom: -2px; right: -2px; display: none; z-index: 2; }
        .is-online .online-status { display: block; }

        /* Profile Bar */
        .my-profile-bar { padding: 16px 24px; border-top: 1px solid var(--border); background: var(--side); display: flex; align-items: center; gap: 12px; cursor: pointer; }

        /* Chat */
        .chat-main { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
        .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 70%; padding: 10px 16px; border-radius: 16px; font-size: 15px; word-wrap: break-word; }
        .msg.in { background: var(--card); align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg.out { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 4px; }

        .input-area { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 12px; }
        .input-area input { flex: 1; background: var(--card); border: none; padding: 12px; border-radius: 10px; color: #fff; outline: none; }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); padding: 30px; border-radius: 28px; width: 90%; max-width: 360px; text-align: center; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 12px; margin-bottom: 10px; background: #1a1a1a; border: 1px solid var(--border); border-radius: 10px; color: #fff; outline: none; resize: none; }
        
        /* Fullscreen View */
        #fs-view { display: none; position: fixed; inset: 0; background: #000; z-index: 3000; align-items: center; justify-content: center; cursor: zoom-out; }
        #fs-view img { max-width: 100%; max-height: 100%; object-fit: contain; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h2 style="font-size: 28px; letter-spacing: -1px;">Flame</h2><br>
        <div id="reg-fields" style="display:none"><input type="text" id="auth-name" placeholder="Имя"></div>
        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button onclick="handleAuth()">Продолжить</button>
        <button class="google-btn" onclick="handleGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18"> Google
        </button>
        <p id="toggle-text" style="color:var(--text-dim); cursor:pointer; font-size: 13px; margin-top: 15px;" onclick="toggleAuth()">Нет аккаунта? Создать</p>
    </div>
</div>

<div id="app">
    <div class="sidebar">
        <div class="side-header"><b>FLAME</b></div>
        <div class="list-container">
            <div class="list-label">Ваши чаты</div>
            <div id="chats-list"></div>
            <div class="list-label">Все пользователи</div>
            <div id="users-list"></div>
        </div>
        <div class="my-profile-bar" onclick="showProfile()">
            <div class="avatar" id="my-av-bottom"></div>
            <div style="flex:1">
                <div id="my-name-bottom" style="font-weight:600; font-size:14px">Загрузка...</div>
                <div style="font-size:11px; color:var(--online)">в сети</div>
            </div>
        </div>
    </div>
    <div class="chat-main">
        <div id="chat-active" style="display:none; flex-direction:column; height:100%;">
            <div style="padding:16px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; cursor:pointer" onclick="viewOtherProfile()">
                <div id="active-av" class="avatar"></div>
                <div>
                    <b id="active-name"></b>
                    <div id="active-status" style="font-size: 11px; color: var(--text-dim);">нажмите для профиля</div>
                </div>
            </div>
            <div class="messages" id="messages-box"></div>
            <div class="input-area">
                <input type="text" id="msg-input" placeholder="Сообщение..." onkeydown="if(event.key==='Enter') sendMsg()">
                <button onclick="sendMsg()" style="background:var(--accent); border:none; color:#fff; padding:0 18px; border-radius:10px; cursor:pointer; font-size: 18px;">➤</button>
            </div>
        </div>
        <div id="chat-none" style="flex:1; display:flex; align-items:center; justify-content:center; color:var(--text-dim); flex-direction: column; gap: 10px;">
            <div style="font-size: 40px;">💬</div>
            Выберите, кому написать
        </div>
    </div>
</div>

<div class="modal" id="profile-modal">
    <div class="modal-content">
        <h3 id="modal-title">Профиль</h3><br>
        <input type="file" id="p-input" hidden onchange="uploadPhoto(this)">
        <div class="avatar" id="edit-av-prev" style="width:100px; height:100px; margin:0 auto 15px; cursor:pointer; font-size:40px"></div>
        <div id="profile-view-only" style="display: none;">
            <h2 id="view-name"></h2>
            <p id="view-bio" style="color: var(--text-dim); margin-top: 10px;"></p>
            <button onclick="startChatFromProfile()" style="margin-top: 20px; width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 12px; color: #fff; cursor: pointer;">Написать</button>
        </div>
        <div id="profile-edit-fields">
            <input type="text" id="edit-name" placeholder="Имя">
            <textarea id="edit-bio" placeholder="О себе..."></textarea>
            <button class="google-btn" style="width:100%; background:var(--accent)!important; color:#fff!important" onclick="saveProfile()">Сохранить</button>
            <button onclick="auth.signOut()" style="background:none; border:none; color:var(--red); cursor:pointer; margin-top:10px; width: 100%;">Выйти из аккаунта</button>
        </div>
        <button onclick="closeModal('profile-modal')" style="background:none; border:none; color:var(--text-dim); cursor:pointer; margin-top:15px">Закрыть</button>
    </div>
</div>

<div id="fs-view" onclick="this.style.display='none'">
    <img id="fs-img" src="">
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const IMGBB_KEY = "db82b9743e8c49d89b26bf5392e1578f";
    const firebaseConfig = {
        apiKey: "AIzaSyB6s4lfDc_eHL1ojTS3w_NV8WkjPHfwFcE",
        authDomain: "umessege-e77fd.firebaseapp.com",
        databaseURL: "https://umessege-e77fd-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "umessege-e77fd",
        storageBucket: "umessege-e77fd.firebasestorage.app",
        messagingSenderId: "20493632508",
        appId: "1:20493632508:web:6c2b2e1281fcb32f392879"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    let me = null, meData = null, activeChatId = null, activeTargetId = null, isReg = false;

    // Отрисовка аватарки
    function drawAv(el, photo, name) {
        if(!el) return;
        if(photo) {
            el.style.backgroundImage = `url('${photo}')`;
            el.innerText = '';
            el.onclick = (e) => {
                e.stopPropagation();
                openFS(photo);
            };
        } else {
            el.style.backgroundImage = 'none';
            el.innerText = name ? name[0].toUpperCase() : '?';
            el.onclick = null;
        }
    }

    function openFS(url) {
        document.getElementById('fs-img').src = url;
        document.getElementById('fs-view').style.display = 'flex';
    }

    function toggleAuth() { 
        isReg = !isReg; 
        document.getElementById('reg-fields').style.display = isReg ? 'block' : 'none';
        document.getElementById('toggle-text').innerText = isReg ? "Уже есть аккаунт? Войти" : "Нет аккаунта? Создать";
    }
    
    async function handleAuth() {
        const email = document.getElementById('auth-email').value, pass = document.getElementById('auth-pass').value;
        if(!email || !pass) return alert("Заполните поля");
        try {
            if(isReg) {
                const name = document.getElementById('auth-name').value;
                const res = await auth.createUserWithEmailAndPassword(email, pass);
                await db.ref('users/'+res.user.uid).set({uid:res.user.uid, name: name || 'User', email, bio: '', photo: '', online: true});
            } else { await auth.signInWithEmailAndPassword(email, pass); }
        } catch(e) { alert(e.message); }
    }

    async function handleGoogle() {
        try {
            const res = await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
            const s = await db.ref('users/'+res.user.uid).once('value');
            if(!s.exists()) {
                await db.ref('users/'+res.user.uid).set({uid:res.user.uid, name:res.user.displayName, email:res.user.email, bio: '', photo: res.user.photoURL, online: true});
            }
        } catch(e) { alert("Ошибка Google: " + e.message); }
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            me = user;
            db.ref('users/'+user.uid).on('value', s => {
                meData = s.val();
                if(!meData) return;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                document.getElementById('my-name-bottom').innerText = meData.name;
                drawAv(document.getElementById('my-av-bottom'), meData.photo, meData.name);
                db.ref('users/'+user.uid).update({online: true});
                db.ref('users/'+user.uid).onDisconnect().update({online: false});
            });
            loadData();
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
        }
    });

    async function uploadPhoto(input) {
        if(!input.files[0]) return;
        const fd = new FormData(); fd.append('image', input.files[0]);
        try {
            const res = await fetch('https://api.imgbb.com/1/upload?key='+IMGBB_KEY, {method:'POST', body:fd});
            const d = await res.json();
            await db.ref('users/'+me.uid).update({photo: d.data.url});
            drawAv(document.getElementById('edit-av-prev'), d.data.url, meData.name);
        } catch(e) { alert("Ошибка загрузки"); }
    }

    // Свой профиль
    function showProfile() {
        document.getElementById('modal-title').innerText = "Настройки профиля";
        document.getElementById('profile-edit-fields').style.display = 'block';
        document.getElementById('profile-view-only').style.display = 'none';
        document.getElementById('edit-name').value = meData.name;
        document.getElementById('edit-bio').value = meData.bio || '';
        document.getElementById('edit-av-prev').onclick = () => document.getElementById('p-input').click();
        drawAv(document.getElementById('edit-av-prev'), meData.photo, meData.name);
        document.getElementById('profile-modal').style.display = 'flex';
    }

    // Чужой профиль
    async function viewOtherProfile(uid) {
        const targetId = uid || activeTargetId;
        if(!targetId) return;
        const s = await db.ref('users/'+targetId).once('value');
        const u = s.val();
        
        document.getElementById('modal-title').innerText = "Профиль пользователя";
        document.getElementById('profile-edit-fields').style.display = 'none';
        document.getElementById('profile-view-only').style.display = 'block';
        
        document.getElementById('view-name').innerText = u.name;
        document.getElementById('view-bio').innerText = u.bio || 'Нет описания';
        drawAv(document.getElementById('edit-av-prev'), u.photo, u.name);
        
        // Временная функция для кнопки "Написать" в модалке
        window.tempStartChat = () => {
            startChat(u.uid, u.name, u.photo);
            closeModal('profile-modal');
        };
        
        document.getElementById('profile-modal').style.display = 'flex';
    }

    function startChatFromProfile() {
        if(window.tempStartChat) window.tempStartChat();
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    
    async function saveProfile() {
        await db.ref('users/'+me.uid).update({
            name: document.getElementById('edit-name').value, 
            bio: document.getElementById('edit-bio').value
        });
        closeModal('profile-modal');
    }

    function loadData() {
        // Список пользователей
        db.ref('users').on('value', s => {
            const list = document.getElementById('users-list');
            list.innerHTML = '';
            Object.values(s.val() || {}).forEach(u => {
                if(u.uid === me.uid) return;
                const item = document.createElement('div');
                item.className = `item ${u.online ? 'is-online' : ''}`;
                item.innerHTML = `
                    <div class="avatar" id="u-${u.uid}"><div class="online-status"></div></div>
                    <div style="flex:1">
                        <div style="font-size:14px;font-weight:600">${u.name}</div>
                        <div style="font-size:11px;color:var(--text-dim)">${u.bio||'Привет!'}</div>
                    </div>
                    <button onclick="event.stopPropagation(); viewOtherProfile('${u.uid}')" style="background:none; border:none; color:var(--accent); font-size:12px; cursor:pointer">Инфо</button>
                `;
                item.onclick = () => startChat(u.uid, u.name, u.photo);
                list.appendChild(item);
                drawAv(document.getElementById('u-'+u.uid), u.photo, u.name);
            });
        });

        // Список чатов
        db.ref('chats').on('value', async s => {
            const list = document.getElementById('chats-list');
            list.innerHTML = '';
            const chats = Object.entries(s.val() || {});
            for (let [id, data] of chats) {
                if(id.includes(me.uid)) {
                    const otherId = id.replace(me.uid, '').replace('_', '');
                    const u = (await db.ref('users/'+otherId).once('value')).val();
                    if(!u) continue;
                    const item = document.createElement('div');
                    item.className = `item ${activeChatId===id?'active':''} ${u.online?'is-online':''}`;
                    item.onclick = () => openChat(id, u.uid, u.name, u.photo);
                    item.innerHTML = `
                        <div class="avatar" id="c-${u.uid}"><div class="online-status"></div></div>
                        <div style="overflow:hidden">
                            <div style="font-size:14px; font-weight:600">${u.name}</div>
                            <div style="font-size:12px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${data.lastMsg||'Нет сообщений'}</div>
                        </div>`;
                    list.appendChild(item);
                    drawAv(document.getElementById('c-'+u.uid), u.photo, u.name);
                }
            }
        });
    }

    function startChat(uid, name, photo) {
        const id = [me.uid, uid].sort().join('_');
        db.ref('chats/'+id).update({exists:true});
        openChat(id, uid, name, photo);
    }

    function openChat(id, targetUid, name, photo) {
        activeChatId = id;
        activeTargetId = targetUid;
        document.getElementById('chat-none').style.display = 'none';
        document.getElementById('chat-active').style.display = 'flex';
        document.getElementById('active-name').innerText = name;
        drawAv(document.getElementById('active-av'), photo, name);
        
        db.ref('messages/'+id).off();
        db.ref('messages/'+id).on('value', s => {
            const box = document.getElementById('messages-box');
            box.innerHTML = '';
            Object.values(s.val() || {}).forEach(m => {
                const div = document.createElement('div');
                div.className = `msg ${m.from===me.uid?'out':'in'}`;
                div.innerText = m.text;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg() {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim() || !activeChatId) return;
        const msg = { from: me.uid, text: inp.value, ts: Date.now() };
        db.ref('messages/'+activeChatId).push(msg);
        db.ref('chats/'+activeChatId).update({lastMsg: inp.value, lastTs: Date.now()});
        inp.value = '';
    }
</script>
</body>
</html>
